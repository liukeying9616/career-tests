<style>
:root{

  --c-accent-a:#e8784a;--c-accent-b:#4a9eb0;--c-accent-c:#8b6caf;
  --c-accent-d:#5a8a6a;--c-accent-e:#c08050;--c-danger:#c44;
  --radius:12px;--shadow:0 2px 16px rgba(60,30,10,.06);

}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--c-bg);color:var(--c-text);line-height:1.6;
  -webkit-font-smoothing:antialiased;min-height:100vh;display:flex;justify-content:center}
#app{width:100%;max-width:480px;min-height:100vh;position:relative;overflow:hidden}
.page{display:none;padding:24px 20px 40px;min-height:100vh}
.page.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* 首页 */
.home-header{text-align:center;padding-top:40px}
.home-header h1{font-size:1.75rem;font-weight:800;color:var(--c-primary);line-height:1.3;margin-bottom:8px}
.home-header .sub{font-size:.9rem;color:var(--c-muted);margin-bottom:32px;line-height:1.5}
.home-intro{background:var(--c-card);border-radius:var(--radius);padding:20px;margin-bottom:20px;
  box-shadow:var(--shadow);font-size:.875rem;color:var(--c-muted);line-height:1.8}
.home-intro p{margin-bottom:8px}
.home-intro .highlight{color:var(--c-primary);font-weight:600}
.dim-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px}
.dim-card{background:var(--c-card);border:1px solid var(--c-border);border-radius:var(--radius);
  padding:14px 12px;text-align:center;font-size:.8rem;font-weight:600;color:var(--c-text)}
.dim-card .icon{font-size:1.3rem;display:block;margin-bottom:4px}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:var(--radius);
  font-size:1rem;font-weight:700;cursor:pointer;text-align:center;transition:all .15s}
.btn-primary{background:var(--c-primary);color:#fff}
.btn-primary:active{opacity:.85;transform:scale(.98)}
.btn-outline{background:var(--c-card);color:var(--c-primary);border:1.5px solid var(--c-border)}
.footer-note{text-align:center;font-size:.7rem;color:var(--c-muted);margin-top:16px}
.footer-code{text-align:center;font-size:.7rem;color:var(--c-muted);margin-top:8px;
  font-family:'SF Mono',Consolas,monospace}

/* 测试页 */
.quiz-header{padding:8px 0 16px}
.quiz-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.quiz-module{font-size:.75rem;color:var(--c-primary);font-weight:600;background:var(--c-primary-light);
  padding:4px 10px;border-radius:20px}
.quiz-progress{font-size:.75rem;color:var(--c-muted)}
.progress-bar{height:3px;background:var(--c-border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--c-primary);transition:width .3s ease;border-radius:2px}
.quiz-card{background:var(--c-card);border-radius:var(--radius);padding:24px 20px;
  box-shadow:var(--shadow);margin-bottom:12px}
.quiz-card h3{font-size:1rem;font-weight:700;margin-bottom:20px;line-height:1.5}
.opt-btn{display:block;width:100%;padding:14px 16px;margin-bottom:8px;background:var(--c-bg);
  border:1.5px solid var(--c-border);border-radius:var(--radius);text-align:left;
  font-size:.9rem;cursor:pointer;transition:all .12s;color:var(--c-text)}
.opt-btn:active,.opt-btn.selected{background:var(--c-primary-light);border-color:var(--c-primary);
  color:var(--c-primary);font-weight:600}
.opt-key{display:inline-block;width:24px;height:24px;line-height:24px;text-align:center;
  background:var(--c-border);border-radius:50%;font-size:.75rem;font-weight:700;margin-right:8px}
.quiz-hint{text-align:center;font-size:.7rem;color:var(--c-muted);padding:8px}

/* 加载页 */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:70vh;text-align:center}
.loading-spinner{width:40px;height:40px;border:3px solid var(--c-border);
  border-top-color:var(--c-primary);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:24px}

.loading-text{font-size:.95rem;color:var(--c-text);min-height:28px;line-height:1.6}
.loading-done{color:var(--c-primary);font-weight:600}

/* 结果页 */
.result-header{text-align:center;padding-top:20px}
.result-type{font-size:2rem;font-weight:800;color:var(--c-primary);margin-bottom:4px}
.result-subtitle{font-size:.9rem;color:var(--c-muted);margin-bottom:20px}
.score-ring{display:inline-flex;align-items:center;justify-content:center;

.score-label{font-size:.75rem;color:var(--c-muted);margin-bottom:24px}

.section{background:var(--c-card);border-radius:var(--radius);padding:20px;

.section h3{font-size:.85rem;font-weight:700;color:var(--c-primary);margin-bottom:12px;

.indices-row{display:flex;gap:10px;flex-wrap:wrap}
.index-item{flex:1;min-width:80px;text-align:center;padding:10px 6px;

.index-val{font-size:1.3rem;font-weight:800;color:var(--c-primary)}
.index-label{font-size:.7rem;color:var(--c-muted);margin-top:2px}

.diagnosis-text{font-size:.85rem;line-height:1.8;color:var(--c-text);white-space:pre-line}

.radar-wrap{display:flex;justify-content:center;padding:8px 0}
.radar-wrap svg{max-width:280px;width:100%}

.job-list,.no-list{list-style:none;padding:0}
.job-list li,.no-list li{padding:8px 12px;margin-bottom:4px;background:var(--c-bg);
  border-radius:6px;font-size:.82rem;display:flex;align-items:center;gap:8px}
.job-list li::before{content:'✅';font-size:.75rem}
.no-list li::before{content:'⚠️';font-size:.75rem}

.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.compare-card{padding:14px;border-radius:8px;font-size:.8rem;line-height:1.6}
.compare-good{background:#f0f7f0;border:1px solid #c8e0c8}
.compare-bad{background:#fef5f0;border:1px solid #f0d8c8}
.compare-card h4{font-size:.8rem;margin-bottom:6px}

.plan-steps{list-style:none;padding:0}
.plan-steps li{padding:10px 12px;margin-bottom:6px;background:var(--c-bg);
  border-radius:6px;font-size:.8rem;line-height:1.5;border-left:3px solid var(--c-primary)}

.closing-text{font-size:.85rem;color:var(--c-muted);font-style:italic;text-align:center;line-height:1.7}

.result-actions{display:flex;gap:10px;margin-top:20px}
.result-actions .btn{flex:1;font-size:.85rem;padding:12px}

/* 海报弹窗 */
.poster-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;
  justify-content:center;align-items:center;padding:20px}
.poster-overlay.show{display:flex}
.poster-card{background:#fff;border-radius:16px;padding:32px 24px;max-width:320px;width:100%;
  text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.15)}
.poster-card .ptype{font-size:1.8rem;font-weight:800;color:var(--c-primary);margin-bottom:4px}
.poster-card .psub{font-size:.85rem;color:var(--c-muted);margin-bottom:16px}
.poster-card .pfooter{font-size:.7rem;color:var(--c-muted);margin-top:20px;padding-top:14px;
  border-top:1px solid var(--c-border)}
.poster-close{margin-top:16px;font-size:.8rem;color:var(--c-muted);cursor:pointer;text-align:center}

.rb-h{font-size:.85rem;font-weight:700;color:var(--c-primary);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--c-border)}
.rb-t{font-size:.85rem;line-height:1.8;color:var(--c-text);white-space:pre-line}
.avd-i{padding:6px 10px;margin-bottom:3px;background:#fef5f0;border-radius:6px;font-size:.8rem;color:#c44}
.rsk-r{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.rsk-l{font-size:.75rem;width:85px;flex-shrink:0}
.rsk-b{flex:1;height:6px;background:var(--c-border);border-radius:3px;overflow:hidden}
.rsk-f{height:100%;border-radius:3px}
.rsk-f.hi{background:#c44}.rsk-f.mi{background:#d4784a}.rsk-f.lo{background:#4a9eb0}
.rsk-v{font-size:.75rem;font-weight:700;width:35px;text-align:right}
.act-kw{text-align:center;font-size:2rem;font-weight:800;color:var(--c-primary);padding:12px 0 8px}

</style>

评价你？", "options": [{"key": "A", "text": "只敢想，不敢干"}, {"key": "B", "text": "什么都懂一点，不精"}, {"key": "C", "text": "太分散，沉不下去"}, {"key": "D", "text": "太保守，不敢闯"}]}, {"id": 7, "text": "面对一个陌生领域，你更接近？", "options": [{"key": "A", "text": "兴奋——新机会"}, {"key": "B", "text": "好奇——先研究"}, {"key": "C", "text": "冲动——想结合"}, {"key": "D", "text": "谨慎——先观望"}]}, {"id": 8, "text": "三年后还在做一样的事，你的感受？", "options": [{"key": "A", "text": "除非我当老板，否则受不了"}, {"key": "B", "text": "成了顶尖就很满足"}, {"key": "C", "text": "只做一件事会闷死"}, {"key": "D", "text": "稳定就是安全感"}]}, {"id": 9, "text": "最近一次让你感到「活着真有意思」的时刻，更像？", "options": [{"key": "A", "text": "说服一群人跟我一起干成件事"}, {"key": "B", "text": "攻克了一个纠结很久的难题"}, {"key": "C", "text": "把两件不相关的事串出了新东西"}, {"key": "D", "text": "独自完成了一件完全按我节奏来的事"}]}, {"id": 10, "text": "你最羡慕什么样的人？", "options": [{"key": "A", "text": "白手起家，自己说了算"}, {"key": "B", "text": "行业内公认的顶尖高手"}, {"key": "C", "text": "斜杠多重身份，什么都会"}, {"key": "D", "text": "不受约束，想去哪就去哪"}]}, {"id": 11, "text": "当别人质疑你的做法，你的反应？", "options": [{"key": "A", "text": "先干了再说，用结果证明"}, {"key": "B", "text": "回头检查逻辑有没有漏洞"}, {"key": "C", "text": "换个角度试试能不能绕过去"}, {"key": "D", "text": "不在意——我有自己的节奏"}]}, {"id": 12, "text": "你觉得自己最大的遗憾是？", "options": [{"key": "A", "text": "没有早点自己干"}, {"key": "B", "text": "没有在一个方向上钻更深"}, {"key": "C", "text": "没有多尝试几个方向"}, {"key": "D", "text": "没有早点挣脱束缚"}]}, {"id": 13, "text": "如果完全不受外界影响，你最想怎么活？", "options": [{"key": "A", "text": "闯出一番自己的事业"}, {"key": "B", "text": "在一个领域做到极致"}, {"key": "C", "text": "体验各种不同的人生可能"}, {"key": "D", "text": "按自己的节奏，不被任何人管"}]}, {"id": 14, "text": "什么最容易让你觉得「浪费了一天」？", "options": [{"key": "A", "text": "开会讨论却没人拍板"}, {"key": "B", "text": "学了东西但没有真正掌握"}, {"key": "C", "text": "只做了一件事，没有新鲜感"}, {"key": "D", "text": "被别人的安排占满了时间"}]}, {"id": 15, "text": "你更相信哪种成功？", "options": [{"key": "A", "text": "做成一件别人不敢想的事"}, {"key": "B", "text": "在一个领域做到不可替代"}, {"key": "C", "text": "拥有多种身份和收入来源"}, {"key": "D", "text": "活成自己想要的样子"}]}, {"id": 16, "text": "如果现在必须做一个改变，你最想？", "options": [{"key": "A", "text": "掌握更多决策权"}, {"key": "B", "text": "建立更强的专业壁垒"}, {"key": "C", "text": "拓展更多可能的方向"}, {"key": "D", "text": "获得更多自由的时间"}]}, {"id": 17, "text": "过去三年，你最明显的变化是？", "options": [{"key": "A", "text": "越来越想自己主导事情"}, {"key": "B", "text": "在某个领域越来越精"}, {"key": "C", "text": "尝试了多个新的方向"}, {"key": "D", "text": "越来越受不了被管着"}]}, {"id": 18, "text": "别人最常因为什么来找你帮忙？", "options": [{"key": "A", "text": "需要有人带头推动一件事"}, {"key": "B", "text": "需要专业判断或深度分析"}, {"key": "C", "text": "需要跨领域的视角和建议"}, {"key": "D", "text": "需要创意或不一样的想法"}]}, {"id": 19, "text": "行业巨变，你的岗位可能消失，你会？", "options": [{"key": "A", "text": "第一时间找新机会，主动出击"}, {"key": "B", "text": "深入研究趋势，找到新专业方向"}, {"key": "C", "text": "同时布局几个方向"}, {"key": "D", "text": "趁这个机会彻底换个活法"}]}, {"id": 20, "text": "你觉得自己最大的优势来自？", "options": [{"key": "A", "text": "行动力和决断力"}, {"key": "B", "text": "深度思考和专业积累"}, {"key": "C", "text": "快速学习和适应力"}, {"key": "D", "text": "创造力和独立思考"}]}, {"id": 21, "text": "面对一个复杂问题，你更倾向？", "options": [{"key": "A", "text": "快速拆解，分头行动"}, {"key": "B", "text": "深入分析，找根本原因"}, {"key": "C", "text": "多角度看，整合不同方法"}, {"key": "D", "text": "跳出框架，重新定义问题"}]}, {"id": 22, "text": "关于钱，你更接近哪种态度？", "options": [{"key": "A", "text": "钱是工具，敢花敢赚"}, {"key": "B", "text": "钱是价值回报，专业值这个价"}, {"key": "C", "text": "多条渠道比单一高薪安全"}, {"key": "D", "text": "够用就行，不想为钱牺牲自由"}]}, {"id": 23, "text": "你的学习方式更接近？", "options": [{"key": "A", "text": "边做边学，实战中掌握"}, {"key": "B", "text": "系统学习，建完整框架"}, {"key": "C", "text": "快速抓重点，够用就行"}, {"key": "D", "text": "只学自己真正感兴趣的"}]}, {"id": 24, "text": "如果面试官问「你最大的缺点」，你内心真正的答案？", "options": [{"key": "A", "text": "不喜欢被人管"}, {"key": "B", "text": "有时候太追求完美"}, {"key": "C", "text": "容易分心，什么都想试"}, {"key": "D", "text": "不喜欢按固定流程做事"}]}, {"id": 25, "text": "如果未来五年后回头看今天，你最怕？", "options": [{"key": "A", "text": "后悔没有勇敢一次"}, {"key": "B", "text": "后悔没有坚持下去"}, {"key": "C", "text": "后悔没有抓住机会"}, {"key": "D", "text": "后悔没有为自己活过"}]}, {"id": 26, "text": "下面哪句话最像你的真实困惑？", "options": [{"key": "A", "text": "我不知道该继续打工还是自己干"}, {"key": "B", "text": "我不知道该深耕还是拓宽"}, {"key": "C", "text": "我不知道现在的工作适不适合长期做"}, {"key": "D", "text": "我是不是该追求更自由的方式"}]}, {"id": 27, "text": "面对职业选择，你最常陷入？", "options": [{"key": "A", "text": "想冲又怕输"}, {"key": "B", "text": "想深造又怕错过风口"}, {"key": "C", "text": "想跳槽又觉得现在还行"}, {"key": "D", "text": "想自由又担心不稳定"}]}, {"id": 28, "text": "你理想中的工作日更像？", "options": [{"key": "A", "text": "充满变化，每天不一样"}, {"key": "B", "text": "有大块时间专注做一件事"}, {"key": "C", "text": "节奏稳定，按计划进行"}, {"key": "D", "text": "自己决定什么时候做什么"}]}, {"id": 29, "text": "做完这个测试，你最希望知道？", "options": [{"key": "A", "text": "我适不适合自己干"}, {"key": "B", "text": "我应该深耕哪个领域"}, {"key": "C", "text": "我适不适合现在的工作"}, {"key": "D", "text": "我该怎么获得更多自由"}]}, {"id": 30, "text": "如果完全自由选择，五年后你希望？", "options": [{"key": "A", "text": "有自己的事业或团队"}, {"key": "B", "text": "成为行业公认的专家"}, {"key": "C", "text": "在稳定的平台上持续晋升"}, {"key": "D", "text": "自由掌控时间和工作内容"}]}, {"id": 31, "text": "回顾过去做出最大的改变，你的感受？", "options": [{"key": "A", "text": "庆幸够果断，抓住了机会"}, {"key": "B", "text": "那次改变让我积累了不可替代的经验"}, {"key": "C", "text": "结果证明是稳妥的选择"}, {"key": "D", "text": "更接近自己真正想要的生活"}]}, {"id": 32, "text": "以下哪个结果，你最希望出现在下一页？", "options": [{"key": "A", "text": "你天生适合自己掌舵"}, {"key": "B", "text": "你天生适合深耕领域"}, {"key": "C", "text": "你天生适合大平台"}, {"key": "D", "text": "你天生适合自由职业"}]}], "resultTypes": {"A": {"name": "🔥 老板命", "subtitle": "你天生适合自己掌舵——创业、做生意、带团队", "maturityScore": 89, "indices": [{"label": "决策驱动", "value": 91}, {"label": "结果导向", "value": 87}, {"label": "独立掌控", "value": 85}], "diagnosis": "你总是第一个想到「能不能这样干」。别人还在讨论方案，你已经在画流程图。你有主意、有节奏、有魄力。但每次想推动，都卡在「等审批」「看上级」「先别动」。于是你越来越沉默。不是没想法，是没人给你开枪的权限。不是不努力，是努力被框住了。不是不够好，是平台压不住你的野心。你被困在「有想法但没权力」的循环里——真正的卡点不是能力，是掌控权。\n\n你想要的不是升职加薪，是做决定的权利。你渴望的不是稳定，是亲手塑造结果的快感。你向往的不是被认可，是别人跟着你的方向走。你说你想换个岗位——其实你想拥有决定权。你说你想跳槽——其实你不想再听命于人。你说你想创业——其实你想让自己的脑子直接变现。你心里住着一个老板。它只等一句：你可以。\n\n心理学有一个概念叫「控制点」——内控型的人相信结果由自己决定，外控型的人相信结果由环境决定。你的控制点极偏内——所以被安排会让你产生「权力剥夺感」。不是不想配合，是系统承载不了你的主动。同时你拥有高「自我效能感」：你天然相信「我能做成」。这不是狂妄，这是一种被验证过的天赋——在不确定中找到确定，在混乱中建立秩序。你不是叛逆，你生来就该当指挥者。\n\n\n\n你想要的不是升职加薪，是做决定的权利。你渴望的不是稳定，是亲手塑造结果的快感。你说你想换个岗位——其实你想拥有决定权。你说你想跳槽——其实你不想再听命于人。你心里住着一个老板，它只等一句：你可以。\n\n\n\n心理学有一个概念叫「控制点」——内控型的人相信结果由自己决定。你的控制点极偏内，所以被安排会产生「权力剥夺感」。同时你拥有高「自我效能感」：天然相信「我能做成」。这不是狂妄，是被验证过的天赋——在不确定中找到确定，在混乱中建立秩序。", "radarData": [{"label": "决策力", "value": 91}, {"label": "创造力", "value": 84}, {"label": "整合力", "value": 78}, {"label": "专业力", "value": 62}, {"label": "稳定力", "value": 35}], "suitableJobs": ["创业（电商、餐饮、服务、科技等各领域）", "自由职业转团队Leader", "项目/事业部负责人", "销售型岗位（结果导向）"], "unsuitableJobs": ["高度流程化岗位（行政、财务审核）", "需长期等晋升的体制内工作", "缺乏自主权的执行型岗位", "⚠️ 因为一时冲动裸辞创业", "⚠️ 因为看别人赚钱就盲目跟风", "⚠️ 因为受气就想掀桌子走人", "⚠️ 把「想当老大」当成逃避责任的借口"], "pathCompare": {"good": "自己主导 → 能量越来越强 → 做出影响力 → 吸引更多资源 → 正向循环。未必立刻辞职。可以先业余验证。真正成熟的老板命，不在冲动，在验证。\n\n✅ 走这条路可以避免：「持续憋屈」「能力贬值」「错过验证窗口」", "bad": "待在体系内 → 被安排任务 → 提案被否 → 越来越憋屈 → 开始怀疑自己 → 陷入内耗。你不是能力不够，你是位置不对。\n\n❌ 不走这条路的代价：「持续憋屈」「能力贬值」「错过验证窗口」"}, "plan90": ["【第1-30天·找方向】① 用一张纸列出你现有的3项核心能力、资源、人脉，每项写出2种变现可能。② 在小红书/抖音找到5个已经在你想做的方向上赚到钱的同行，拆解他们的第一个产品、定价、获客方式。③ 从所有可能性中选1个启动成本<3000元、1个月内能看到反馈的方向。④ 用业余时间做出第一版产品/服务，定价99-199元，卖给你的朋友圈或社群，赚到第1笔钱（哪怕只有100块）。✅ 30天目标：手上有1个清晰方向 + 1笔真实收入 + 1份竞品分析笔记", "【第31-60天·建系统】① 把你的产品或服务标准化——写出SOP流程、定价体系、交付标准，让第2个客户的体验和第1个一样好。② 建立你的「最小获客系统」：在1个精准渠道持续输出（小红书/朋友圈/社群），每周至少3条有价值的内容，吸引目标客户主动找你。③ 完成3-5单真实交付，收集客户反馈，迭代你的产品，把复购率提升到30%以上。④ 测算你的「单客经济模型」：获客成本、客单价、复购率、推荐率，算出你需要多少客户才能覆盖基本生活成本。✅ 60天目标：有稳定获客渠道 + 至少3个付费客户 + 清晰的经济模型", "【第61-90天·做决策】① 复盘前60天数据：收入、时间投入、客户满意度、个人状态，判断这个方向是否值得长期投入。② 如果数据OK，制定「3个月翻倍计划」：优化获客效率、提升客单价、建立转介绍机制。③ 如果数据不OK，分析失败原因（方向错了？执行不到位？时机不对？），调整方向或暂停，回到主业继续积累筹码。④ 无论结果如何，写一份「90天复盘报告」：你验证了什么、学到了什么、下一步怎么走。✅ 90天目标：对「要不要All in」有清晰答案，不再纠结"], "closing": "【验证】\n\n不是立刻辞职。是先验证你的想法能赚钱。先证明：你能扛起一片天。\n\n职业成长不是选择题。不是创业或者打工。真正重要的是：你有没有在用自己最擅长的方式创造价值。当你开始自己掌舵——你会发现，那些年的「憋屈」，都是在提醒你：该换位置了。", "posterText": "老板命——你天生适合自己掌舵", "posterSubtext": "不是立刻辞职。是先验证你的想法能赚钱。先证明：你能扛起一片天。", "resultBlocks": {"01": {"title": "你的职业路径状态", "type": "diagnosis", "content": "你骨子里有一种别人压不住的东西。不是叛逆，是本能——你想说了算。"}, "02": {"title": "你真正缺的是什么", "type": "insight", "content": "你的核心问题：有将才，没帅位。自主权 vs 安全感，掌控力 vs 被认可。"}, "03": {"title": "职业资本雷达图", "type": "radar", "data": {"决策力": 91, "创造力": 84, "整合力": 78, "专业力": 62, "稳定力": 35}}, "04": {"title": "当前职业卡点诊断", "type": "empathy", "content": "你总是第一个想到「能不能这样干」。别人还在讨论方案，你已经在画流程图。你有主意、有节奏、有魄力。但每次想推动，都卡在「等审批」「看上级」「先别动」。于是你越来越沉默。不是没想法，是没人给你开枪的权限。不是不努力，是努力被框住了。不是不够好，是平台压不住你的野心。你被困在「有想法但没权力」的循环里——真正的卡点不是能力，是掌控权。"}, "05": {"title": "你真正想要的是什么", "type": "insight", "content": "你想要的不是升职加薪，是做决定的权利。你渴望的不是稳定，是亲手塑造结果的快感。你向往的不是被认可，是别人跟着你的方向走。你说你想换个岗位——其实你想拥有决定权。你说你想跳槽——其实你不想再听命于人。你说你想创业——其实你想让自己的脑子直接变现。你心里住着一个老板。它只等一句：你可以。"}, "06": {"title": "心理机制分析", "type": "psychology", "content": "心理学有一个概念叫「控制点」——内控型的人相信结果由自己决定，外控型的人相信结果由环境决定。你的控制点极偏内——所以被安排会让你产生「权力剥夺感」。不是不想配合，是系统承载不了你的主动。同时你拥有高「自我效能感」：你天然相信「我能做成」。这不是狂妄，这是一种被验证过的天赋——在不确定中找到确定，在混乱中建立秩序。你不是叛逆，你生来就该当指挥者。"}, "07": {"title": "两条路径对比", "type": "comparison", "good": "自己主导 → 能量越来越强 → 做出影响力 → 吸引更多资源 → 正向循环。未必立刻辞职。可以先业余验证。真正成熟的老板命，不在冲动，在验证。", "bad": "待在体系内 → 被安排任务 → 提案被否 → 越来越憋屈 → 开始怀疑自己 → 陷入内耗。你不是能力不够，你是位置不对。"}, "08": {"title": "当前最不建议做什么", "type": "avoid", "items": ["因为一时冲动裸辞创业", "因为看别人赚钱就盲目跟风", "因为受气就想掀桌子走人", "把「想当老大」当成逃避责任的借口"]}, "09": {"title": "风险报告", "type": "risk", "data": {"开创驱动指数": 91, "体系适应指数": 35, "资源整合指数": 78, "行动验证指数": 62, "冲动决策风险": 68}}, "10": {"title": "成本对比", "type": "cost", "change": ["稳定收入中断", "试错周期长", "团队从零搭建", "家庭压力"], "keep": ["持续憋屈", "能力贬值", "错过验证窗口", "越来越沉默"]}, "11": {"title": "最适合你的动作", "type": "action", "keyword": "验证", "content": "不是立刻辞职。是先验证你的想法能赚钱。先证明：你能扛起一片天。"}, "12": {"title": "未来90天验证方案", "type": "plan", "steps": ["【第1-30天·找方向】① 用一张纸列出你现有的3项核心能力、资源、人脉，每项写出2种变现可能。② 在小红书/抖音找到5个已经在你想做的方向上赚到钱的同行，拆解他们的第一个产品、定价、获客方式。③ 从所有可能性中选1个启动成本<3000元、1个月内能看到反馈的方向。④ 用业余时间做出第一版产品/服务，定价99-199元，卖给你的朋友圈或社群，赚到第1笔钱（哪怕只有100块）。✅ 30天目标：手上有1个清晰方向 + 1笔真实收入 + 1份竞品分析笔记", "【第31-60天·建系统】① 把你的产品或服务标准化——写出SOP流程、定价体系、交付标准，让第2个客户的体验和第1个一样好。② 建立你的「最小获客系统」：在1个精准渠道持续输出（小红书/朋友圈/社群），每周至少3条有价值的内容，吸引目标客户主动找你。③ 完成3-5单真实交付，收集客户反馈，迭代你的产品，把复购率提升到30%以上。④ 测算你的「单客经济模型」：获客成本、客单价、复购率、推荐率，算出你需要多少客户才能覆盖基本生活成本。✅ 60天目标：有稳定获客渠道 + 至少3个付费客户 + 清晰的经济模型", "【第61-90天·做决策】① 复盘前60天数据：收入、时间投入、客户满意度、个人状态，判断这个方向是否值得长期投入。② 如果数据OK，制定「3个月翻倍计划」：优化获客效率、提升客单价、建立转介绍机制。③ 如果数据不OK，分析失败原因（方向错了？执行不到位？时机不对？），调整方向或暂停，回到主业继续积累筹码。④ 无论结果如何，写一份「90天复盘报告」：你验证了什么、学到了什么、下一步怎么走。✅ 90天目标：对「要不要All in」有清晰答案，不再纠结"], "closing": "你不需要立刻决定未来十年。你只需要验证下一步。焦虑喜欢幻想，成长喜欢行动。别急着掀桌子。先去证明：你能扛起一片天。"}, "13": {"title": "结语", "type": "closing", "keyword": "掌控权", "content": "职业成长不是选择题。不是创业或者打工。真正重要的是：你有没有在用自己最擅长的方式创造价值。当你开始自己掌舵——你会发现，那些年的「憋屈」，都是在提醒你：该换位置了。"}}, "keyword": "掌控权", "extraBlocks": [{"t": "diagnosis", "h": "📋 当前职业卡点诊断", "c": "你总是第一个想到「能不能这样干」。别人还在讨论方案，你已经在画流程图。你有主意、有节奏、有魄力。但每次想推动，都卡在「等审批」「看上级」「先别动」。于是你越来越沉默。不是没想法，是没人给你开枪的权限。不是不努力，是努力被框住了。不是不够好，是平台压不住你的野心。你被困在「有想法但没权力」的循环里——真正的卡点不是能力，是掌控权。"}, {"t": "insight", "h": "💡 你真正想要的是什么", "c": "你想要的不是升职加薪，是做决定的权利。你渴望的不是稳定，是亲手塑造结果的快感。你向往的不是被认可，是别人跟着你的方向走。你说你想换个岗位——其实你想拥有决定权。你说你想跳槽——其实你不想再听命于人。你说你想创业——其实你想让自己的脑子直接变现。你心里住着一个老板。它只等一句：你可以。"}, {"t": "psychology", "h": "🧠 心理机制分析", "c": "心理学有一个概念叫「控制点」——内控型的人相信结果由自己决定，外控型的人相信结果由环境决定。你的控制点极偏内——所以被安排会让你产生「权力剥夺感」。不是不想配合，是系统承载不了你的主动。同时你拥有高「自我效能感」：你天然相信「我能做成」。这不是狂妄，这是一种被验证过的天赋——在不确定中找到确定，在混乱中建立秩序。你不是叛逆，你生来就该当指挥者。"}, {"t": "avoid", "h": "⚠️ 当前最不建议做什么", "l": ["因为一时冲动裸辞创业", "因为看别人赚钱就盲目跟风", "因为受气就想掀桌子走人", "把「想当老大」当成逃避责任的借口"]}, {"t": "risk", "h": "📊 风险报告", "d": {"开创驱动指数": 91, "体系适应指数": 35, "资源整合指数": 78, "行动验证指数": 62, "冲动决策风险": 68}}, {"t": "cost", "h": "💰 成本对比", "g": ["稳定收入中断", "试错周期长", "团队从零搭建", "家庭压力"], "b": ["持续憋屈", "能力贬值", "错过验证窗口", "越来越沉默"]}, {"t": "action", "h": "🎯 最适合你的动作", "k": "验证", "c": "不是立刻辞职。是先验证你的想法能赚钱。先证明：你能扛起一片天。"}]}, "B": {"name": "💎 技术大拿", "subtitle": "你天生适合深耕一个领域——成为不可替代的人", "maturityScore": 91, "indices": [{"label": "深度专注", "value": 93}, {"label": "专业壁垒", "value": 88}, {"label": "长期积累", "value": 86}], "diagnosis": "你是不是经常被这句话困扰——「我是不是该多学点别的？」你看着别人跨界、转行、斜杠，心里有点羡慕，但又怕：万一换了方向，之前的积累就白费了。万一继续深耕，却发现自己选错了赛道。其实你不是笨，你是太清醒了。你知道深度需要时间，但这个世界总在催你「快一点」「多试几个」。真正的卡点不是不够努力，是你在复利曲线上，别人在红利曲线上——你看不到自己的增长，因为它还没到拐点。\n\n你想要的不是一万种可能，是一种不可替代。你渴望的不是短期暴富，是越来越值钱。你向往的不是风口上的 实你的深度在交叉点。你心里住着一个连接者。它只需要找到属于自己的交叉领域。\n\n心理学研究发现：创新往往发生在「边缘地带」——两个看似无关的领域交叉的地方。你天生就是「边缘人」。不是排挤，是优势：你能同时理解A领域的语言和B领域的逻辑。这叫做「认知多样性」——看同一个问题能用多个视角。单独看某一项能力你都不算最强，但组合在一起，没有人能替代你。你不是不够专注，是你的天赋在于连接。\n\n\n\n你想要的不是一条笔直的路，是一张网。你渴望的不是一个身份，是多重可能。你说你注意力不集中——其实你的能量来自切换。你说你不够深入——其实你的深度在交叉点。你心里住着一个连接者。\n\n\n\n心理学研究发现：创新往往发生在「边缘地带」——两个看似无关的领域交叉的地方。你天生拥有「认知多样性」——看同一个问题能用多个视角。单独看某一项能力你都不算最强，但组合在一起，没有人能替代你。", "radarData": [{"label": "整合力", "value": 92}, {"label": "创造力", "value": 82}, {"label": "适应力", "value": 88}, {"label": "决策力", "value": 65}, {"label": "专业力", "value": 55}], "suitableJobs": ["产品/项目经理", "跨界创业者", "咨询顾问", "内容策展人/社群运营", "斜杠青年（2-3个身份）"], "unsuitableJobs": ["要求极度专注单一技能的工作", "流程固化、不允许灵活变通的岗位", "需长期重复同一任务的角色", "⚠️ 因为别人说「你不够专注」就强迫自己只做一件事", "⚠️ 因为短期内看不到交叉点的价值就放弃", "⚠️ 把多线发展等同于「不够认真」", "⚠️ 等「准备好了」才开始建立个人品牌"], "pathCompare": {"good": "同时发展2-3个方向 → 找到交叉领域的独特定位 → 用组合能力创造价值 → 成为稀缺的连接型人才。\n\n✅ 走这条路可以避免：「能力被压抑」「失去独特定位」「被单一标签框住」", "bad": "被要求只做一件事 → 能力被压抑 → 感到枯燥和束缚 → 开始怀疑自己 → 浪费了你最宝贵的「组合天赋」。\n\n❌ 不走这条路的代价：「能力被压抑」「失去独特定位」「被单一标签框住」"}, "plan90": ["【第1-30天·找方向】① 列出你已有的2-3项核心能力，找到它们的交叉点——比如「设计×教育」「技术×写作」「销售×心理咨询」。② 在小红书搜索「斜杠/跨界」相关账号，找5个能力组合相似的人，研究他们怎么定位自己、怎么变现。③ 写出你独特的「能力组合公式」：用一句话描述你同时擅长什么和什么。④ 在交叉领域找一个具体问题，用你的组合能力去尝试解决——哪怕只是写一篇跨界视角的分析。✅ 30天目标：找到属于你的跨界定位 + 1个能力组合公式", "【第31-60天·建系统】① 选1个交叉领域的具体问题，用你的组合能力去解决，做出1个真实案例（产品/文章/项目）。② 在小红书开始输出你的跨界视角，每周2-3条，让人一眼看出「你和别人不一样」。③ 同时推进2条能力线，每周记录哪条线的反馈更好、更有变现潜力、更让你兴奋。④ 找到3-5个和你有类似跨界组合的人，建一个小群互相反馈和推荐机会。✅ 60天目标：1个跨界案例 + 找到最有潜力的主线 + 跨界同伴", "【第61-90天·做决策】① 复盘2条线的数据：投入时间、收入、成就感、增长潜力——用数据决定主攻方向而不是凭感觉摇摆。② 建立个人品牌标签：让别人一提到你的组合就能想到你——「哦，就是那个把XX和XX结合在一起的人」。③ 找到3-5个潜在合作伙伴或客户，把你的跨界能力转化为真实收益。④ 如果某个方向反馈特别好，开始做减法——把精力集中到最有价值的交叉点上。✅ 90天目标：有明确的跨界定位 + 开始产生收益 + 个人品牌标签建立"], "closing": "【组合】\n\n不是选一条路。是找到你的交叉点。不是做减法。是做乘法。\n\n世界上有两种人：一种在一条路上走到黑，一种把不同的路连成网。你是第二种。你的价值不在「单一深度」，在你的「不可替代的组合」。当你找到那个只属于你的交叉点——你会发现，那些年的「三心二意」，都是在搭建一张别人没有的地图。", "posterText": "斜杠青年——你天生适合跨界连接", "posterSubtext": "不是选一条路。是找到你的交叉点。不是做减法。是做乘法。", "resultBlocks": {"01": {"title": "你的职业路径状态", "type": "diagnosis", "content": "你有一个特别的天赋：能把看起来不相关的东西连在一起。"}, "02": {"title": "你真正缺的是什么", "type": "insight", "content": "你的核心问题：被要求只做一件事，但能量来自多样化。跨界组合 vs 单一标签，多元身份 vs 专注压力。"}, "03": {"title": "职业资本雷达图", "type": "radar", "data": {"整合力": 92, "创造力": 82, "适应力": 88, "决策力": 65, "专业力": 55}}, "04": {"title": "当前职业卡点诊断", "type": "empathy", "content": "你是不是经常被说——「你什么都想做，什么都做不深。」你学了A，又喜欢B，后来又接触了C。每个单独看好像都不够深，但组合在一起就是独一无二的竞争力。你的困扰不是不够专注，是这个世界的岗位设计装不下你这种「复合型」的人。公司要你填一个title，但你心里有五个身份。真正的卡点不是你分散，是你还没找到那个「只属于你」的交叉领域。"}, "05": {"title": "你真正想要的是什么", "type": "insight", "content": "你想要的不是一条笔直的路，是一张网。你渴望的不是一个身份，是多重可能。你向往的不是专精到极致，是不可替代的组合。你说你注意力不集中——其实你的能量来自切换。你说你不够深入——其实你的深度在交叉点。你心里住着一个连接者。它只需要找到属于自己的交叉领域。"}, "06": {"title": "心理机制分析", "type": "psychology", "content": "心理学研究发现：创新往往发生在「边缘地带」——两个看似无关的领域交叉的地方。你天生就是「边缘人」。不是排挤，是优势：你能同时理解A领域的语言和B领域的逻辑。这叫做「认知多样性」——看同一个问题能用多个视角。单独看某一项能力你都不算最强，但组合在一起，没有人能替代你。你不是不够专注，是你的天赋在于连接。"}, "07": {"title": "两条路径对比", "type": "comparison", "good": "同时发展2-3个方向 → 找到交叉领域的独特定位 → 用组合能力创造价值 → 成为稀缺的连接型人才。", "bad": "被要求只做一件事 → 能力被压抑 → 感到枯燥和束缚 → 开始怀疑自己 → 浪费了你最宝贵的「组合天赋」。"}, "08": {"title": "当前最不建议做什么", "type": "avoid", "items": ["因为别人说「你不够专注」就强迫自己只做一件事", "因为短期内看不到交叉点的价值就放弃", "把多线发展等同于「不够认真」", "等「准备好了」才开始建立个人品牌"]}, "09": {"title": "风险报告", "type": "risk", "data": {"跨界整合指数": 92, "单一专注指数": 42, "多元适应指数": 88, "方向焦虑": 72, "变现转化指数": 58}}, "10": {"title": "成本对比", "type": "cost", "change": ["被说「不够专注」", "短期内收入分散", "需要不断学习", "身份焦虑"], "keep": ["能力被压抑", "失去独特定位", "被单一标签框住", "越来越不像自己"]}, "11": {"title": "最适合你的动作", "type": "action", "keyword": "组合", "content": "不是选一条路。是找到你的交叉点。不是做减法。是做乘法。"}, "12": {"title": "未来90天验证方案", "type": "plan", "steps": ["【第1-30天·找方向】① 列出你已有的2-3项核心能力，找到它们的交叉点——比如「设计×教育」「技术×写作」「销售×心理咨询」。② 在小红书搜索「斜杠/跨界」相关账号，找5个能力组合相似的人，研究他们怎么定位自己、怎么变现。③ 写出你独特的「能力组合公式」：用一句话描述你同时擅长什么和什么。④ 在交叉领域找一个具体问题，用你的组合能力去尝试解决——哪怕只是写一篇跨界视角的分析。✅ 30天目标：找到属于你的跨界定位 + 1个能力组合公式", "【第31-60天·建系统】① 选1个交叉领域的具体问题，用你的组合能力去解决，做出1个真实案例（产品/文章/项目）。② 在小红书开始输出你的跨界视角，每周2-3条，让人一眼看出「你和别人不一样」。③ 同时推进2条能力线，每周记录哪条线的反馈更好、更有变现潜力、更让你兴 osis": "你是不是被问过：「你为什么不能像别人一样好好上班？」你试过。你试过朝九晚五、打卡、开会、汇报。但你在那个环境里，自动进入低电量模式。不是你不合群。不是你不努力。不是你没能力。你只是——被管着，就萎了。而一旦有了自主权，你的效率和创造力会让所有人惊讶。别人眼中的「不稳定」对你来说是自由，别人害怕的「不确定性」对你来说是可能性。真正的卡点不是能力不够，是你被放在了错误的框架里。\n\n你想要的不是高薪，是自己说了算。你渴望的不是职级，是时间和空间的自由。你向往的不是被认可，是被信任能自己搞定。你说你想辞职——不是不想工作，是不想被管着工作。你说你想创业——不是想当老板，是想按自己的节奏来。你心里住着一个游牧者。它只需要：信任、空间、和自己掌控的节奏。\n\n心理学中有一个概念叫「自我决定论」——人的内在动机来自三个需求：自主权、胜任感、关系连接。你的「自主权需求」远超常人。所以被管理会触发你的「心理阻抗」——一种本能的「被控制就要反抗」的反应。不是你叛逆。是你的动力系统和别人不一样：别人被督促会加速，你被督促会熄火。别人需要外部驱动，你需要内部掌控。你不是不想工作，你只是不想被管着工作。\n\n\n\n你想要的不是高薪，是自己说了算。你渴望的不是职级，是时间和空间的自由。你说你想辞职——不是不想工作，是不想被管着工作。你心里住着一个游牧者，它只需要：信任、空间、和自己掌控的节奏。\n\n\n\n心理学中的「自我决定论」指出：人的内在动机来自自主权、胜任感、关系连接。你的「自主权需求」远超常人，被管理会触发「心理阻抗」。不是你叛逆——别人被督促会加速，你被督促会熄火。别人需要外部驱动，你需要内部掌控。", "radarData": [{"label": "创造力", "value": 92}, {"label": "独立性", "value": 89}, {"label": "自我管理", "value": 82}, {"label": "专业力", "value": 62}, {"label": "稳定力", "value": 25}], "suitableJobs": ["自由职业者（设计师、摄影师、翻译、程序员）", "内容创作者（博主、UP主、播客主理人）", "独立咨询师/教练", "远程工作者（数字游民）"], "unsuitableJobs": ["朝九晚五打卡的办公室工作", "层级森严、流程繁琐的大公司", "被严格KPI管束的销售工作", "⚠️ 因为别人说「不稳定」就放弃自由职业", "⚠️ 在没有收入验证的情况下裸辞", "⚠️ 把自由等同于「不用努力」", "⚠️ 因为短期焦虑就回到自己不喜欢的框架"], "pathCompare": {"good": "找到可变现的技能 → 建立客户/受众 → 掌控自己的时间 → 越自由越有创造力 → 自由和收入同时增长。\n\n✅ 走这条路可以避免：「持续窒息感」「创造力被压制」「每天都像在演戏」", "bad": "每天按时打卡 → 精神内耗 → 效率低下 → 开始怀疑自己 → 不是因为能力，是因为框架不对。\n\n❌ 不走这条路的代价：「持续窒息感」「创造力被压制」「每天都像在演戏」"}, "plan90": ["【第1-30天·找方向】① 盘点所有可以独立变现的技能（设计、写作、咨询、拍摄、翻译、编程等），每项写出2种变现可能。② 在小红书/闲鱼找到5个做同类自由职业的人，研究他们的定价策略、接单方式、客户来源、收入水平。③ 选出最有把握的1个技能方向，用业余时间接第1个单子或发第1个作品——验证市场愿不愿意为你付费。④ 设定你的第一个「自由收入目标」：哪怕只有500块，关键是验证「有人愿意为你的技能买单」。✅ 30天目标：1个可变现方向 + 第1笔自由收入（哪怕500块）", "【第31-60天·建系统】① 把你的服务标准化：定好价格体系（基础版/进阶版/定制版）、交付流程、客户沟通话术。② 选1个主要获客渠道（小红书/朋友圈/接单平台），每周稳定输出3条内容或主动联系3个潜在客户。③ 完成5单真实交付，收集客户反馈——迭代你的服务内容和交付质量，把好评率做到80%以上。④ 建立客户管理系统：整理已服务客户的反馈、复购意愿、转介绍可能性，第6-10个客户从前5个客户的关系网中来。✅ 60天目标：稳定接单渠道 + 5个付费客户 + 标准化的服务体系", "【第61-90天·做决策】① 算清楚账：现在的自由职业收入能覆盖多少生活成本？缺口有多大？还需要多久才能完全替代主业收入？② 如果已覆盖70%以上，认真规划全职转型的时间表——包括社保、税务、客户合同等实操细节。③ 如果还差很远，继续副业积累，但设定一个明确的「自由转换日」目标——比如「月收入连续 (function(){
const app = document.getElementById('app');
let answers = {};           // { questionId: optionKey }
let currentQuestion = 0;
let currentRoute = '';
let typewriterTimer = null;

// ── 路由 ──────────────────────────────
function navigate(route) {
  if (typewriterTimer) { clearInterval(typewriterTimer); typewriterTimer = null; }
  currentRoute = route;
  window.location.hash = route;
  render();
  window.scrollTo(0, 0);
}

function getRoute() {
  const hash = window.location.hash.replace('#', '') || '/';
  return hash;
}

// ── 渲染主入口 ────────────────────────
function render() {
  const route = getRoute();
  currentRoute = route;

  switch(route) {
    case '/': renderHome(); break;
    case '/quiz': renderQuiz(); break;
    case '/loading': renderLoading(); break;
    case '/result': renderResult(); break;
    default: navigate('/'); break;
  }
}

// ── 首页 ──────────────────────────────
function renderHome() {
  const h = CONFIG.home;
  const dims = CONFIG.dimensions || [];
  app.innerHTML = `
    <div class="page active">
      <div class="home-header">
        <h1>${h.title}</h1>
        <p class="sub">${h.subtitle}</p>
      </div>
      <div class="home-intro">${h.introHTML || h.intro}</div>
      ${dims.length ? `<div class="dim-grid">${dims.map(d =>
        `<div class="dim-card"><span class="icon">${d.icon||'📊'}</span>${d.name}</div>`
      ).join('')}</div>` : ''}
      <button class="btn btn-primary" onclick="APP.start()">${h.btnText||'开始测试'}</button>
      <p class="footer-note">${h.disclaimer||'本测试仅供娱乐参考，非科学评估。'}</p>
      <p class="footer-code">${CONFIG.scoring.questionCount || CONFIG.questions.length} Questions · ${(CONFIG.dimensions||[]).length||1} Dimensions · 1 Diagnosis</p>
    </div>`;
}

// ── 测试页 ────────────────────────────
function renderQuiz() {
  const questions = CONFIG.questions;
  const dims = CONFIG.dimensions || [];
  const total = questions.length;
  const q = questions[currentQuestion];
  const dim = dims.find(d => (d.questionIds||[]).includes(q.id));
  const dimName = dim ? dim.name : '';
  const progress = ((currentQuestion) / total * 100).toFixed(0);
  const moduleLabel = dimName ? `${dimName}` : '';

  app.innerHTML = `
    <div class="page active">
      <div class="quiz-header">
        <div class="quiz-meta">
          <span class="quiz-module">${moduleLabel}</span>
          <span class="quiz-progress">${currentQuestion + 1} / ${total}</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      </div>
      <div class="quiz-card">
        <h3>${q.text}</h3>
        ${q.options.map((opt, i) => `
          <button class="opt-btn" onclick="APP.answer('${opt.key}')" id="opt-${i}">
            <span class="opt-key">${opt.key}</span>${opt.text}
          </button>
        `).join('')}
      </div>
      <p class="quiz-hint">选择后自动进入下一题</p>
    </div>`;
}

// ── 作答 ──────────────────────────────
function answer(key) {
  const q = CONFIG.questions[currentQuestion];
  answers[q.id] = key;
  currentQuestion++;

  if (currentQuestion >= CONFIG.questions.length) {
    navigate('/loading');
  } else {
    renderQuiz();
    window.scrollTo(0, 0);
  }
}

// ── 加载页（逐字打印） ────────────────
function renderLoading() {
  const msgs = CONFIG.loadingMessages || ['正在分析中……', '分析完成。'];
  app.innerHTML = `
    <div class="page active">
      <div class="loading-wrap">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="typewriter"></div>
      </div>
    </div>`;

  const el = document.getElementById('typewriter');
  let msgIdx = 0;
  let charIdx = 0;
  let allDone = false;

  function tick() {
    if (allDone) return;
    if (msgIdx >= msgs.length) {
      el.classList.add('loading-done');
      el.textContent = msgs[msgs.length - 1];
      allDone = true;
      setTimeout(() => navigate('/result'), 800);
      return;
    }
    const msg = msgs[msgIdx];
    if (charIdx <= msg.length) {
      el.textContent = msg.slice(0, charIdx);
      charIdx++;
      typewriterTimer = setTimeout(tick, 60 + Math.random() * 40);
    } else {
      msgIdx++;
      charIdx = 0;
      typewriterTimer = setTimeout(tick, 400);
    }
  }
  tick();
}

// ── 评分 ──────────────────────────────
function calculateResult() {
  const scoring = CONFIG.scoring || {};
  const counts = {};
  for (const key of Object.keys(CONFIG.resultTypes)) {
    counts[key] = 0;
  }
  for (const ans of Object.values(answers)) {
    if (counts[ans] !== undefined) counts[ans]++;
  }
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  const primary = sorted[0][0];
  const secondary = sorted.length > 1 && (sorted[0][1] - sorted[1][1]) <= (scoring.mixedThreshold || 3) && sorted[1][1] > 0
    ? sorted[1][0] : null;

  return { primary, secondary, counts, hasSecondary: !!secondary };
}

// ── 雷达图 SVG ────────────────────────
function renderRadar(data, size = 260) {
  const cx = size / 2, cy = size / 2, r = size * 0.35;
  const n = data.length;
  if (n < 3) return '<p style="text-align:center;color:var(--c-muted)">数据不足</p>';

  const angleStep = (2 * Math.PI) / n;
  const levels = 5;
  let paths = '';

  // 背景网格
  for (let lv = 1; lv <= levels; lv++) {
    const rr = r * (lv / levels);
    let pts = [];
    for (let i = 0; i < n; i++) {
      const angle = angleStep * i - Math.PI / 2;
      pts.push(`${cx + rr * Math.cos(angle)},${cy + rr * Math.sin(angle)}`);
    }
    paths += `<polygon points="${pts.join(' ')}" fill="none" stroke="var(--c-border)" stroke-width="0.5"/>`;
  }

  // 轴线
  for (let i = 0; i < n; i++) {
    const angle = angleStep * i - Math.PI / 2;
    paths += `<line x1="${cx}" y1="${cy}" x2="${cx + r * Math.cos(angle)}" y2="${cy + r * Math.sin(angle)}" stroke="var(--c-border)" stroke-width="0.5"/>`;
  }

  // 数据多边形
  let dataPts = [];
  for (let i = 0; i < n; i++) {
    const angle = angleStep * i - Math.PI / 2;
    const val = Math.max(0, Math.min(100, data[i].value || 0)) / 100;
    const rr = r * val;
    dataPts.push(`${cx + rr * Math.cos(angle)},${cy + rr * Math.sin(angle)}`);
  }
  paths += `<polygon points="${dataPts.join(' ')}" fill="var(--c-primary)" fill-opacity="0.2" stroke="var(--c-primary)" stroke-width="2"/>`;

  // 数据点
  for (let i = 0; i < n; i++) {
    const angle = angleStep * i - Math.PI / 2;
    const val = Math.max(0, Math.min(100, data[i].value || 0)) / 100;
    const rr = r * val;
    paths += `<circle cx="${cx + rr * Math.cos(angle)}" cy="${cy + rr * Math.sin(angle)}" r="4" fill="var(--c-primary)"/>`;
  }

  // 标签
  let labels = '';
  for (let i = 0; i < n; i++) {
    const angle = angleStep * i - Math.PI / 2;
    const lr = r + 24;
    const lx = cx + lr * Math.cos(angle);
    const ly = cy + lr * Math.sin(angle);
    const anchor = lx < cx - 10 ? 'end' : lx > cx + 10 ? 'start' : 'middle';
    labels += `<text x="${lx}" y="${ly}" text-anchor="${anchor}" dominant-baseline="middle" font-size="11" fill="var(--c-text)" font-weight="600">${data[i].label}</text>`;
  }

  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg">${paths}${labels}</svg>`;
}

// ── 结果页 ────────────────────────────
function renderResult() {
  const result = calculateResult();
  const rt = CONFIG.resultTypes[result.primary];
  if (!rt) { navigate('/'); return; }

  const secondaryRt = result.hasSecondary ? CONFIG.resultTypes[result.secondary] : null;
  const typeName = secondaryRt ? `${rt.name} × ${secondaryRt.name}` : rt.name;
  const subtitle = secondaryRt
    ? `你同时具备${rt.name}和${secondaryRt.name}的特质，属于复合型人才`
    : rt.subtitle;

  // 混合型诊断
  let mixedNote = '';
  if (result.hasSecondary && CONFIG.mixedNotes) {
    const key = `${result.primary}+${result.secondary}`;
    const keyRev = `${result.secondary}+${result.primary}`;
    mixedNote = CONFIG.mixedNotes[key] || CONFIG.mixedNotes[keyRev] || '';
  }

  const indices = rt.indices || [];
  const radar = rt.radarData || [];
  const jobs = rt.suitableJobs || [];
  const noJobs = rt.unsuitableJobs || [];
  const plan = rt.plan90 || [];
  const pathC = rt.pathCompare || {};

  app.innerHTML = `
    <div class="page active">
      <div class="result-header">
        <div class="result-type">${typeName}</div>
        <p class="result-subtitle">${subtitle}</p>
        <div class="score-ring">${rt.maturityScore}</div>
        <p class="score-label">${CONFIG.scoring.scoreLabel || '职业路径决策成熟度'}</p>
      </div>

      ${indices.length ? `
      <div class="section">
        <h3>📊 关键指数</h3>
        <div class="indices-row">${indices.map(ix => `
          <div class="index-item"><div class="index-val">${ix.value}</div><div class="index-label">${ix.label}</div></div>
        `).join('')}</div>
      </div>` : ''}

      <div class="section">
        <h3>🔍 核心诊断</h3>
        <div class="diagnosis-text">${rt.diagnosis}${mixedNote ? '\n\n' + mixedNote : ''}</div>
      </div>

      ${radar.length >= 3 ? `
      <div class="section">
        <h3>📡 能力雷达图</h3>
        <div class="radar-wrap">${renderRadar(radar)}</div>
      </div>` : ''}

      ${jobs.length ? `
      <div class="section">
        <h3>🍚 适合的饭碗</h3>
        <ul class="job-list">${jobs.map(j => `<li>${j}</li>`).join('')}</ul>
      </div>` : ''}

      ${noJobs.length ? `
      <div class="section">
        <h3>⚠️ 不太适合的方向</h3>
        <ul class="no-list">${noJobs.map(j => `<li>${j}</li>`).join('')}</ul>
      </div>` : ''}

      ${(pathC.good || pathC.bad) ? `
      <div class="section">
        <h3>🔀 两条路径对比</h3>
        <div class="compare-grid">
          <div class="compare-card compare-good"><h4>✅ 顺应天赋</h4><p>${pathC.good||''}</p></div>
          <div class="compare-card compare-bad"><h4>⚠️ 逆天赋而行</h4><p>${pathC.bad||''}</p></div>
        </div>
      </div>` : ''}

      ${plan.length ? `
      <div class="section">
        <h3>📋 90天行动清单</h3>
        <ul class="plan-steps">${plan.map((p,i) => `
          <li><strong>第${i+1}步（第${i*30+1}-${(i+1)*30}天）</strong>：${p}</li>
        `).join('')}</ul>
      </div>` : ''}

      <div class="section">
        <p class="closing-text">${rt.closing||''}</p>
      </div>

      
      ${(rt.extraBlocks||[]).map(function(b,i){
        if(b.t==='diagnosis'||b.t==='insight'||b.t==='psychology')
          return '<div class=\'section\'><div class=\'rb-h\'>'+b.h+'</div><div class=\'rb-t\'>'+(b.c||'')+'</div></div>';
        if(b.t==='avoid')
          return '<div class=\'section\'><div class=\'rb-h\'>'+b.h+'</div>'+b.l.map(function(x){return '<div class=\'avd-i\'>× '+x+'</div>'}).join('')+'</div>';
        if(b.t==='risk')
          return '<div class=\'section\'><div class=\'rb-h\'>'+b.h+'</div>'+Object.keys(b.d).map(function(k){var v=b.d[k];var lv=v>80?'hi':v>50?'mi':'lo';return '<div class=\'rsk-r\'><span class=\'rsk-l\'>'+k+'</span><div class=\'rsk-b\'><div class=\'rsk-f '+lv+'\' style=\'width:'+v+'%\'></div></div><span class=\'rsk-v\'>'+v+'%</span></div>'}).join('')+'</div>';
        if(b.t==='cost')
          return '<div class=\'section\'><div class=\'rb-h\'>'+b.h+'</div><div class=\'compare-grid\'><div class=\'compare-card compare-good\'><h4>改变成本</h4>'+b.g.map(function(x){return '<div>· '+x+'</div>'}).join('')+'</div><div class=\'compare-card compare-bad\'><h4>不改变成本</h4>'+b.b.map(function(x){return '<div>· '+x+'</div>'}).join('')+'</div></div></div>';
        if(b.t==='action')
          return '<div class=\'section\'><div class=\'rb-h\'>'+b.h+'</div><div class=\'act-kw\'>'+b.k+'</div><div class=\'rb-t\' style=\'text-align:center\'>'+(b.c||'')+'</div></div>';
        return '';
      }).join('')}

<div class="result-actions">
        <button class="btn btn-outline" onclick="APP.restart()">重新测试</button>
        <button class="btn btn-primary" onclick="APP.showPoster()">📤 分享结果</button>
      </div>
    </div>`;

  // 保存海报数据
  window._posterData = { typeName, posterText: rt.posterText||rt.name, posterSubtext: rt.posterSubtext||rt.subtitle, meta: CONFIG.meta };
}

// ── 分享海报 ──────────────────────────
function showPoster() {
  const pd = window._posterData || {};
  const overlay = document.createElement('div');
  overlay.className = 'poster-overlay show';
  overlay.id = 'poster-overlay';
  overlay.innerHTML = `
    <div class="poster-card" id="poster-card">
      <p style="font-size:.75rem;color:var(--c-muted);margin-bottom:8px">我的测试结果</p>
      <div class="ptype">${pd.posterText||''}</div>
      <p class="psub">${pd.posterSubtext||''}</p>
      <div style="width:60px;height:3px;background:var(--c-primary);margin:16px auto;border-radius:2px"></div>
      <p style="font-size:.75rem;color:var(--c-muted)">「${pd.meta?.title||''}」</p>
      <div class="pfooter">扫码测测你的 →</div>
    </div>
    <p class="poster-close" onclick="this.parentElement.remove()">关闭</p>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', function(e){ if(e.target===this) this.remove(); });
}

// ── 重新开始 ──────────────────────────
function restart() {
  answers = {};
  currentQuestion = 0;
  sessionStorage.removeItem('quiz_answers');
  navigate('/');
}

// ── 初始化 ────────────────────────────
function init() {
  // 尝试从 sessionStorage 恢复
  const saved = sessionStorage.getItem('quiz_answers');
  if (saved) {
    try { answers = JSON.parse(saved); } catch(e) {}
  }

  window.addEventListener('hashchange', render);
  render();
}

// ── 暴露 API ──────────────────────────
window.APP = {
  start: () => { answers = {}; currentQuestion = 0; navigate('/quiz'); },
  answer: (key) => {
    answer(key);
    // 保存到 sessionStorage
    sessionStorage.setItem('quiz_answers', JSON.stringify(answers));
  },
  restart,
  showPoster,
  navigate,
};

init();
})();
</script>
