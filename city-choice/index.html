<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>一线拼还是小城躺？城市选择人格测试</title>
<meta name="description" content=""/>
<style>
:root{
  --c-bg:#fefaf6;--c-card:#fff;--c-text:#2c2420;--c-muted:#8c7a6b;
  --c-primary:#d4784a;--c-primary-light:#fdf0e8;--c-border:#e8ddd2;
  --c-accent-a:#e8784a;--c-accent-b:#4a9eb0;--c-accent-c:#8b6caf;
  --c-accent-d:#5a8a6a;--c-accent-e:#c08050;--c-danger:#c44;
  --radius:12px;--shadow:0 2px 16px rgba(60,30,10,.06);
  --font:system-ui,-apple-system,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--c-bg);color:var(--c-text);line-height:1.6;
  -webkit-font-smoothing:antialiased;min-height:100vh;display:flex;justify-content:center}
#app{width:100%;max-width:480px;min-height:100vh;position:relative;overflow:hidden}
.page{display:none;padding:24px 20px 40px;min-height:100vh}
.page.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* 首页 */
.home-header{text-align:center;padding-top:40px}
.home-header h1{font-size:1.75rem;font-weight:800;color:var(--c-primary);line-height:1.3;margin-bottom:8px}
.home-header .sub{font-size:.9rem;color:var(--c-muted);margin-bottom:32px;line-height:1.5}
.home-intro{background:var(--c-card);border-radius:var(--radius);padding:20px;margin-bottom:20px;
  box-shadow:var(--shadow);font-size:.875rem;color:var(--c-muted);line-height:1.8}
.home-intro p{margin-bottom:8px}
.home-intro .highlight{color:var(--c-primary);font-weight:600}
.dim-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px}
.dim-card{background:var(--c-card);border:1px solid var(--c-border);border-radius:var(--radius);
  padding:14px 12px;text-align:center;font-size:.8rem;font-weight:600;color:var(--c-text)}
.dim-card .icon{font-size:1.3rem;display:block;margin-bottom:4px}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:var(--radius);
  font-size:1rem;font-weight:700;cursor:pointer;text-align:center;transition:all .15s}
.btn-primary{background:var(--c-primary);color:#fff}
.btn-primary:active{opacity:.85;transform:scale(.98)}
.btn-outline{background:var(--c-card);color:var(--c-primary);border:1.5px solid var(--c-border)}
.footer-note{text-align:center;font-size:.7rem;color:var(--c-muted);margin-top:16px}
.footer-code{text-align:center;font-size:.7rem;color:var(--c-muted);margin-top:8px;
  font-family:'SF Mono',Consolas,monospace}

/* 测试页 */
.quiz-header{padding:8px 0 16px}
.quiz-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.quiz-module{font-size:.75rem;color:var(--c-primary);font-weight:600;background:var(--c-primary-light);
  padding:4px 10px;border-radius:20px}
.quiz-progress{font-size:.75rem;color:var(--c-muted)}
.progress-bar{height:3px;background:var(--c-border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--c-primary);transition:width .3s ease;border-radius:2px}
.quiz-card{background:var(--c-card);border-radius:var(--radius);padding:24px 20px;
  box-shadow:var(--shadow);margin-bottom:12px}
.quiz-card h3{font-size:1rem;font-weight:700;margin-bottom:20px;line-height:1.5}
.opt-btn{display:block;width:100%;padding:14px 16px;margin-bottom:8px;background:var(--c-bg);
  border:1.5px solid var(--c-border);border-radius:var(--radius);text-align:left;
  font-size:.9rem;cursor:pointer;transition:all .12s;color:var(--c-text)}
.opt-btn:active,.opt-btn.selected{background:var(--c-primary-light);border-color:var(--c-primary);
  color:var(--c-primary);font-weight:600}
.opt-key{display:inline-block;width:24px;height:24px;line-height:24px;text-align:center;
  background:var(--c-border);border-radius:50%;font-size:.75rem;font-weight:700;margin-right:8px}
.quiz-hint{text-align:center;font-size:.7rem;color:var(--c-muted);padding:8px}

/* 加载页 */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:70vh;text-align:center}
.loading-spinner{width:40px;height:40px;border:3px solid var(--c-border);
  border-top-color:var(--c-primary);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:24px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:.95rem;color:var(--c-text);min-height:28px;line-height:1.6}
.loading-done{color:var(--c-primary);font-weight:600}

/* 结果页 */
.result-header{text-align:center;padding-top:20px}
.result-type{font-size:2rem;font-weight:800;color:var(--c-primary);margin-bottom:4px}
.result-subtitle{font-size:.9rem;color:var(--c-muted);margin-bottom:20px}
.score-ring{display:inline-flex;align-items:center;justify-content:center;
  width:80px;height:80px;border-radius:50%;border:4px solid var(--c-primary);
  font-size:1.5rem;font-weight:800;color:var(--c-primary);margin-bottom:8px}
.score-label{font-size:.75rem;color:var(--c-muted);margin-bottom:24px}

.section{background:var(--c-card);border-radius:var(--radius);padding:20px;
  box-shadow:var(--shadow);margin-bottom:14px}
.section h3{font-size:.85rem;font-weight:700;color:var(--c-primary);margin-bottom:12px;
  padding-bottom:8px;border-bottom:1px solid var(--c-border)}
.indices-row{display:flex;gap:10px;flex-wrap:wrap}
.index-item{flex:1;min-width:80px;text-align:center;padding:10px 6px;
  background:var(--c-bg);border-radius:8px}
.index-val{font-size:1.3rem;font-weight:800;color:var(--c-primary)}
.index-label{font-size:.7rem;color:var(--c-muted);margin-top:2px}

.diagnosis-text{font-size:.85rem;line-height:1.8;color:var(--c-text);white-space:pre-line}

.radar-wrap{display:flex;justify-content:center;padding:8px 0}
.radar-wrap svg{max-width:280px;width:100%}

.job-list,.no-list{list-style:none;padding:0}
.job-list li,.no-list li{padding:8px 12px;margin-bottom:4px;background:var(--c-bg);
  border-radius:6px;font-size:.82rem;display:flex;align-items:center;gap:8px}
.job-list li::before{content:'✅';font-size:.75rem}
.no-list li::before{content:'⚠️';font-size:.75rem}

.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.compare-card{padding:14px;border-radius:8px;font-size:.8rem;line-height:1.6}
.compare-good{background:#f0f7f0;border:1px solid #c8e0c8}
.compare-bad{background:#fef5f0;border:1px solid #f0d8c8}
.compare-card h4{font-size:.8rem;margin-bottom:6px}

.plan-steps{list-style:none;padding:0}
.plan-steps li{padding:10px 12px;margin-bottom:6px;background:var(--c-bg);
  border-radius:6px;font-size:.8rem;line-height:1.5;border-left:3px solid var(--c-primary)}

.closing-text{font-size:.85rem;color:var(--c-muted);font-style:italic;text-align:center;line-height:1.7}

.result-actions{display:flex;gap:10px;margin-top:20px}
.result-actions .btn{flex:1;font-size:.85rem;padding:12px}

/* 海报弹窗 */
.poster-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;
  justify-content:center;align-items:center;padding:20px}
.poster-overlay.show{display:flex}
.poster-card{background:#fff;border-radius:16px;padding:32px 24px;max-width:320px;width:100%;
  text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.15)}
.poster-card .ptype{font-size:1.8rem;font-weight:800;color:var(--c-primary);margin-bottom:4px}
.poster-card .psub{font-size:.85rem;color:var(--c-muted);margin-bottom:16px}
.poster-card .pfooter{font-size:.7rem;color:var(--c-muted);margin-top:20px;padding-top:14px;
  border-top:1px solid var(--c-border)}
.poster-close{margin-top:16px;font-size:.8rem;color:var(--c-muted);cursor:pointer;text-align:center}
</style>
</head>

年总监，五年VP，速度即正义"}, {"key": "B", "text": "稳健上升：在一家有成长空间的公司深耕，每两年上一个台阶"}, {"key": "C", "text": "稳定就好：工作只是生活的一部分，安稳比升职更重要"}, {"key": "D", "text": "非线性路径：接项目、做自由职业、搞副业，收入多元化比头衔重要"}, {"key": "E", "text": "扎根型：在家乡找到一个有长期价值的领域，慢慢做深做透"}]}, {"id": 5, "text": "当你听到「弱肉强食、适者生存」这句话时，你的态度是？", "options": [{"key": "A", "text": "这就是世界的真相，我要成为强者"}, {"key": "B", "text": "有一定道理，但人不应该只是「生存」，还要「生活」"}, {"key": "C", "text": "不太认同，社会应该是多元的，不是只有一种成功标准"}, {"key": "D", "text": "不完全认可，聪明的人会找到自己的生态位，而不是硬碰硬"}, {"key": "E", "text": "我觉得「适者」不一定非要在最卷的地方，找到适合的土壤更重要"}]}, {"id": 6, "text": "你在职场上经历过的最大的「失败」是什么级别的？你的反应是？", "options": [{"key": "A", "text": "重大失败——但每次被打倒我都更快爬起来，失败只会让我更饥渴"}, {"key": "B", "text": "有过挫折，我会认真复盘调整策略，但不会被失败定义人生"}, {"key": "C", "text": "没经历过什么重大失败，也不太想经历，安安稳稳最重要"}, {"key": "D", "text": "失败过好几次，每次换个方向继续试，灵活切换才能活得久"}, {"key": "E", "text": "在家乡尝试过几个项目，有成的有败的，但扎根的感觉让我坚持"}]}, {"id": 7, "text": "面对两个offer：一个「高底薪+低股权」，一个「低底薪+高股权」，你的倾向是？", "options": [{"key": "A", "text": "两个都要谈到极致——既然卷就要卷最大的总包，底薪和股权都不能少"}, {"key": "B", "text": "综合评估总包和成长空间，底薪保障生活，股权博一个未来"}, {"key": "C", "text": "果断选高底薪的那个，我不喜欢不确定性，落袋为安"}, {"key": "D", "text": "选灵活度最高的——最好能远程、不打卡，收入方式我可以自己组合"}, {"key": "E", "text": "看哪个能让我留在家乡或对家乡有长期价值，钱不是唯一标准"}]}, {"id": 8, "text": "你心中的「够了」——多少收入、什么状态让你觉得「可以了，不再焦虑了」？", "options": [{"key": "A", "text": "没有「够了」这个概念，我要一直往上走，停下来就是退步"}, {"key": "B", "text": "有一个大概的里程碑，达到之后会调整节奏但不是完全躺平"}, {"key": "C", "text": "够用就好——能覆盖舒适生活+一点存款+偶尔旅行，就已经很幸福了"}, {"key": "D", "text": "收入不是目标，自由才是——「够了」就是当我可以随时选择不工作的时候"}, {"key": "E", "text": "当我在家乡的事业能稳定运转，带动一些人就业，照顾好家人就行了"}]}, {"id": 9, "text": "周一早上，你最希望以什么状态开始新的一周？", "options": [{"key": "A", "text": "7点起床，一杯咖啡冲向地铁，在9点前坐到办公室准备战斗"}, {"key": "B", "text": "8点起床，骑车或散步去公司，路上顺便听听播客"}, {"key": "C", "text": "9点自然醒，慢悠悠吃个早餐，10点不慌不忙开始一天"}, {"key": "D", "text": "无所谓几点起，今天可能在咖啡馆工作，也可能在海边打开电脑"}, {"key": "E", "text": "8点起来，骑个小电驴去自己在家乡开的小店或工作室"}]}, {"id": 10, "text": "通勤时间超过1小时（单程），你能接受吗？", "options": [{"key": "A", "text": "太正常了，大城市谁不通勤？路上还能看看行业资讯"}, {"key": "B", "text": "能接受，但会尽量控制在40分钟内，超过1小时会考虑搬家"}, {"key": "C", "text": "完全不能接受，每天花2小时在路上是对生命的浪费"}, {"key": "D", "text": "不存在通勤这个概念，我选择住在哪和在哪工作是两回事"}, {"key": "E", "text": "在家乡15分钟就能到任何地方，这才是正常的生活"}]}, {"id": 11, "text": "你的周末理想状态是？", "options": [{"key": "A", "text": "参加行业沙龙、混圈子、看展、打卡新店——不能浪费一线城市的资源"}, {"key": "B", "text": "一天给自己充电（健身/学习/探店），一天和朋友聚聚或者宅着"}, {"key": "C", "text": "睡到自然醒，买菜做饭，逛逛公园，晚上追剧——慢下来才是周末的意义"}, {"key": "D", "text": "周末？我的工作和生活没有严格边界，周四可能在三亚边度假边干活"}, {"key": "E", "text": "陪家人、帮父母打理家里的生意或田地、和老朋友喝茶聊天"}]}, {"id": 12, "text": "你对「等待」的耐心程度如何？比如排队2小时吃一顿网红餐厅。", "options": [{"key": "A", "text": "可以接受，一线城市什么都要抢，排队是常态"}, {"key": "B", "text": "偶尔可以，但如果每次都要排很久就说明我时间规划有问题"}, {"key": "C", "text": "完全不接受，我宁愿回家自己做，时间比什么都值钱"}, {"key": "D", "text": "根本不会去排队，我会选非高峰时段或者直接换一家"}, {"key": "E", "text": "在家乡不用排队，实在不行老板都认识，预留一下就行"}]}, {"id": 13, "text": "你理想中的生活一天，时间分配最接近下面哪种？", "options": [{"key": "A", "text": "工作12小时+通勤2小时+睡觉6小时+其他4小时。拼就完了。"}, {"key": "B", "text": "工作8-9小时+通勤1小时+运动/学习1.5小时+社交/休闲3小时+睡觉8小时"}, {"key": "C", "text": "工作6-7小时+做饭/散步/读书3小时+陪家人朋友3小时+充足睡眠9小时"}, {"key": "D", "text": "高效工作4-5小时+探索新地方/学新东西3小时+健身/户外2小时+自由支配6小时"}, {"key": "E", "text": "工作7-8小时（在家乡创业/上班）+照顾家人1小时+经营副业或社区事务2小时+休闲6小时"}]}, {"id": 14, "text": "周五下午突然有一个「说走就走」的周末旅行机会，你的反应是？", "options": [{"key": "A", "text": "没空，周末还有两个行业活动和一堆to-do，说走就走太奢侈了"}, {"key": "B", "text": "如果这周不太忙就去，偶尔的即兴出行给生活加点料"}, {"key": "C", "text": "太棒了！收拾东西走吧！生活本来就该多一些不期而遇"}, {"key": "D", "text": "随时可以走，我的笔记本在哪儿办公室就在哪儿，已经在路上了"}, {"key": "E", "text": "带上家人或叫上老朋友，在家乡周边找个地方转转就够了"}]}, {"id": 15, "text": "你睡觉时手机放在哪里？", "options": [{"key": "A", "text": "床头柜，24小时不关机不静音，重要消息必须第一时间响应"}, {"key": "B", "text": "放床头但开勿扰模式，紧急事务才响，需要保护睡眠但也不能失联"}, {"key": "C", "text": "放在客厅充电，睡觉就是睡觉，天塌了也明天再说"}, {"key": "D", "text": "看时区——如果有海外合作方可能半夜在线，但没人能逼我24小时待命"}, {"key": "E", "text": "放床头，但在家乡基本没人半夜找我，生活节奏天然就很健康"}]}, {"id": 16, "text": "你理想的窗外风景是什么样的？", "options": [{"key": "A", "text": "城市天际线——高楼林立、万家灯火，那种都市的脉搏让我觉得自己活着"}, {"key": "B", "text": "有山有水有城市轮廓的混合景观，既不太喧嚣也不太荒凉"}, {"key": "C", "text": "小城的街道、远处的山、院子里一棵开花的树——安静而踏实"}, {"key": "D", "text": "无所谓，这个月在清迈看寺庙，下个月在里斯本看海，窗外一直在变"}, {"key": "E", "text": "家乡的田野、熟悉的山脊线、父母家院子里小时候爬过的那棵树"}]}, {"id": 17, "text": "到一个全新城市生活，你最担心的事情是？", "options": [{"key": "A", "text": "不怕，我就是要去最好的城市证明自己，没朋友说明还不够强"}, {"key": "B", "text": "一开始会有点担心社交圈从零开始，但相信慢慢能建立起来"}, {"key": "C", "text": "非常担心，没有熟悉的朋友和家人在身边会让我很焦虑"}, {"key": "D", "text": "不太担心，我的社交经常是线上的，而且我习惯在不同城市建立短暂的连接"}, {"key": "E", "text": "不愿意去全新城市，家乡的人脉和关系网是我最大的资产"}]}, {"id": 18, "text": "你最理想的社交方式是？", "options": [{"key": "A", "text": "高质量圈子少而精，和一帮志同道合的人定期深度交流、互换资源"}, {"key": "B", "text": "一个稳定的朋友圈+偶尔参加行业活动认识新朋友，保持适度的社交新鲜感"}, {"key": "C", "text": "三五好友足矣，不需要认识那么多人，深度关系比广度重要"}, {"key": "D", "text": "线上线下混合，在全球各地都有一些有趣的朋友，随时可以约但不需要天天见"}, {"key": "E", "text": "家族和发小是核心社交圈，加上工作中建立的长期信任关系"}]}, {"id": 19, "text": "你觉得自己是「i人」还是「e人」？（内向还是外向）", "options": [{"key": "A", "text": "绝对是e人，越多人越兴奋，社交就是我的能量来源"}, {"key": "B", "text": "偏e，喜欢社交但需要适度独处充电，平衡最好"}, {"key": "C", "text": "典型i人，社交消耗能量，一个人待着才能回血"}, {"key": "D", "text": "看情况，深度1v1对话我超爱，但大型social场合我会躲"}, {"key": "E", "text": "偏i，但我喜欢小范围熟人社交，那种互相信任的踏实感"}]}, {"id": 20, "text": "你对「孤独」的耐受度如何？", "options": [{"key": "A", "text": "不怕孤独，怕的是不够强。强者本来就是孤独的。"}, {"key": "B", "text": "能接受适度的孤独，但太久没有深度交流会感到枯竭"}, {"key": "C", "text": "比较怕孤独，身边需要有人陪伴，情绪需要分享和回应"}, {"key": "D", "text": "享受适度的孤独但不喜欢被孤立——我需要自由也偶尔需要连接"}, {"key": "E", "text": "不太会孤独，在家乡走到哪都是认识的人，那种归属感很重要"}]}, {"id": 21, "text": "如果一个周末没有任何社交安排，你的感受是？", "options": [{"key": "A", "text": "有点慌，赶紧组个局或者找点活动，不能浪费一线城市的社交资源"}, {"key": "B", "text": "挺好的，偶尔独处一下充充电，下周再约人"}, {"key": "C", "text": "太棒了，这就是我梦寐以求的周末，一个人想干嘛干嘛"}, {"key": "D", "text": "无所谓，我可以随时打开电脑和世界各地的朋友聊天，或者在线上社区活跃"}, {"key": "E", "text": "那就回家吃饭啊，爸妈肯定做了好吃的，再叫上几个老朋友"}]}, {"id": 22, "text": "去参加一个行业大会，你最看重的是什么？", "options": [{"key": "A", "text": "认识比我强的人、找到更好的机会、展示自己的价值——这就是狩猎场"}, {"key": "B", "text": "获取行业最新动态+认识一些同频的人，拓宽视野的同时看看新机会"}, {"key": "C", "text": "没那么看重，有时间就去听听，没时间就算了，不强求"}, {"key": "D", "text": "不一定去线下——重要的内容有回放，真正有价值的连接在网上也能建立"}, {"key": "E", "text": "如果大会的内容能带回家乡应用和落地，我会认真参加并做好笔记"}]}, {"id": 23, "text": "你对「社区归属感」——那种被熟悉的邻里和社群包围的感觉——依赖程度如何？", "options": [{"key": "A", "text": "不太需要，强者靠自己就够了，社区是弱者的互助会"}, {"key": "B", "text": "有一定需求，同温层的支持和归属感能让人走得更远"}, {"key": "C", "text": "非常需要，熟悉的邻里、固定的朋友、踏实的日常才有真正的安全感"}, {"key": "D", "text": "我不绑定单一社区——线上有我的部落，线下在哪儿都能找到同类"}, {"key": "E", "text": "家乡社区就是我的全部，这些关系是时间和血缘沉淀下来的，无法替代"}]}, {"id": 24, "text": "过年回家被亲戚问「在哪工作、赚多少、有对象没」时，你的感受是？", "options": [{"key": "A", "text": "有点烦但无所谓，等我成功了这些声音自然就消失了"}, {"key": "B", "text": "有点压力但能应付，毕竟自己也确实在努力，用结果说话"}, {"key": "C", "text": "很焦虑，这些追问让我觉得自己的生活方式不被理解和尊重"}, {"key": "D", "text": "我已经好几年没回去过年了，在巴厘岛/清迈/大理过年也挺好的"}, {"key": "E", "text": "就正常聊啊，都在家乡彼此了解，不会有那种审问式的压迫感"}]}, {"id": 25, "text": "你觉得职业机会这件事，和「地理位置」的关系有多大？", "options": [{"key": "A", "text": "极其大，好的机会和牛人都聚集在超一线城市，我必须在那里"}, {"key": "B", "text": "很大，但新一线城市也有很多好机会，不一定非要去北上广深"}, {"key": "C", "text": "不太大，好的生活比好的机会重要，机会在哪都可以创造"}, {"key": "D", "text": "越来越小，互联网让很多工作不再受地理位置限制，我在哪都能赚钱"}, {"key": "E", "text": "家乡也有机会，关键是你能不能发现和深耕，不一定非得往外跑"}]}, {"id": 26, "text": "如果有一个非常好的工作机会，但在一个你完全不喜欢的城市，你会去吗？", "options": [{"key": "A", "text": "当然去，好的机会不等人，城市喜不喜欢可以慢慢适应"}, {"key": "B", "text": "会认真考虑，如果机会真的好到能改变职业轨迹，可以妥协2-3年"}, {"key": "C", "text": "大概率不去，在一个不喜欢的地方生活，再好的工作也不会开心"}, {"key": "D", "text": "看我能不能远程做——如果必须坐班在那个城市，我可能会犹豫"}, {"key": "E", "text": "不去，我在家乡已经有自己的规划了，不需要为别人的机会背井离乡"}]}, {"id": 27, "text": "你更看重一个城市的「当下实力」还是「增长潜力」？", "options": [{"key": "A", "text": "当下实力最重要，我要去已经站在巅峰的城市，享受最好的资源"}, {"key": "B", "text": "增长潜力更吸引我，去一个正在崛起的城市，你会有更多红利"}, {"key": "C", "text": "都不重要，城市的宜居程度和生活成本才是我最看重的"}, {"key": "D", "text": "我不绑定城市，我更关注行业的增长潜力和个人能力的可迁移性"}, {"key": "E", "text": "我家所在的城市虽然不大，但如果有潜力发展起来，我愿意扎根参与建设"}]}, {"id": 28, "text": "你现在的城市选择，多大程度上受到「别人怎么看」的影响？", "options": [{"key": "A", "text": "说实话挺大的，在一线城市工作是一种身份象征，回老家会被认为「混不下去」"}, {"key": "B", "text": "有一点吧，但更多是从实际机会和收入角度考虑"}, {"key": "C", "text": "基本不受影响，我过我的日子，别人怎么看不重要"}, {"key": "D", "text": "完全不受影响，我的生活方式本身就很「反传统」，不需要别人理解"}, {"key": "E", "text": "小时候会在意，现在我以建设家乡为荣，不需要外人认可"}]}, {"id": 29, "text": "10年后，你理想中的自己在过着一种什么样的生活？", "options": [{"key": "A", "text": "在一线城市核心地段有自己的事业，行业里有名有姓，财富和影响力兼备"}, {"key": "B", "text": "在一个有活力的城市里，事业有成同时生活品质很高，家庭事业都能兼顾"}, {"key": "C", "text": "在一个宜居的小城，有一份稳定或自由的工作，每天有充足时间做自己喜欢的事"}, {"key": "D", "text": "不被地理位置定义，收入来自全球，随时可以去任何想去的地方，自由是最大的财富"}, {"key": "E", "text": "在家乡有了自己的事业，带动了当地就业，父母在身边，孩子在家门口上学，踏实而丰盛"}]}, {"id": 30, "text": "在你的职业决策中，「赌一把」的成分有多大？", "options": [{"key": "A", "text": "成分很大——我赌的就是自己能在最卷的地方杀出来，高风险高回报"}, {"key": "B", "text": "中等偏上，会审慎评估风险和收益，但关键时刻敢于下注"}, {"key": "C", "text": "极小，我不喜欢赌，每一个重大决定都倾向于最稳妥、最可预期的选项"}, {"key": "D", "text": "经常赌，但我的赌注分散在很多篮子里——东边不亮西边亮，永远有备选"}, {"key": "E", "text": "赌的不是短期回报，而是长期扎根——赌的是时间和耐心的复利"}]}, {"id": 31, "text": "除了主业，你对搞副业或side project有多大意愿？", "options": [{"key": "A", "text": "如果有精力会搞，更倾向于投资或被动收入——主业已经够卷了"}, {"key": "B", "text": "有意愿也有行动，一个靠谱的副业能让生活更有安全感和多样性"}, {"key": "C", "text": "有意愿但不太知道从哪开始，小城市的副业机会和氛围有限"}, {"key": "D", "text": "我就是副业堆出来的——多个收入来源、多个项目并行才是我的日常模式"}, {"key": "E", "text": "我的副业和家乡紧密相关——帮家里做电商、经营一个本地社群账号、或开发一个家乡特产品牌"}]}, {"id": 32, "text": "你最近主动学的一项新技能是什么？你学它的动机是？", "options": [{"key": "A", "text": "硬核行业技能——不学就会被新人干掉，一线城市就是这么残酷"}, {"key": "B", "text": "管理或跨界技能——为了让自己的职业道路越走越宽，复合型人才更抗风险"}, {"key": "C", "text": "和生活品质相关的（烹饪/园艺/手工）——学这些让我真正感到快乐和充实"}, {"key": "D", "text": "一项可以远程变现的新技能——每多一个技能就多一个地理自由的筹码"}, {"key": "E", "text": "一项能带回家乡应用落地的技能——学的东西最终要能扎根在家乡的土地上"}]}], "resultTypes": {"A": {"name": "一线卷王型", "subtitle": "北上广深才是你的主场，卷并快乐着", "maturityScore": 85, "indices": [{"label": "竞争驱动力", "value": 95}, {"label": "快节奏适应力", "value": 90}, {"label": "社交能量", "value": 85}], "diagnosis": "你就是为超一线城市而生的「卷王体质」。竞争对你来说不是压力，而是燃料。你享受快节奏、高密度、强对抗的城市氛围——那些让其他人窒息的高房价、长通勤和激烈竞争，在你眼中只是奋斗的背景音乐。你的优势在于行动力超强、野心清晰、抗压能力一流。但要注意的是，长期的「战斗模式」会让你忽略身体和心理健康。真正的一线赢家不是最能卷的人，而是能持续卷而不被掏空的人。", "radarData": [{"label": "竞争偏好", "value": 95}, {"label": "快节奏适应", "value": 90}, {"label": "社交需求", "value": 80}, {"label": "机会敏感度", "value": 85}, {"label": "生活平衡能力", "value": 20}], "suitableJobs": ["顶级互联网/金融/咨询公司核心岗位", "高成长创业公司的早期成员", "行业KOL/个人品牌打造", "高强度项目管理和业务拓展"], "unsuitableJobs": ["节奏太慢的传统国企或事业单位", "地理位置偏远的稳定工作", "需要长期独处和深度沉潜的岗位"], "pathCompare": {"good": "拥抱一线：去到北上广深或杭州的核心产业圈，找到最优秀的团队和项目，用高强度的前几年打好事业基础，积累资本和人脉。同时有意识地建立健康习惯，保持长期续航力。", "bad": "盲目内卷：为了卷而卷，没有方向和策略地消耗自己，最终用健康换了高薪却发现没有生活、没有深度关系，陷入「高收入低幸福」的困境。"}, "plan90": ["第1-30天：梳理你所在行业的核心城市分布，如果还没在一线城市，制定3个月内的搬迁计划。如果在了一线，评估你目前在行业生态位中的位置——离核心圈还有多远？", "第31-60天：主动参加3场以上行业高质量活动，建立10个以上有价值的新连接。同时开始一项体能训练（健身/跑步/球类），为长期高强度工作储备身体资本。", "第61-90天：复盘近一年的收入、成长和生活满意度平衡表。如果生活满意度低于5分，立刻调整——削减无效社交、优化通勤、设立「不工作时间」的铁律。一线是马拉松不是短跑。"], "closing": "一线城市不是你逃离的地方，而是你点燃自己的战场——但要记住，最好的卷是聪明地卷。", "posterText": "一线卷王型——北上广深，我的主场", "posterSubtext": "测测你适合哪座城市？"}, "B": {"name": "新一线平衡型", "subtitle": "杭州成都武汉西安——你要的是「鱼和熊掌兼得」", "maturityScore": 82, "indices": [{"label": "竞争驱动力", "value": 70}, {"label": "快节奏适应力", "value": 65}, {"label": "生活平衡力", "value": 80}], "diagnosis": "你是最具「中国式智慧」的城市选择者。你有野心但不会为野心燃烧一切，你喜欢机会但不会为机会牺牲生活品质。你的最佳落点就是那些正在快速崛起的新一线城市——成都的烟火气加互联网产业，杭州的西湖加电商生态，武汉的大学城加光谷科技。这些城市既有不输一线的职业机会，又能给你一线给不了的生活品质和幸福感。你的核心能力是「平衡感」——这在一个以「卷」为主流叙事的时代里，是一种被严重低估的天赋。", "radarData": [{"label": "竞争偏好", "value": 70}, {"label": "快节奏适应", "value": 65}, {"label": "社交需求", "value": 75}, {"label": "机会敏感度", "value": 78}, {"label": "生活平衡能力", "value": 85}], "suitableJobs": ["新一线城市头部企业核心岗位", "快速成长公司的中层管理", "有区域特色的产业方向（如成都文创、杭州电商）", "总部在新一线的大型企业或跨国公司区域总部"], "unsuitableJobs": ["必须嵌套在一线核心产业链中的纯上游岗位", "收入天花板过低的稳定型岗位", "需要频繁跨城通勤的漂泊状态"], "pathCompare": {"good": "精准落子：在充分调研后选择一个产业与你方向匹配的新一线城市，充分利用城市发展红利和企业对人才的渴求，快速成长同时享受高质量的生活。", "bad": "两头不靠：既想享受一线的机会和薪资，又不愿承受一线的成本和压力，在新一线城市却总是不甘心、频繁比较，始终无法扎根。"}, "plan90": ["第1-30天：列出3个与你行业方向匹配的新一线城市，对比它们的产业布局、人才政策、生活成本和发展阶段。至少和2位已经在那座城市生活的朋友深度聊一次。", "第31-60天：针对首选城市，做一次实地考察（如果条件允许）或深度线上调研。投递5-10家目标公司的简历，感受市场对你的反馈。同时评估该城市的房价和落户政策。", "第61-90天：做出城市选择决定，并制定6个月的扎根计划——包括租房选址（靠近产业圈但保留生活气息）、社交破圈策略和职业发展时间表。"], "closing": "最好的生活不是你选了什么，而是你选的恰好是你真正想要的——新一线给了你这个权利。", "posterText": "新一线平衡型——我要事业，也要生活", "posterSubtext": "你最适合哪座城市？测一下！"}, "C": {"name": "小城生活型", "subtitle": "你的幸福感不在CBD，而在小城的烟火气里", "maturityScore": 80, "indices": [{"label": "竞争偏好", "value": 15}, {"label": "慢节奏偏好", "value": 90}, {"label": "生活满意度", "value": 88}], "diagnosis": "你是那个清醒地知道自己要什么的人。当大家都在讨论「逃离北上广」还是「坚守北上广」时，你心里已经有了答案——你从来就不属于那个游戏。你追求的不是世俗意义上的「成功」，而是可感知的、具体的、日常的幸福感：下班后能买到新鲜的菜、周末能爬山看水、家人朋友触手可及。这绝不是「躺平」或「不上进」——选择小城市是一种主动的人生策略，是对「幸福定义权」的回收。在这个时代，知道自己不要什么，比知道自己要什么更需要勇气。", "radarData": [{"label": "竞争偏好", "value": 15}, {"label": "快节奏适应", "value": 20}, {"label": "社交需求", "value": 65}, {"label": "机会敏感度", "value": 40}, {"label": "生活幸福感", "value": 95}], "suitableJobs": ["本地化的专业服务（教育/医疗/法律）", "小城文化创意与社区营造", "远程办公+小城定居的混合模式", "依托本地资源的特色创业（民宿/农场/手作）"], "unsuitableJobs": ["高频出差或跨城通勤的岗位", "需要一线城市资源和人脉才能运转的行业", "节奏极快、压力极大的创业公司"], "pathCompare": {"good": "主动设计小城生活：选择一个有你喜欢的自然环境和人文氛围的小城（或回到家乡），找到一份稳定的收入来源或远程工作，同时培育1-2个深度爱好。用小城的低成本换取生活的高品质。", "bad": "被迫「躺平」：没有主动规划就回到小城，结果发现工作机会少、社交圈萎缩、无聊感袭来，开始怀疑自己的选择，陷入「想回去又回不去」的困境。"}, "plan90": ["第1-30天：明确你想去的小城类型——是家乡、海边小镇、山间古镇还是发展不错的三四线城市？列出3个候选城市，从就业机会、生活成本、医疗教育、气候环境四个维度打分。", "第31-60天：探索你在小城的收入模式。是否可以将现有工作转远程？是否有可以在小城做的副业？当地的特色产业是什么？确保搬迁后的经济基础是扎实的。", "第61-90天：建立小城生活蓝图——每天的节奏安排、周末的活动规划、社交圈的构建方式（加入当地社群、公益组织或兴趣小组）。如果你在犹豫，先试住一个月再做最终决定。"], "closing": "人生的意义不在于跑得多远，而在于你是否真正「生活在别处」——或者，你就生活在当下，每一个真实的、被你认真对待的日常里。", "posterText": "小城生活型——我的幸福小城，无需和CBD比较", "posterSubtext": "测测你适合过哪种城市生活？"}, "D": {"name": "数字游民型", "subtitle": "你的办公室就是整个世界，位置不重要，自由才重要", "maturityScore": 88, "indices": [{"label": "自由度需求", "value": 95}, {"label": "适应力", "value": 90}, {"label": "在线收入能力", "value": 85}], "diagnosis": "你是新时代的「游牧民族」。对你来说，「在哪里生活」不是一个单选题而是一道多选题——你可以在大理的咖啡馆写代码，在巴厘岛的共享办公空间做设计，在里斯本的airbnb里远程管理你的业务。互联网和AI工具让你彻底摆脱了地理位置的束缚。你的核心资产是可迁移的专业能力和全球化的思维。不过自由也意味着自律——没有人管你的同时，也没有人替你兜底。你的挑战不是去哪，而是如何在流动中建立稳定：稳定的收入、稳定的关系、稳定的自我节奏。", "radarData": [{"label": "竞争偏好", "value": 55}, {"label": "快节奏适应", "value": 70}, {"label": "社交需求", "value": 60}, {"label": "机会敏感度", "value": 90}, {"label": "生活自由度", "value": (function(){
const app = document.getElementById('app');
let answers = {};           // { questionId: optionKey }
let currentQuestion = 0;
let currentRoute = '';
let typewriterTimer = null;

// ── 路由 ──────────────────────────────
function navigate(route) {
  if (typewriterTimer) { clearInterval(typewriterTimer); typewriterTimer = null; }
  currentRoute = route;
  window.location.hash = route;
  render();
  window.scrollTo(0, 0);
}

function getRoute() {
  const hash = window.location.hash.replace('#', '') || '/';
  return hash;
}

// ── 渲染主入口 ────────────────────────
function render() {
  const route = getRoute();
  currentRoute = route;

  switch(route) {
    case '/': renderHome(); break;
    case '/quiz': renderQuiz(); break;
    case '/loading': renderLoading(); break;
    case '/result': renderResult(); break;
    default: navigate('/'); break;
  }
}

// ── 首页 ──────────────────────────────
function renderHome() {
  const h = CONFIG.home;
  const dims = CONFIG.dimensions || [];
  app.innerHTML = `
    <div class="page active">
      <div class="home-header">
        <h1>${h.title}</h1>
        <p class="sub">${h.subtitle}</p>
      </div>
      <div class="home-intro">${h.introHTML || h.intro}</div>
      ${dims.length ? `<div class="dim-grid">${dims.map(d =>
        `<div class="dim-card"><span class="icon">${d.icon||'📊'}</span>${d.name}</div>`
      ).join('')}</div>` : ''}
      <button class="btn btn-primary" onclick="APP.start()">${h.btnText||'开始测试'}</button>
      <p class="footer-note">${h.disclaimer||'本测试仅供娱乐参考，非科学评估。'}</p>
      <p class="footer-code">${CONFIG.scoring.questionCount || CONFIG.questions.length} Questions · ${(CONFIG.dimensions||[]).length||1} Dimensions · 1 Diagnosis</p>
    </div>`;
}

// ── 测试页 ────────────────────────────
function renderQuiz() {
  const questions = CONFIG.questions;
  const dims = CONFIG.dimensions || [];
  const total = questions.length;
  const q = questions[currentQuestion];
  const dim = dims.find(d => (d.questionIds||[]).includes(q.id));
  const dimName = dim ? dim.name : '';
  const progress = ((currentQuestion) / total * 100).toFixed(0);
  const moduleLabel = dimName ? `${dimName}` : '';

  app.innerHTML = `
    <div class="page active">
      <div class="quiz-header">
        <div class="quiz-meta">
          <span class="quiz-module">${moduleLabel}</span>
          <span class="quiz-progress">${currentQuestion + 1} / ${total}</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      </div>
      <div class="quiz-card">
        <h3>${q.text}</h3>
        ${q.options.map((opt, i) => `
          <button class="opt-btn" onclick="APP.answer('${opt.key}')" id="opt-${i}">
            <span class="opt-key">${opt.key}</span>${opt.text}
          </button>
        `).join('')}
      </div>
      <p class="quiz-hint">选择后自动进入下一题</p>
    </div>`;
}

function answer(key) {
  const q = CONFIG.questions[currentQuestion];
  answers[q.id] = key;
  currentQuestion++;

  if (currentQuestion >= CONFIG.questions.length) {
    navigate('/loading');
  } else {
    renderQuiz();
    window.scrollTo(0, 0);
  }
}

// ── 加载页（逐字打印） ────────────────
function renderLoading() {
  const msgs = CONFIG.loadingMessages || ['正在分析中……', '分析完成。'];
  app.innerHTML = `
    <div class="page active">
      <div class="loading-wrap">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="typewriter"></div>
      </div>
    </div>`;

  const el = document.getElementById('typewriter');
  let msgIdx = 0;
  let charIdx = 0;
  let allDone = false;

  function tick() {
    if (allDone) return;
    if (msgIdx >= msgs.length) {
      el.classList.add('loading-done');
      el.textContent = msgs[msgs.length - 1];
      allDone = true;
      setTimeout(() => navigate('/result'), 800);
      return;
    }
    const msg = msgs[msgIdx];
    if (charIdx <= msg.length) {
      el.textContent = msg.slice(0, charIdx);
      charIdx++;
      typewriterTimer = setTimeout(tick, 60 + Math.random() * 40);
    } else {
      msgIdx++;
      charIdx = 0;
      typewriterTimer = setTimeout(tick, 400);
    }
  }
  tick();
}

// ── 评分 ──────────────────────────────
function calculateResult() {
  const scoring = CONFIG.scoring || {};
  const counts = {};
  for (const key of Object.keys(CONFIG.resultTypes)) {
    counts[key] = 0;
  }
  for (const ans of Object.values(answers)) {
    if (counts[ans] !== undefined) counts[ans]++;
  }
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  const primary = sorted[0][0];
  const secondary = sorted.length > 1 && (sorted[0][1] - sorted[1][1]) <= (scoring.mixedThreshold || 3) && sorted[1][1] > 0
    ? sorted[1][0] : null;

  return { primary, secondary, counts, hasSecondary: !!secondary };
}

// ── 雷达图 SVG ────────────────────────
function renderRadar(data, size = 260) {
  const cx = size / 2, cy = size / 2, r = size * 0.35;
  const n = data.length;
  if (n < 3) return '<p style="text-align:center;color:var(--c-muted)">数据不足</p>';

  const angleStep = (2 * Math.PI) / n;
  const levels = 5;
  let paths = '';

  // 背景网格
  for (let lv = 1; lv <= levels; lv++) {
    const rr = r * (lv / levels);
    let pts = [];
    for (let i = 0; i < n; i++) {
      const angle = angleStep * i - Math.PI / 2;
      pts.push(`${cx + rr * Math.cos(angle)},${cy + rr * Math.sin(angle)}`);
    }
    paths += `<polygon points="${pts.join(' ')}" fill="none" stroke="var(--c-border)" stroke-width="0.5"/>`;
  }

  // 轴线
  for (let i = 0; i < n; i++) {
    const angle = angleStep * i - Math.PI / 2;
    paths += `<line x1="${cx}" y1="${cy}" x2="${cx + r * Math.cos(angle)}" y2="${cy + r * Math.sin(angle)}" stroke="var(--c-border)" stroke-width="0.5"/>`;
  }

  // 数据多边形
  let dataPts = [];
  for (let i = 0; i < n; i++) {
    const angle = angleStep * i - Math.PI / 2;
    const val = Math.max(0, Math.min(100, data[i].value || 0)) / 100;
    const rr = r * val;
    dataPts.push(`${cx + rr * Math.cos(angle)},${cy + rr * Math.sin(angle)}`);
  }
  paths += `<polygon points="${dataPts.join(' ')}" fill="var(--c-primary)" fill-opacity="0.2" stroke="var(--c-primary)" stroke-width="2"/>`;

  // 数据点
  for (let i = 0; i < n; i++) {
    const angle = angleStep * i - Math.PI / 2;
    const val = Math.max(0, Math.min(100, data[i].value || 0)) / 100;
    const rr = r * val;
    paths += `<circle cx="${cx + rr * Math.cos(angle)}" cy="${cy + rr * Math.sin(angle)}" r="4" fill="var(--c-primary)"/>`;
  }

  // 标签
  let labels = '';
  for (let i = 0; i < n; i++) {
    const angle = angleStep * i - Math.PI / 2;
    const lr = r + 24;
    const lx = cx + lr * Math.cos(angle);
    const ly = cy + lr * Math.sin(angle);
    const anchor = lx < cx - 10 ? 'end' : lx > cx + 10 ? 'start' : 'middle';
    labels += `<text x="${lx}" y="${ly}" text-anchor="${anchor}" dominant-baseline="middle" font-size="11" fill="var(--c-text)" font-weight="600">${data[i].label}</text>`;
  }

  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg">${paths}${labels}</svg>`;
}

// ── 结果页 ────────────────────────────
function renderResult() {
  const result = calculateResult();
  const rt = CONFIG.resultTypes[result.primary];
  if (!rt) { navigate('/'); return; }

  const secondaryRt = result.hasSecondary ? CONFIG.resultTypes[result.secondary] : null;
  const typeName = secondaryRt ? `${rt.name} × ${secondaryRt.name}` : rt.name;
  const subtitle = secondaryRt
    ? `你同时具备${rt.name}和${secondaryRt.name}的特质，属于复合型人才`
    : rt.subtitle;

  // 混合型诊断
  let mixedNote = '';
  if (result.hasSecondary && CONFIG.mixedNotes) {
    const key = `${result.primary}+${result.secondary}`;
    const keyRev = `${result.secondary}+${result.primary}`;
    mixedNote = CONFIG.mixedNotes[key] || CONFIG.mixedNotes[keyRev] || '';
  }

  const indices = rt.indices || [];
  const radar = rt.radarData || [];
  const jobs = rt.suitableJobs || [];
  const noJobs = rt.unsuitableJobs || [];
  const plan = rt.plan90 || [];
  const pathC = rt.pathCompare || {};

  app.innerHTML = `
    <div class="page active">
      <div class="result-header">
        <div class="result-type">${typeName}</div>
        <p class="result-subtitle">${subtitle}</p>
        <div class="score-ring">${rt.maturityScore}</div>
        <p class="score-label">${CONFIG.scoring.scoreLabel || '职业路径决策成熟度'}</p>
      </div>

      ${indices.length ? `
      <div class="section">
        <h3>📊 关键指数</h3>
        <div class="indices-row">${indices.map(ix => `
          <div class="index-item"><div class="index-val">${ix.value}</div><div class="index-label">${ix.label}</div></div>
        `).join('')}</div>
      </div>` : ''}

      <div class="section">
        <h3>🔍 核心诊断</h3>
        <div class="diagnosis-text">${rt.diagnosis}${mixedNote ? '\n\n' + mixedNote : ''}</div>
      </div>

      ${radar.length >= 3 ? `
      <div class="section">
        <h3>📡 能力雷达图</h3>
        <div class="radar-wrap">${renderRadar(radar)}</div>
      </div>` : ''}

      ${jobs.length ? `
      <div class="section">
        <h3>🍚 适合的饭碗</h3>
        <ul class="job-list">${jobs.map(j => `<li>${j}</li>`).join('')}</ul>
      </div>` : ''}

      ${noJobs.length ? `
      <div class="section">
        <h3>⚠️ 不太适合的方向</h3>
        <ul class="no-list">${noJobs.map(j => `<li>${j}</li>`).join('')}</ul>
      </div>` : ''}

      ${(pathC.good || pathC.bad) ? `
      <div class="section">
        <h3>🔀 两条路径对比</h3>
        <div class="compare-grid">
          <div class="compare-card compare-good"><h4>✅ 顺应天赋</h4><p>${pathC.good||''}</p></div>
          <div class="compare-card compare-bad"><h4>⚠️ 逆天赋而行</h4><p>${pathC.bad||''}</p></div>
        </div>
      </div>` : ''}

      ${plan.length ? `
      <div class="section">
        <h3>📋 90天行动清单</h3>
        <ul class="plan-steps">${plan.map((p,i) => `
          <li><strong>第${i+1}步（第${i*30+1}-${(i+1)*30}天）</strong>：${p}</li>
        `).join('')}</ul>
      </div>` : ''}

      <div class="section">
        <p class="closing-text">${rt.closing||''}</p>
      </div>

      <div class="result-actions">
        <button class="btn btn-outline" onclick="APP.restart()">重新测试</button>
        <button class="btn btn-primary" onclick="APP.showPoster()">📤 分享结果</button>
      </div>
    </div>`;

  // 保存海报数据
  window._posterData = { typeName, posterText: rt.posterText||rt.name, posterSubtext: rt.posterSubtext||rt.subtitle, meta: CONFIG.meta };
}

// ── 分享海报 ──────────────────────────
function showPoster() {
  const pd = window._posterData || {};
  const overlay = document.createElement('div');
  overlay.className = 'poster-overlay show';
  overlay.id = 'poster-overlay';
  overlay.innerHTML = `
    <div class="poster-card" id="poster-card">
      <p style="font-size:.75rem;color:var(--c-muted);margin-bottom:8px">我的测试结果</p>
      <div class="ptype">${pd.posterText||''}</div>
      <p class="psub">${pd.posterSubtext||''}</p>
      <div style="width:60px;height:3px;background:var(--c-primary);margin:16px auto;border-radius:2px"></div>
      <p style="font-size:.75rem;color:var(--c-muted)">「${pd.meta?.title||''}」</p>
      <div class="pfooter">扫码测测你的 →</div>
    </div>
    <p class="poster-close" onclick="this.parentElement.remove()">关闭</p>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', function(e){ if(e.target===this) this.remove(); });
}

// ── 重新开始 ──────────────────────────
function restart() {
  answers = {};
  currentQuestion = 0;
  sessionStorage.removeItem('quiz_answers');
  navigate('/');
}

// ── 初始化 ────────────────────────────
function init() {
  // 尝试从 sessionStorage 恢复
  const saved = sessionStorage.getItem('quiz_answers');
  if (saved) {
    try { answers = JSON.parse(saved); } catch(e) {}
  }

  window.addEventListener('hashchange', render);
  render();
}

// ── 暴露 API ──────────────────────────
window.APP = {
  start: () => { answers = {}; currentQuestion = 0; navigate('/quiz'); },
  answer: (key) => {
    answer(key);
    // 保存到 sessionStorage
    sessionStorage.setItem('quiz_answers', JSON.stringify(answers));
  },
  restart,
  showPoster,
  navigate,
};

init();
})();
</script>
</body>
</html>
