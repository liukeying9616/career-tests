<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>你的焦虑不是坏事</title>
<meta name="description" content=""/>
<style>
:root{
  --c-bg:#fefaf6;--c-card:#fff;--c-text:#2c2420;--c-muted:#8c7a6b;
  --c-primary:#d4784a;--c-primary-light:#fdf0e8;--c-border:#e8ddd2;
  --c-accent-a:#e8784a;--c-accent-b:#4a9eb0;--c-accent-c:#8b6caf;
  --c-accent-d:#5a8a6a;--c-accent-e:#c08050;--c-danger:#c44;
  --radius:12px;--shadow:0 2px 16px rgba(60,30,10,.06);
  --font:system-ui,-apple-system,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--c-bg);color:var(--c-text);line-height:1.6;
  -webkit-font-smoothing:antialiased;min-height:100vh;display:flex;justify-content:center}
#app{width:100%;max-width:480px;min-height:100vh;position:relative;overflow:hidden}
.page{display:none;padding:24px 20px 40px;min-height:100vh}
.page.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* 首页 */
.home-header{text-align:center;padding-top:40px}
.home-header h1{font-size:1.75rem;font-weight:800;color:var(--c-primary);line-height:1.3;margin-bottom:8px}
.home-header .sub{font-size:.9rem;color:var(--c-muted);margin-bottom:32px;line-height:1.5}
.home-intro{background:var(--c-card);border-radius:var(--radius);padding:20px;margin-bottom:20px;
  box-shadow:var(--shadow);font-size:.875rem;color:var(--c-muted);line-height:1.8}
.home-intro p{margin-bottom:8px}
.home-intro .highlight{color:var(--c-primary);font-weight:600}
.dim-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px}
.dim-card{background:var(--c-card);border:1px solid var(--c-border);border-radius:var(--radius);
  padding:14px 12px;text-align:center;font-size:.8rem;font-weight:600;color:var(--c-text)}
.dim-card .icon{font-size:1.3rem;display:block;margin-bottom:4px}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:var(--radius);
  font-size:1rem;font-weight:700;cursor:pointer;text-align:center;transition:all .15s}
.btn-primary{background:var(--c-primary);color:#fff}
.btn-primary:active{opacity:.85;transform:scale(.98)}
.btn-outline{background:var(--c-card);color:var(--c-primary);border:1.5px solid var(--c-border)}
.footer-note{text-align:center;font-size:.7rem;color:var(--c-muted);margin-top:16px}
.footer-code{text-align:center;font-size:.7rem;color:var(--c-muted);margin-top:8px;
  font-family:'SF Mono',Consolas,monospace}

/* 测试页 */
.quiz-header{padding:8px 0 16px}
.quiz-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.quiz-module{font-size:.75rem;color:var(--c-primary);font-weight:600;background:var(--c-primary-light);
  padding:4px 10px;border-radius:20px}
.quiz-progress{font-size:.75rem;color:var(--c-muted)}
.progress-bar{height:3px;background:var(--c-border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--c-primary);transition:width .3s ease;border-radius:2px}
.quiz-card{background:var(--c-card);border-radius:var(--radius);padding:24px 20px;
  box-shadow:var(--shadow);margin-bottom:12px}
.quiz-card h3{font-size:1rem;font-weight:700;margin-bottom:20px;line-height:1.5}
.opt-btn{display:block;width:100%;padding:14px 16px;margin-bottom:8px;background:var(--c-bg);
  border:1.5px solid var(--c-border);border-radius:var(--radius);text-align:left;
  font-size:.9rem;cursor:pointer;transition:all .12s;color:var(--c-text)}
.opt-btn:active,.opt-btn.selected{background:var(--c-primary-light);border-color:var(--c-primary);
  color:var(--c-primary);font-weight:600}
.opt-key{display:inline-block;width:24px;height:24px;line-height:24px;text-align:center;
  background:var(--c-border);border-radius:50%;font-size:.75rem;font-weight:700;margin-right:8px}
.quiz-hint{text-align:center;font-size:.7rem;color:var(--c-muted);padding:8px}

/* 加载页 */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:70vh;text-align:center}
.loading-spinner{width:40px;height:40px;border:3px solid var(--c-border);
  border-top-color:var(--c-primary);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:24px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:.95rem;color:var(--c-text);min-height:28px;line-height:1.6}
.loading-done{color:var(--c-primary);font-weight:600}

/* 结果页 */
.result-header{text-align:center;padding-top:20px}
.result-type{font-size:2rem;font-weight:800;color:var(--c-primary);margin-bottom:4px}
.result-subtitle{font-size:.9rem;color:var(--c-muted);margin-bottom:20px}
.score-ring{display:inline-flex;align-items:center;justify-content:center;
  width:80px;height:80px;border-radius:50%;border:4px solid var(--c-primary);
  font-size:1.5rem;font-weight:800;color:var(--c-primary);margin-bottom:8px}
.score-label{font-size:.75rem;color:var(--c-muted);margin-bottom:24px}

.section{background:var(--c-card);border-radius:var(--radius);padding:20px;
  box-shadow:var(--shadow);margin-bottom:14px}
.section h3{font-size:.85rem;font-weight:700;color:var(--c-primary);margin-bottom:12px;
  padding-bottom:8px;border-bottom:1px solid var(--c-border)}
.indices-row{display:flex;gap:10px;flex-wrap:wrap}
.index-item{flex:1;min-width:80px;text-align:center;padding:10px 6px;
  background:var(--c-bg);border-radius:8px}
.index-val{font-size:1.3rem;font-weight:800;color:var(--c-primary)}
.index-label{font-size:.7rem;color:var(--c-muted);margin-top:2px}

.diagnosis-text{font-size:.85rem;line-height:1.8;color:var(--c-text);white-space:pre-line}

.radar-wrap{display:flex;justify-content:center;padding:8px 0}
.radar-wrap svg{max-width:280px;width:100%}

.job-list,.no-list{list-style:none;padding:0}
.job-list li,.no-list li{padding:8px 12px;margin-bottom:4px;background:var(--c-bg);
  border-radius:6px;font-size:.82rem;display:flex;align-items:center;gap:8px}
.job-list li::before{content:'✅';font-size:.75rem}
.no-list li::before{content:'⚠️';font-size:.75rem}

.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.compare-card{padding:14px;border-radius:8px;font-size:.8rem;line-height:1.6}
.compare-good{background:#f0f7f0;border:1px solid #c8e0c8}
.compare-bad{background:#fef5f0;border:1px solid #f0d8c8}
.compare-card h4{font-size:.8rem;margin-bottom:6px}

.plan-steps{list-style:none;padding:0}
.plan-steps li{padding:10px 12px;margin-bottom:6px;background:var(--c-bg);
  border-radius:6px;font-size:.8rem;line-height:1.5;border-left:3px solid var(--c-primary)}

.closing-text{font-size:.85rem;color:var(--c-muted);font-style:italic;text-align:center;line-height:1.7}

.result-actions{display:flex;gap:10px;margin-top:20px}
.result-actions .btn{flex:1;font-size:.85rem;padding:12px}

/* 海报弹窗 */
.poster-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;
  justify-content:center;align-items:center;padding:20px}
.poster-overlay.show{display:flex}
.poster-card{background:#fff;border-radius:16px;padding:32px 24px;max-width:320px;width:100%;
  text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.15)}
.poster-card .ptype{font-size:1.8rem;font-weight:800;color:var(--c-primary);margin-bottom:4px}
.poster-card .psub{font-size:.85rem;color:var(--c-muted);margin-bottom:16px}
.poster-card .pfooter{font-size:.7rem;color:var(--c-muted);margin-top:20px;padding-top:14px;
  border-top:1px solid var(--c-border)}
.poster-close{margin-top:16px;font-size:.8rem;color:var(--c-muted);cursor:pointer;text-align:center}
</style>
</head>

", "options": [{"key": "A", "text": "翻来覆去，怎么躺都不舒服"}, {"key": "B", "text": "蜷成一团，抱着被子"}, {"key": "C", "text": "仰面躺着，盯着天花板"}, {"key": "D", "text": "趴着，把头埋进枕头里"}]}, {"id": 7, "text": "焦虑时你的呼吸有什么变化？", "options": [{"key": "A", "text": "呼吸变浅，胸口起伏快"}, {"key": "B", "text": "不自觉地屏住呼吸"}, {"key": "C", "text": "叹气变多了，自己都没注意"}, {"key": "D", "text": "没什么感觉，一切正常"}]}, {"id": 8, "text": "如果身体会说话，焦虑时它最想让你做什么？", "options": [{"key": "A", "text": "站起来走一走，换个环境"}, {"key": "B", "text": "把手头那件事做完"}, {"key": "C", "text": "什么都不做，就待一会儿"}, {"key": "D", "text": "找个人说说话"}]}, {"id": 9, "text": "如果焦虑是一间房子，你觉得自己在哪个角落？", "options": [{"key": "A", "text": "站在窗边，反复检查门锁好没"}, {"key": "B", "text": "在桌前改同一张图纸，改了又改"}, {"key": "C", "text": "站在岔路口，不知道该往哪走"}, {"key": "D", "text": "空荡荡的房间里，只有自己"}]}, {"id": 10, "text": "焦虑的时候，你脑子里最常出现什么画面？", "options": [{"key": "A", "text": "出错的瞬间，像放电影一样重播"}, {"key": "B", "text": "还没发生的事，先预演一遍坏结果"}, {"key": "C", "text": "别人都过得比我好的画面"}, {"key": "D", "text": "雾蒙蒙的，什么都看不清楚"}]}, {"id": 11, "text": "如果焦虑有颜色，你觉得它是什么？", "options": [{"key": "A", "text": "红色——像警报灯在闪"}, {"key": "B", "text": "灰色——像被雾霾罩住了"}, {"key": "C", "text": "蓝色——像深不见底的水"}, {"key": "D", "text": "说不清，每次不太一样"}]}, {"id": 12, "text": "焦虑的时候，你眼里的世界变了什么？", "options": [{"key": "A", "text": "所有小问题都放大了"}, {"key": "B", "text": "原本清楚的事突然不确定了"}, {"key": "C", "text": "觉得别人都在看自己"}, {"key": "D", "text": "好像什么都没变，但就是不对"}]}, {"id": 13, "text": "如果焦虑是一部电影，它是什么类型的？", "options": [{"key": "A", "text": "悬疑片——总觉得哪里不对劲"}, {"key": "B", "text": "灾难片——最坏的结果已经在脑海演完"}, {"key": "C", "text": "文艺片——一个人在空镜头里走很久"}, {"key": "D", "text": "纪录片——太真实了，关不掉"}]}, {"id": 14, "text": "你焦虑时看镜子里的自己，更像什么？", "options": [{"key": "A", "text": "眉毛皱在一起，自己都没发现"}, {"key": "B", "text": "眼神是直的，但看的不是镜子"}, {"key": "C", "text": "表情没有问题，但眼神骗不了人"}, {"key": "D", "text": "跟平时一样，看不出异常"}]}, {"id": 15, "text": "焦虑时窗外下雨了，你第一反应是？", "options": [{"key": "A", "text": "关窗，别让雨淋进来"}, {"key": "B", "text": "算了，本来就出不去"}, {"key": "C", "text": "看着雨发呆，脑子放空了"}, {"key": "D", "text": "挺好的，雨懂我今天的心情"}]}, {"id": 16, "text": "焦虑走的时候，你脑海里的画面怎么变？", "options": [{"key": "A", "text": "警报解除，红灯变绿灯"}, {"key": "B", "text": "雾散了，轮廓清晰了"}, {"key": "C", "text": "迷雾中有条路出现了"}, {"key": "D", "text": "天亮了，昨天的事过去了"}]}, {"id": 17, "text": "焦虑来的时候，你的节奏发生了什么变化？", "options": [{"key": "A", "text": "突然快了——要做点什么才行"}, {"key": "B", "text": "突然慢了——动不了了"}, {"key": "C", "text": "快慢交替——一会冲一会停"}, {"key": "D", "text": "节奏没变——但效率在下降"}]}, {"id": 18, "text": "焦虑过后，你是怎么回到正常节奏的？", "options": [{"key": "A", "text": "把悬着的事解决了，才松口气"}, {"key": "B", "text": "一个人复盘，把事情想透了"}, {"key": "C", "text": "找点别的事做，转移注意力"}, {"key": "D", "text": "躺平，它自己会过去"}]}, {"id": 19, "text": "焦虑打断了你的计划，你第一反应是？", "options": [{"key": "A", "text": "先把焦虑处理了，再干正事"}, {"key": "B", "text": "扛着焦虑继续干，效率不重要"}, {"key": "C", "text": "停下手头的事，重新想值不值得"}, {"key": "D", "text": "无所谓，计划本来就不重要"}]}, {"id": 20, "text": "你的焦虑有规律吗？", "options": [{"key": "A", "text": "有——总是在特定时刻来"}, {"key": "B", "text": "没有——说不准什么时候就来了"}, {"key": "C", "text": "有周期——忙一阵后来一次"}, {"key": "D", "text": "没注意过，来了就来了"}]}, {"id": 21, "text": "焦虑让你最难开始的事是什么？", "options": [{"key": "A", "text": "做决定——总觉得还不够保险"}, {"key": "B", "text": "开始做——第一步最难"}, {"key": "C", "text": "做完——快完成的时候会反复检查"}, {"key": "D", "text": "放下——做完了还在想"}]}, {"id": 22, "text": "你在焦虑中做事，更像什么？", "options": [{"key": "A", "text": "踩油门同时踩刹车"}, {"key": "B", "text": "速度很慢但每一步都很稳"}, {"key": "C", "text": "走走停停，一直在调方向"}, {"key": "D", "text": "在自动驾驶，人不在线"}]}, {"id": 23, "text": "焦虑结束后，你最想做什么？", "options": [{"key": "A", "text": "歇一会，刚才太累了"}, {"key": "B", "text": "趁清醒赶紧把事做完"}, {"key": "C", "text": "回头看看刚才到底在焦虑什么"}, {"key": "D", "text": "不想提了，过去了就好"}]}, {"id": 24, "text": "如果有人在你焦虑时催你，你会？", "options": [{"key": "A", "text": "更焦虑，但会加快速度"}, {"key": "B", "text": "直接崩了，什么都做不了"}, {"key": "C", "text": "让他别催，我有自己的节奏"}, {"key": "D", "text": "表面说好，心里已经放弃了"}]}, {"id": 25, "text": "如果焦虑会说话，它最想对你说什么？", "options": [{"key": "A", "text": "我在帮你盯着危险，别嫌我烦"}, {"key": "B", "text": "你不是不够好，你是还没到火候"}, {"key": "C", "text": "该停下来看看路了，别闷头走"}, {"key": "D", "text": "你只是在变好，我陪你一起"}]}, {"id": 26, "text": "焦虑的时候，你最想听到别人说什么？", "options": [{"key": "A", "text": "没事的，我帮你看过了"}, {"key": "B", "text": "你已经做得很好了"}, {"key": "C", "text": "不着急，慢慢想"}, {"key": "D", "text": "我懂，不用解释"}]}, {"id": 27, "text": "焦虑让你对什么东西最敏感？", "options": [{"key": "A", "text": "危险信号——别人没注意的你先注意到了"}, {"key": "B", "text": "细节——别人觉得差不多了你觉得还不够"}, {"key": "C", "text": "选择——别人觉得小事你都要想很久"}, {"key": "D", "text": "变化——别人觉得正常你总觉得不对"}]}, {"id": 28, "text": "焦虑的时候，你相信自己的判断吗？", "options": [{"key": "A", "text": "不完全信——会再多确认一下"}, {"key": "B", "text": "信——但总觉得还能更好"}, {"key": "C", "text": "不太信——想先问问别人"}, {"key": "D", "text": "信——焦虑归焦虑，直觉不会骗我"}]}, {"id": 29, "text": "焦虑给你的直觉，事后看是对的多还是错的多？", "options": [{"key": "A", "text": "大部分是对的——它确实预警了"}, {"key": "B", "text": "当时觉得对，事后觉得反应过度了"}, {"key": "C", "text": "说不清——有些事情无法验证"}, {"key": "D", "text": "没注意过这个"}]}, {"id": 30, "text": "如果让你给焦虑写一句话，你会写什么？", "options": [{"key": "A", "text": "谢谢你帮我盯着，但今天可以休息了"}, {"key": "B", "text": "我知道你想让我更好，我会的"}, {"key": "C", "text": "给我一点时间，我在想了"}, {"key": "D", "text": "我们一起，慢慢来"}]}, {"id": 31, "text": "如果你的焦虑可以变成一种超能力，你希望是？", "options": [{"key": "A", "text": "预知风险——永远比别人快一步"}, {"key": "B", "text": "无限精进——做什么都能做到最好"}, {"key": "C", "text": "深度洞察——看透事情的本质"}, {"key": "D", "text": "自我修复——受伤后能快速恢复"}]}, {"id": 32, "text": "做完这个测试，你最希望得到什么？", "options": [{"key": "A", "text": "知道焦虑到底在帮我盯着什么"}, {"key": "B", "text": "知道怎么把焦虑变成动力"}, {"key": "C", "text": "知道是不是该停下来看看路"}, {"key": "D", "text": "知道我不是一个人"}]}], "resultTypes": {"A": {"name": "🚨 哨兵型", "subtitle": "你的焦虑在帮你预警——它盯着别人看不到的风险", "maturityScore": 85, "indices": [{"label": "预警锐度", "value": 92}, {"label": "风险感知", "value": 88}, {"label": "安全感", "value": 45}], "diagnosis": "你的焦虑像一个不休息的哨兵。它永远在帮你看：门锁好了吗？那个决定够稳妥吗？会不会有意外？\n\n别人觉得你太紧张了。但他们不知道——你发现的那些风险，后来有一半真的发生了。你的焦虑不是多虑，是一种被严重低估的生存能力。\n\n你不是想太多。你的哨兵只是在尽它的职责——保护你不受伤。", "radarData": [{"label": "预警力", "value": 92}, {"label": "精进力", "value": 55}, {"label": "洞察力", "value": 68}, {"label": "修复力", "value": 42}, {"label": "安全感", "value // ═══════════════════════════════════════
// 通用测试引擎

(function(){
const app = document.getElementById('app');
let answers = {};           // { questionId: optionKey }
let currentQuestion = 0;
let currentRoute = '';
let typewriterTimer = null;

// ── 路由 ──────────────────────────────
function navigate(route) {
  if (typewriterTimer) { clearInterval(typewriterTimer); typewriterTimer = null; }
  currentRoute = route;
  window.location.hash = route;
  render();
  window.scrollTo(0, 0);
}

function getRoute() {
  const hash = window.location.hash.replace('#', '') || '/';
  return hash;
}

// ── 渲染主入口 ────────────────────────
function render() {
  const route = getRoute();
  currentRoute = route;

  switch(route) {
    case '/': renderHome(); break;
    case '/quiz': renderQuiz(); break;
    case '/loading': renderLoading(); break;
    case '/result': renderResult(); break;
    default: navigate('/'); break;
  }
}

// ── 首页 ──────────────────────────────
function renderHome() {
  const h = CONFIG.home;
  const dims = CONFIG.dimensions || [];
  app.innerHTML = `
    <div class="page active">
      <div class="home-header">
        <h1>${h.title}</h1>
        <p class="sub">${h.subtitle}</p>
      </div>
      <div class="home-intro">${h.introHTML || h.intro}</div>
      ${dims.length ? `<div class="dim-grid">${dims.map(d =>
        `<div class="dim-card"><span class="icon">${d.icon||'📊'}</span>${d.name}</div>`
      ).join('')}</div>` : ''}
      <button class="btn btn-primary" onclick="APP.start()">${h.btnText||'开始测试'}</button>
      <p class="footer-note">${h.disclaimer||'本测试仅供娱乐参考，非科学评估。'}</p>
      <p class="footer-code">${CONFIG.scoring.questionCount || CONFIG.questions.length} Questions · ${(CONFIG.dimensions||[]).length||1} Dimensions · 1 Diagnosis</p>
    </div>`;
}

// ── 测试页 ────────────────────────────
function renderQuiz() {
  const questions = CONFIG.questions;
  const dims = CONFIG.dimensions || [];
  const total = questions.length;
  const q = questions[currentQuestion];
  const dim = dims.find(d => (d.questionIds||[]).includes(q.id));
  const dimName = dim ? dim.name : '';
  const progress = ((currentQuestion) / total * 100).toFixed(0);
  const moduleLabel = dimName ? `${dimName}` : '';

  app.innerHTML = `
    <div class="page active">
      <div class="quiz-header">
        <div class="quiz-meta">
          <span class="quiz-module">${moduleLabel}</span>
          <span class="quiz-progress">${currentQuestion + 1} / ${total}</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      </div>
      <div class="quiz-card">
        <h3>${q.text}</h3>
        ${q.options.map((opt, i) => `
          <button class="opt-btn" onclick="APP.answer('${opt.key}')" id="opt-${i}">
            <span class="opt-key">${opt.key}</span>${opt.text}
          </button>
        `).join('')}
      </div>
      <p class="quiz-hint">选择后自动进入下一题</p>
    </div>`;
}

// ── 作答 ──────────────────────────────
function answer(key) {
  const q = CONFIG.questions[currentQuestion];
  answers[q.id] = key;
  currentQuestion++;

  if (currentQuestion >= CONFIG.questions.length) {
    navigate('/loading');
  } else {
    renderQuiz();
    window.scrollTo(0, 0);
  }
}

// ── 加载页（逐字打印） ────────────────
function renderLoading() {
  const msgs = CONFIG.loadingMessages || ['正在分析中……', '分析完成。'];
  app.innerHTML = `
    <div class="page active">
      <div class="loading-wrap">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="typewriter"></div>
      </div>
    </div>`;

  const el = document.getElementById('typewriter');
  let msgIdx = 0;
  let charIdx = 0;
  let allDone = false;

  function tick() {
    if (allDone) return;
    if (msgIdx >= msgs.length) {
      el.classList.add('loading-done');
      el.textContent = msgs[msgs.length - 1];
      allDone = true;
      setTimeout(() => navigate('/result'), 800);
      return;
    }
    const msg = msgs[msgIdx];
    if (charIdx <= msg.length) {
      el.textContent = msg.slice(0, charIdx);
      charIdx++;
      typewriterTimer = setTimeout(tick, 60 + Math.random() * 40);
    } else {
      msgIdx++;
      charIdx = 0;
      typewriterTimer = setTimeout(tick, 400);
    }
  }
  tick();
}

// ── 评分 ──────────────────────────────
function calculateResult() {
  const scoring = CONFIG.scoring || {};
  const counts = {};
  for (const key of Object.keys(CONFIG.resultTypes)) {
    counts[key] = 0;
  }
  for (const ans of Object.values(answers)) {
    if (counts[ans] !== undefined) counts[ans]++;
  }
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  const primary = sorted[0][0];
  const secondary = sorted.length > 1 && (sorted[0][1] - sorted[1][1]) <= (scoring.mixedThreshold || 3) && sorted[1][1] > 0
    ? sorted[1][0] : null;

  return { primary, secondary, counts, hasSecondary: !!secondary };
}

// ── 雷达图 SVG ────────────────────────
function renderRadar(data, size = 260) {
  const cx = size / 2, cy = size / 2, r = size * 0.35;
  const n = data.length;
  if (n < 3) return '<p style="text-align:center;color:var(--c-muted)">数据不足</p>';

  const angleStep = (2 * Math.PI) / n;
  const levels = 5;
  let paths = '';

  // 背景网格
  for (let lv = 1; lv <= levels; lv++) {
    const rr = r * (lv / levels);
    let pts = [];
    for (let i = 0; i < n; i++) {
      const angle = angleStep * i - Math.PI / 2;
      pts.push(`${cx + rr * Math.cos(angle)},${cy + rr * Math.sin(angle)}`);
    }
    paths += `<polygon points="${pts.join(' ')}" fill="none" stroke="var(--c-border)" stroke-width="0.5"/>`;
  }

  // 轴线
  for (let i = 0; i < n; i++) {
    const angle = angleStep * i - Math.PI / 2;
    paths += `<line x1="${cx}" y1="${cy}" x2="${cx + r * Math.cos(angle)}" y2="${cy + r * Math.sin(angle)}" stroke="var(--c-border)" stroke-width="0.5"/>`;
  }

  // 数据多边形
  let dataPts = [];
  for (let i = 0; i < n; i++) {
    const angle = angleStep * i - Math.PI / 2;
    const val = Math.max(0, Math.min(100, data[i].value || 0)) / 100;
    const rr = r * val;
    dataPts.push(`${cx + rr * Math.cos(angle)},${cy + rr * Math.sin(angle)}`);
  }
  paths += `<polygon points="${dataPts.join(' ')}" fill="var(--c-primary)" fill-opacity="0.2" stroke="var(--c-primary)" stroke-width="2"/>`;

  // 数据点
  for (let i = 0; i < n; i++) {
    const angle = angleStep * i - Math.PI / 2;
    const val = Math.max(0, Math.min(100, data[i].value || 0)) / 100;
    const rr = r * val;
    paths += `<circle cx="${cx + rr * Math.cos(angle)}" cy="${cy + rr * Math.sin(angle)}" r="4" fill="var(--c-primary)"/>`;
  }

  // 标签
  let labels = '';
  for (let i = 0; i < n; i++) {
    const angle = angleStep * i - Math.PI / 2;
    const lr = r + 24;
    const lx = cx + lr * Math.cos(angle);
    const ly = cy + lr * Math.sin(angle);
    const anchor = lx < cx - 10 ? 'end' : lx > cx + 10 ? 'start' : 'middle';
    labels += `<text x="${lx}" y="${ly}" text-anchor="${anchor}" dominant-baseline="middle" font-size="11" fill="var(--c-text)" font-weight="600">${data[i].label}</text>`;
  }

  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg">${paths}${labels}</svg>`;
}

// ── 结果页 ────────────────────────────

  const indices = rt.indices || [];
  const radar = rt.radarData || [];
  const jobs = rt.suitableJobs || [];
  const noJobs = rt.unsuitableJobs || [];
  const plan = rt.plan90 || [];
  const pathC = rt.pathCompare || {};

  app.innerHTML = `
    <div class="page active">
      <div class="result-header">
        <div class="result-type">${typeName}</div>
        <p class="result-subtitle">${subtitle}</p>
        <div class="score-ring">${rt.maturityScore}</div>

      </div>

      ${indices.length ? `
      <div class="section">
        <h3>📊 关键指数</h3>
        <div class="indices-row">${indices.map(ix => `
          <div class="index-item"><div class="index-val">${ix.value}</div><div class="index-label">${ix.label}</div></div>
        `).join('')}</div>
      </div>` : ''}

      <div class="section">
        <h3>🔍 核心诊断</h3>
        <div class="diagnosis-text">${rt.diagnosis}${mixedNote ? '\n\n' + mixedNote : ''}</div>
      </div>

      ${radar.length >= 3 ? `
      <div class="section">
        <h3>📡 能力雷达图</h3>
        <div class="radar-wrap">${renderRadar(radar)}</div>
      </div>` : ''}

      ${jobs.length ? `
      <div class="section">
        <h3>🍚 适合的饭碗</h3>
        <ul class="job-list">${jobs.map(j => `<li>${j}</li>`).join('')}</ul>
      </div>` : ''}

      ${noJobs.length ? `
      <div class="section">
        <h3>⚠️ 不太适合的方向</h3>
        <ul class="no-list">${noJobs.map(j => `<li>${j}</li>`).join('')}</ul>
      </div>` : ''}

      ${(pathC.good || pathC.bad) ? `
      <div class="section">
        <h3>🔀 两条路径对比</h3>
        <div class="compare-grid">
          <div class="compare-card compare-good"><h4>✅ 顺应天赋</h4><p>${pathC.good||''}</p></div>
          <div class="compare-card compare-bad"><h4>⚠️ 逆天赋而行</h4><p>${pathC.bad||''}</p></div>
        </div>
      </div>` : ''}

      ${plan.length ? `
      <div class="section">
        <h3>📋 90天行动清单</h3>
        <ul class="plan-steps">${plan.map((p,i) => `
          <li><strong>第${i+1}步（第${i*30+1}-${(i+1)*30}天）</strong>：${p}</li>
        `).join('')}</ul>
      </div>` : ''}

      <div class="section">
        <p class="closing-text">${rt.closing||''}</p>
      </div>

      <div class="result-actions">
        <button class="btn btn-outline" onclick="APP.restart()">重新测试</button>
        <button class="btn btn-primary" onclick="APP.showPoster()">📤 分享结果</button>
      </div>
    </div>`;

  // 保存海报数据
  window._posterData = { typeName, posterText: rt.posterText||rt.name, posterSubtext: rt.posterSubtext||rt.subtitle, meta: CONFIG.meta };
}

// ── 分享海报 ──────────────────────────
function showPoster() {
  const pd = window._posterData || {};
  const overlay = document.createElement('div');
  overlay.className = 'poster-overlay show';
  overlay.id = 'poster-overlay';
  overlay.innerHTML = `
    <div class="poster-card" id="poster-card">
      <p style="font-size:.75rem;color:var(--c-muted);margin-bottom:8px">我的测试结果</p>
      <div class="ptype">${pd.posterText||''}</div>
      <p class="psub">${pd.posterSubtext||''}</p>
      <div style="width:60px;height:3px;background:var(--c-primary);margin:16px auto;border-radius:2px"></div>
      <p style="font-size:.75rem;color:var(--c-muted)">「${pd.meta?.title||''}」</p>
      <div class="pfooter">扫码测测你的 →</div>
    </div>
    <p class="poster-close" onclick="this.parentElement.remove()">关闭</p>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', function(e){ if(e.target===this) this.remove(); });
}

// ── 重新开始 ──────────────────────────
function restart() {
  answers = {};
  currentQuestion = 0;
  sessionStorage.removeItem('quiz_answers');
  navigate('/');
}

// ── 初始化 ────────────────────────────
function init() {
  // 尝试从 sessionStorage 恢复
  const saved = sessionStorage.getItem('quiz_answers');
  if (saved) {
    try { answers = JSON.parse(saved); } catch(e) {}
  }

  window.addEventListener('hashchange', render);
  render();
}

// ── 暴露 API ──────────────────────────
window.APP = {
  start: () => { answers = {}; currentQuestion = 0; navigate('/quiz'); },
  answer: (key) => {
    answer(key);
    // 保存到 sessionStorage
    sessionStorage.setItem('quiz_answers', JSON.stringify(answers));
  },
  restart,
  showPoster,
  navigate,
};

init();
})();
</script>
</body>
</html>
