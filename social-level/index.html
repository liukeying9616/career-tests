<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>测测你的社交人格在第几层？</title>
<meta name="description" content=""/>
<style>
:root{
  --c-bg:#fefaf6;--c-card:#fff;--c-text:#2c2420;--c-muted:#8c7a6b;
  --c-primary:#d4784a;--c-primary-light:#fdf0e8;--c-border:#e8ddd2;
  --c-accent-a:#e8784a;--c-accent-b:#4a9eb0;--c-accent-c:#8b6caf;
  --c-accent-d:#5a8a6a;--c-accent-e:#c08050;--c-danger:#c44;
  --radius:12px;--shadow:0 2px 16px rgba(60,30,10,.06);
  --font:system-ui,-apple-system,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--c-bg);color:var(--c-text);line-height:1.6;
  -webkit-font-smoothing:antialiased;min-height:100vh;display:flex;justify-content:center}
#app{width:100%;max-width:480px;min-height:100vh;position:relative;overflow:hidden}
.page{display:none;padding:24px 20px 40px;min-height:100vh}
.page.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* 首页 */
.home-header{text-align:center;padding-top:40px}
.home-header h1{font-size:1.75rem;font-weight:800;color:var(--c-primary);line-height:1.3;margin-bottom:8px}
.home-header .sub{font-size:.9rem;color:var(--c-muted);margin-bottom:32px;line-height:1.5}
.home-intro{background:var(--c-card);border-radius:var(--radius);padding:20px;margin-bottom:20px;
  box-shadow:var(--shadow);font-size:.875rem;color:var(--c-muted);line-height:1.8}
.home-intro p{margin-bottom:8px}
.home-intro .highlight{color:var(--c-primary);font-weight:600}
.dim-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px}
.dim-card{background:var(--c-card);border:1px solid var(--c-border);border-radius:var(--radius);
  padding:14px 12px;text-align:center;font-size:.8rem;font-weight:600;color:var(--c-text)}
.dim-card .icon{font-size:1.3rem;display:block;margin-bottom:4px}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:var(--radius);
  font-size:1rem;font-weight:700;cursor:pointer;text-align:center;transition:all .15s}
.btn-primary{background:var(--c-primary);color:#fff}
.btn-primary:active{opacity:.85;transform:scale(.98)}
.btn-outline{background:var(--c-card);color:var(--c-primary);border:1.5px solid var(--c-border)}
.footer-note{text-align:center;font-size:.7rem;color:var(--c-muted);margin-top:16px}
.footer-code{text-align:center;font-size:.7rem;color:var(--c-muted);margin-top:8px;
  font-family:'SF Mono',Consolas,monospace}

/* 测试页 */
.quiz-header{padding:8px 0 16px}
.quiz-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.quiz-module{font-size:.75rem;color:var(--c-primary);font-weight:600;background:var(--c-primary-light);
  padding:4px 10px;border-radius:20px}
.quiz-progress{font-size:.75rem;color:var(--c-muted)}
.progress-bar{height:3px;background:var(--c-border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--c-primary);transition:width .3s ease;border-radius:2px}
.quiz-card{background:var(--c-card);border-radius:var(--radius);padding:24px 20px;
  box-shadow:var(--shadow);margin-bottom:12px}
.quiz-card h3{font-size:1rem;font-weight:700;margin-bottom:20px;line-height:1.5}
.opt-btn{display:block;width:100%;padding:14px 16px;margin-bottom:8px;background:var(--c-bg);
  border:1.5px solid var(--c-border);border-radius:var(--radius);text-align:left;
  font-size:.9rem;cursor:pointer;transition:all .12s;color:var(--c-text)}
.opt-btn:active,.opt-btn.selected{background:var(--c-primary-light);border-color:var(--c-primary);
  color:var(--c-primary);font-weight:600}
.opt-key{display:inline-block;width:24px;height:24px;line-height:24px;text-align:center;
  background:var(--c-border);border-radius:50%;font-size:.75rem;font-weight:700;margin-right:8px}
.quiz-hint{text-align:center;font-size:.7rem;color:var(--c-muted);padding:8px}

/* 加载页 */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:70vh;text-align:center}
.loading-spinner{width:40px;height:40px;border:3px solid var(--c-border);
  border-top-color:var(--c-primary);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:24px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:.95rem;color:var(--c-text);min-height:28px;line-height:1.6}
.loading-done{color:var(--c-primary);font-weight:600}

/* 结果页 */
.result-header{text-align:center;padding-top:20px}
.result-type{font-size:2rem;font-weight:800;color:var(--c-primary);margin-bottom:4px}
.result-subtitle{font-size:.9rem;color:var(--c-muted);margin-bottom:20px}
.score-ring{display:inline-flex;align-items:center;justify-content:center;
  width:80px;height:80px;border-radius:50%;border:4px solid var(--c-primary);
  font-size:1.5rem;font-weight:800;color:var(--c-primary);margin-bottom:8px}
.score-label{font-size:.75rem;color:var(--c-muted);margin-bottom:24px}

.section{background:var(--c-card);border-radius:var(--radius);padding:20px;
  box-shadow:var(--shadow);margin-bottom:14px}
.section h3{font-size:.85rem;font-weight:700;color:var(--c-primary);margin-bottom:12px;
  padding-bottom:8px;border-bottom:1px solid var(--c-border)}
.indices-row{display:flex;gap:10px;flex-wrap:wrap}
.index-item{flex:1;min-width:80px;text-align:center;padding:10px 6px;
  background:var(--c-bg);border-radius:8px}
.index-val{font-size:1.3rem;font-weight:800;color:var(--c-primary)}
.index-label{font-size:.7rem;color:var(--c-muted);margin-top:2px}

.diagnosis-text{font-size:.85rem;line-height:1.8;color:var(--c-text);white-space:pre-line}

.radar-wrap{display:flex;justify-content:center;padding:8px 0}
.radar-wrap svg{max-width:280px;width:100%}

.job-list,.no-list{list-style:none;padding:0}
.job-list li,.no-list li{padding:8px 12px;margin-bottom:4px;background:var(--c-bg);
  border-radius:6px;font-size:.82rem;display:flex;align-items:center;gap:8px}
.job-list li::before{content:'✅';font-size:.75rem}
.no-list li::before{content:'⚠️';font-size:.75rem}

.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.compare-card{padding:14px;border-radius:8px;font-size:.8rem;line-height:1.6}
.compare-good{background:#f0f7f0;border:1px solid #c8e0c8}
.compare-bad{background:#fef5f0;border:1px solid #f0d8c8}
.compare-card h4{font-size:.8rem;margin-bottom:6px}

.plan-steps{list-style:none;padding:0}
.plan-steps li{padding:10px 12px;margin-bottom:6px;background:var(--c-bg);
  border-radius:6px;font-size:.8rem;line-height:1.5;border-left:3px solid var(--c-primary)}

.closing-text{font-size:.85rem;color:var(--c-muted);font-style:italic;text-align:center;line-height:1.7}

.result-actions{display:flex;gap:10px;margin-top:20px}
.result-actions .btn{flex:1;font-size:.85rem;padding:12px}

/* 海报弹窗 */
.poster-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;
  justify-content:center;align-items:center;padding:20px}
.poster-overlay.show{display:flex}
.poster-card{background:#fff;border-radius:16px;padding:32px 24px;max-width:320px;width:100%;
  text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.15)}
.poster-card .ptype{font-size:1.8rem;font-weight:800;color:var(--c-primary);margin-bottom:4px}
.poster-card .psub{font-size:.85rem;color:var(--c-muted);margin-bottom:16px}
.poster-card .pfooter{font-size:.7rem;color:var(--c-muted);margin-top:20px;padding-top:14px;
  border-top:1px solid var(--c-border)}
.poster-close{margin-top:16px;font-size:.8rem;color:var(--c-muted);cursor:pointer;text-align:center}
</style>
</head>

 "text": "人脉很广，好像认识很多人，总能帮人牵线搭桥"}]}, {"id": 5, "text": "下面哪句话最接近你对社交这件事的内心独白？", "options": [{"key": "A", "text": "社交真的好累，如果可以，我想永远待在自己的小世界里"}, {"key": "B", "text": "我不想跟所有人都做朋友，有几个真正懂我的人就够了"}, {"key": "C", "text": "社交是一种技能，我可以根据不同的场合切换不同的模式"}, {"key": "D", "text": "人与人之间的连接是美好的，我想成为那个搭建桥梁的人"}]}, {"id": 6, "text": "想到明天要参加一个大型社交活动，你今晚的状态是？", "options": [{"key": "A", "text": "已经开始焦虑了，反复确认有没有不去的可能，甚至暗自希望明天临时有事"}, {"key": "B", "text": "先了解参加的人有哪些，如果有合拍的人才安心；如果全是陌生人就开始纠结"}, {"key": "C", "text": "会根据场合准备几套话题和交流策略，确保明天能自如应对不同的社交场景"}, {"key": "D", "text": "已经开始期待了——在脑子里过一遍谁会去、可以介绍谁和谁认识，做个连接规划"}]}, {"id": 7, "text": "独处了一整天之后，你的感觉通常是？", "options": [{"key": "A", "text": "太舒服了，这才是我的正常状态，希望今天没有任何人来打扰我的安静"}, {"key": "B", "text": "挺好的，但如果一整天都没有跟任何一个亲近的人交流，会觉得少了点什么"}, {"key": "C", "text": "还行，但我可以随时切换状态——如果突然有个朋友约我，我也能精神饱满地出门"}, {"key": "D", "text": "休息得不错，但已经开始想明天要约谁、安排什么、联络哪些人了"}]}, {"id": 8, "text": "在社交场合中，你的能量曲线是什么样的？", "options": [{"key": "A", "text": "活动开始前最高（紧张），开始后能量持续下降，结束后需要长时间独处充电"}, {"key": "B", "text": "取决于遇到什么样的人——遇到对的人能量上升，无意义的尬聊会让能量快速消耗"}, {"key": "C", "text": "比较平稳，可以根据场合调高或调低自己的状态，像有一个社交能量调节器"}, {"key": "D", "text": "持续上升——认识的人越多、建立的连接越多，能量越充沛，感到越来越充实"}]}, {"id": 9, "text": "参加一个几乎全是陌生人的大型活动，你的策略是什么？", "options": [{"key": "A", "text": "找个角落待着，玩手机等结束，或者提前悄悄溜走"}, {"key": "B", "text": "先观察一圈，锁定一两个看起来气场相合的人深入聊"}, {"key": "C", "text": "快速扫描全场氛围，调整成最适合这个场合的社交状态"}, {"key": "D", "text": "主动寻找连接点，看看谁和谁可以互相认识、互相帮助"}]}, {"id": 10, "text": "当你需要通过社交来达成某个目标时，你的做法是？", "options": [{"key": "A", "text": "能不做就不做，先看看有没有不需要社交也能完成的方法"}, {"key": "B", "text": "有选择地接触少数几个真正相关的人，深耕关系而非广撒网"}, {"key": "C", "text": "准备几套不同的交流风格，根据对象灵活切换和调整"}, {"key": "D", "text": "列一个人脉清单，系统性地逐个联系、建立连接和跟进"}]}, {"id": 11, "text": "遇到一个对你态度冷淡甚至不太友好的人，你通常会？", "options": [{"key": "A", "text": "有点受伤，默默远离，之后尽量避免跟这个人再有接触"}, {"key": "B", "text": "不勉强，我也不是对每个人都热情，随缘就好"}, {"key": "C", "text": "试着换一种交流方式，看看能不能化解对方的防备心"}, {"key": "D", "text": "通过共同认识的人侧面了解一下情况，看看是不是有什么误会"}]}, {"id": 12, "text": "在团队协作中，你更喜欢扮演哪种角色？", "options": [{"key": "A", "text": "默默做好自己分内的事，不太参与过多的讨论和发言"}, {"key": "B", "text": "跟自己信任的一两个搭档深度配合，其他人保持适当距离"}, {"key": "C", "text": "根据项目的需要灵活调整，哪里需要补位就去哪里"}, {"key": "D", "text": "负责协调各方、确保信息流畅、每个人都不掉队"}]}, {"id": 13, "text": "跟朋友之间闹了矛盾，你的处理方式更接近哪种？", "options": [{"key": "A", "text": "先冷处理，自己慢慢消化情绪，可能需要较长时间才能恢复"}, {"key": "B", "text": "衡量这段关系的价值，只有值得挽留的才会主动去沟通"}, {"key": "C", "text": "调整沟通策略，找一个双方都能接受的方式来化解矛盾"}, {"key": "D", "text": "主动搭建沟通的桥梁，必要时找共同朋友帮忙调解"}]}, {"id": 14, "text": "当你进入一个已经形成小圈子的新环境（比如新公司），你的融入策略是？", "options": [{"key": "A", "text": "先观察，不急着融入。如果有人主动跟我说话我会回应，但不会强行挤进任何一个圈子"}, {"key": "B", "text": "观察一段时间，找到一两个气场相投的人，从一对一开始慢慢建立关系"}, {"key": "C", "text": "迅速扫描各个圈子的氛围和规则，找到最适合自己的切入点，然后自然地融入"}, {"key": "D", "text": "主动和各圈子的关键人物打招呼，了解每个人的角色和擅长，看看哪里需要桥梁"}]}, {"id": 15, "text": "当你在一个社交场合中感到不自在时，你通常会？", "options": [{"key": "A", "text": "悄悄退到边缘位置，拿出手机或者去洗手间缓一缓，甚至提前悄悄离开"}, {"key": "B", "text": "找到自己熟悉或感觉舒服的人，缩小社交范围，降低能量消耗"}, {"key": "C", "text": "快速分析不自在的原因，然后调整自己的状态——换一个话题、换一种语气、换一个角色"}, {"key": "D", "text": "主动创造连接机会——介绍两个人认识、提议一个话题，让能量重新在空间中流动起来"}]}, {"id": 16, "text": "对于「向上社交」（与比自己更成功或资深的人交往），你的态度是？", "options": [{"key": "A", "text": "尽量避开。跟太厉害的人在一起我会紧张，觉得自己不够好，找不到话说"}, {"key": "B", "text": "如果有明确的价值共鸣或学习机会会尝试接触，但不为了攀关系而刻意社交"}, {"key": "C", "text": "可以调整自己的状态和表达方式，让对方感到舒服，找到自然流畅的交流频道"}, {"key": "D", "text": "这是我擅长的领域——我乐于在关键人物之间搭建连接，自己也从中获得成长"}]}, {"id": 17, "text": "你对周围人情绪变化的敏感度有多高？", "options": [{"key": "A", "text": "说实话不太敏感，有时候别人不高兴了我都没注意到"}, {"key": "B", "text": "亲近的人能感觉到，不太熟的人就不太关注他们的状态"}, {"key": "C", "text": "比较敏感，能很快捕捉到气氛和情绪的微妙变化"}, {"key": "D", "text": "很擅长读懂他人的情绪，这是建立深度连接的关键能力"}]}, {"id": 18, "text": "好朋友突然在你面前崩溃大哭，你的反应是？", "options": [{"key": "A", "text": "有点手足无措，不知道该说什么，默默在旁边陪着就好"}, {"key": "B", "text": "安静地倾听，说一些真心但不多的话，陪伴本身就是最好的支持"}, {"key": "C", "text": "根据对方的性格，判断ta是需要你给建议还是单纯当一个倾听者"}, {"key": "D", "text": "先共情对方的感受，然后帮ta梳理情绪、一起分析问题"}]}, {"id": 19, "text": "听到一个你不认识的人的悲惨遭遇，你内心的反应是？", "options": [{"key": "A", "text": "心里会触动一下，但很快就回到自己的世界里了"}, {"key": "B", "text": "如果跟自己的经历相似会特别触动，否则感觉还好"}, {"key": "C", "text": "能设身处地感受对方的痛苦，情绪上会受一定影响"}, {"key": "D", "text": "除了共情，还会想能不能做点什么实际的事来帮助对方"}]}, {"id": 20, "text": "在发生争执的时候，你能理解对方的立场吗？", "options": [{"key": "A", "text": "比较难，我通常觉得自己是对的，不太理解对方为什么那样想"}, {"key": "B", "text": "如果对方是我在乎的人，我会试着换位思考一下"}, {"key": "C", "text": "能，我理解每个人的立场背后都有ta的原因和逻辑"}, {"key": "D", "text": "不仅能理解，还能看到双方共同的利益点和可能的和解方案"}]}, {"id": 21, "text": "对身边人的情绪状态和内心需求，你的关注程度是？", "options": [{"key": "A", "text": "说实话我不太主动关注别人的状态，更多是专注在自己的事情上"}, {"key": "B", "text": "对我在意的人我会特别上心，其他人就不太会留意"}, {"key": "C", "text": "我像一面镜子，能自然地反映和回应对方的情绪状态"}, {"key": "D", "text": "我常是朋友圈里的「情绪中转站」，大家遇到问题愿意来找我聊"}]}, {"id": 22, "text": "在团体讨论中，你通常能感受到「没有被说出来」的隐藏信息吗？", "options": [{"key": "A", "text": "说实话不太能，我更多关注自己该怎么回应，不太注意到别人没说的隐藏信息"}, {"key": "B", "text": "对自己了解亲近的人可以，但对不太熟的人就不太能感知到他们的隐藏情绪"}, {"key": "C", "text": "经常能——我能感觉到气氛中微妙的变化，谁虽然点了头但心里其实不同意"}, {"key": "D", "text": "不仅自己能感受到，还会想办法让那些隐藏信息浮现——「XX好像有不同想法？」"}]}, {"id": 23, "text": "当你发现自己的意见无意中伤害到了别人，你的反应是？", "options": [{"key": "A", "text": "很内疚但不知道该怎么办，可能会默默减少跟那个人的接触来避免更多尴尬"}, {"key": "B", "text": "如果那个人对我是重要的，我会私下找ta真诚地道歉和沟通；否则就算了"}, {"key": "C", "text": "马上切换自己的表达方式，调整语气和措辞，尝试在当下修复气氛和关系"}, {"key": "D", "text": "主动找ta聊，先道歉再认真了解ta的感受，然后看看有没有办法弥补或改进"}]}, {"id": 24, "text": "你对「社交中需要多少共情」的看法是？", "options": [{"key": "A", "text": "共情很累。我自己的情绪世界已经够我处理的了，没有多余的精力去共情太多人"}, {"key": "B", "text": "对我关心的人我会深度共情，但不想把有限的共情力浪费在泛泛之交上"}, {"key": "C", "text": "共情是我最重要的社交雷达——它让我知道在什么场合、用什么样的方式去连接他人"}, {"key": "D", "text": "共情是建立连接的基石——不能真正理解他人，就无法真正成为那个「桥梁」"}]}, {"id": 25, "text": "一个不太熟的人向你提出一个比较过分的请求，你的反应是？", "options": [{"key": "A", "text": "心里很不舒服但可能不知道怎么拒绝，纠结很久最后还是答应了"}, {"key": "B", "text": "看情况，如果觉得不合适会委婉但有分寸地拒绝"}, {"key": "C", "text": "根据对方的态度和彼此关系的亲疏，灵活决定怎么处理"}, {"key": "D", "text": "礼貌但坚定地说不，同时维护好关系不让对方难堪"}]}, {"id": 26, "text": "同事总是在下班后发消息跟你聊工作，你内心是什么感受？", "options": [{"key": "A", "text": "很烦躁但又不好意思说，只能默默忍着，假装没看到"}, {"key": "B", "text": "偶尔可以接受，但如果太频繁我会用行动表达自己的界限"}, {"key": "C", "text": "看情况，紧急的可以回，其他的巧妙转移话题或延迟回复"}, {"key": "D", "text": "温和地跟对方沟通，说明自己的时间边界，同时保持友好关系"}]}, {"id": 27, "text": "当你拒绝别人时，你心里通常在想什么？", "options": [{"key": "A", "text": "天哪我是不是说错话了？对方会不会因此讨厌我？好纠结……"}, {"key": "B", "text": "这段关系对我重要吗？如果不重要的话，拒绝也没什么关系"}, {"key": "C", "text": "怎么找一个双方都不尴尬的说法，既拒绝又不伤害关系"}, {"key": "D", "text": "坦诚是最好的策略，说清楚真实原因对方反而会更尊重你"}]}, {"id": 28, "text": "关于在社交媒体上分享个人生活，你的态度是？", "options": [{"key": "A", "text": "几乎不发，朋友圈设置三天可见，或者干脆什么都不发"}, {"key": "B", "text": "偶尔分享一些真正重要的时刻，而且只给亲近的人看"}, {"key": "C", "text": "有选择地分享，根据不同的平台展示自己不同的侧面"}, {"key": "D", "text": "适度分享，把社交平台当作维系和拓展人脉的有用工具"}]}, {"id": 29, "text": "你心中最理想的社交生活状态是什么样的？", "options": [{"key": "A", "text": "大部分时间独处，偶尔见一两个最亲近的人就已经很满足了"}, {"key": "B", "text": "有几个能深度交流的知己好友，不需要太多无意义的表面社交"}, {"key": "C", "text": "能够自由地在独处和社交之间切换，完全掌控自己的社交节奏"}, {"key": "D", "text": "拥有一个活跃且多元的社交网络，自己处在连接的中心位置"}]}, {"id": 30, "text": "看到朋友在群里公开分享了你私下告诉ta的私事，你的反应是？", "options": [{"key": "A", "text": "心里非常不舒服但可能不会在群里说什么，只是默默在心里把ta的信任级别调低了"}, {"key": "B", "text": "会私下跟ta说「这件事我没打算让别人知道，下次可以先问我吗」——边界需要明确"}, {"key": "C", "text": "先看看ta是出于什么原因分享的——无心之失会委婉提醒，故意的就会重新评估这段关系"}, {"key": "D", "text": "直接但友好地在群里说「哈哈这个我还是想保持一点神秘感」，然后自然地把话题转开"}]}, {"id": 31, "text": "当一个朋友总是「单方面消耗你」（比如只找你倾诉但从不关心你），你会？", "options": [{"key": "A", "text": "忍着，不知道怎么开口说这件事，但会渐渐疏远、回复越来越慢、见面越来越少"}, {"key": "B", "text": "如果这段关系对我很重要，会找机会表达感受；如果没那么重要，就自然地降级处理"}, {"key": "C", "text": "调整自己跟ta的互动模式——变成倾听但不投入太多，保护好自己的能量不被过度消耗"}, {"key": "D", "text": "直接而温和地表达：「我注意到我们最近的交流模式不太平衡，我想跟你聊聊这个」"}]}, {"id": 32, "text": "如果要用一句话总结你与「人群」的关系，你觉得最准确的是？", "options": [{"key": "A", "text": "「我靠近人群，是为了确认自己还可以安然无恙地回到独处。」"}, {"key": "B", "text": "「我不需要整个世界，我需要几个能在深夜里不设防地说话的人。」"}, {"key": "C", "text": "「我在每一面镜子里都看到了自己，但我知道哪一面才是我本来的模样。」"}, {"key": "D", "text": "「让我遇见你的那一刻，孤岛之间就又多了一座桥。」"}]}], "resultTypes": {"A": {"name": "🛡️ 社恐保护区", "subtitle": "安静是一种力量，你的小世界自有其深度", "maturityScore": 80, "indices": [{"label": "内向指数", "value": 92}, {"label": "独处充电能力", "value": 90}, {"label": "深度思考力", "value": 85}], "diagnosis": "你的社交人格处于「社恐保护层」——这不是缺陷，而是一种独特的与世界相处的方式。你对外部社交刺激较为敏感，社交对你来说更像是一种消耗而非充电。你享受独处的深度和宁静，在安静的环境中能发挥出最大的创造力和思考力。你或许只有三五个真正懂你的朋友，但这些关系的质量远高于数量。社会常常推崇外向和社交达人，但内向和谨慎同样是一种力量。重要的是，你不必强迫自己变成一个「社交达人」，你需要的是找到一个尊重你节奏的环境和人群。你的敏感和内向，恰恰让你对世界有着不一样的深刻洞察。请记住，世界上至少有三分之一的人跟你一样，你不是异类，你只是用了不同的天线来接收这个世界。", "radarData": [{"label": "社交能量", "value": 20}, {"label": "社交策略", "value": 35}, {"label": "共情能力", "value": 65}, {"label": "边界意识", "value": 30}, {"label": "社交适应力", "value": 25}], "suitableJobs": ["独立创作者（写作、设计、编程）", "远程自由职业者", "深度研究型岗位", "小而精的亲密团队"], "unsuitableJobs": ["高频应酬的销售岗", "大型团建频繁的公司文化", "完全开放式办公环境"], "pathCompare": {"good": "顺应天赋：在安静、低刺激的环境中深耕自己的专长，用作品和深度而非社交数量来建立影响力。你的能量来自于向内探索，找到允许你这样工作的环境，你会爆发出惊人的创造力。", "bad": "逆天赋：强迫自己参加大量社交活动、在不合适的职场文化中硬撑，会导致持续的能量透支、焦虑加重，甚至产生自我否定。你不是不行，你只是不在适合自己的赛道上。"}, "plan90": ["【第1-30天·接纳期】①每天写1条「社交特质日记」，记录自己因为内向而获得的独特优势（如观察力、深度思考），连续坚持21天以上；②在线上社群中每周主动发表1次有深度的评论或观点，用文字表达代替面对面社交的紧张感，逐步建立自信；③邀请1-2位最信任的朋友进行每月2次的1对1深度对话（咖啡馆或散步均可），时长控制在45分钟以内，避免能量透支；④为自己绘制一份「能量地图」：标记出哪些场景让你充电（如独处看书、写作）、哪些让你耗电（如大型聚会），形成可视化认知。✅ 目标：接纳自己，找到舒适的社交方式", "【第31-60天·小步期】①设定「每周1次微挑战」：在安全的低风险场景中主动开口说至少1句完整的话（如对咖啡师说声谢谢并加一句夸赞、在小组会议中主动分享1个观点），记录在手机备忘录中；②每两周组织或参加1次不超过4人的小型聚会，提前准备好2-3个轻松话题作为「社交安全垫」，聚会时间控制在90分钟以内；③每周在至少1个微信群中分享1条有价值的内容（文章、观点或趣事），先从转发开始，逐步过渡到原创表达；④建立「微成就清单」：每次完成微社交挑战后，写下3条积极的自我肯定（如「我做到了」「我说出了想法」「对方反应很好」），积累正反馈循环。✅ 目标：在舒适区边缘慢慢扩展", "【第61-90天·技能期】①掌握「破冰三句式」：每周对着镜子练习3次，内容包括「一个真诚的观察+一个开放性问题+一个共鸣点」，在至少3次真实的轻度社交场景中试用并记录反馈；②练习「3层倾听法」：在每次对话中有意识地做到「听懂内容→听懂情绪→听懂需求」三个层次，每周至少练习2次并在日记中复盘；③在自己的专业领域（如工作技能、兴趣爱好）创建一个社交媒体账号，每周发布至少1篇200字以上的专业见解或经验分享，用专业深度建立线上影响力，让「别人来找你交流」取代「你去找别人社交」；④为自己设计3个「社交应急模板」：包括如何优雅地提前离场、如何礼貌地拒绝邀约、如何在尬聊中自然地转换话题，反复练习直到成为肌肉记忆。✅ 目标：必要社交时不紧张，有自己的社交舒适区"], "closing": "你不必强迫自己成为太阳，做一颗安静的星星，同样能照亮属于自己的夜空。", "posterText": "社恐保护层——安静是一种力量", "posterSubtext": "我不是不合群，只是我的世界小而美，深而静"}, "B": {"name": "🎭 选择性社交", "subtitle": "少即是多，高质量的连接胜过万千点头之交", "maturityScore": 85, "indices": [{"label": "选择精准度", "value": 88}, {"label": "深度关系力", "value": 90}, {"label": "自我认知力", "value": 86}], "diagnosis": "你的社交人格处于「选择性社交层」——你并非不善社交，而是选择了更有质量的社交方式。你像一个精明的社交投资家，不把时间浪费在无意义的寒暄和表面关系上，而是将有限的情感资源精准投入到少数真正重要的人身上。你清楚自己跟什么样的人合拍，也明确什么场合会让你不舒服，所以你会主动筛选而不是被动接受。这种选择性不是封闭或高傲，而是一种成熟的自我认知和对自己能量的尊重。你对关系的深度和质量有着天然的追求，浅尝辄止的社交让你觉得索然无味。继续坚持你的标准，不必因为他人的「朋友遍天下」而感到焦虑——几个知己，胜过万千点赞。你的社交哲学是「宁缺毋滥」，这在浮躁的时代里是一种难得的清醒。", "radarData": [{"label": "社交能量", "value": 50}, {"label": "社交策略", "value": 85}, {"label": "共情能力", "value": 75}, {"label": "边界意识", "value": 88}, {"label": "社交适应力", "value": 55}], "suitableJobs": ["精品咨询顾问", "独立自由职业", "小而美的精品工作室", "项目制深度协作岗位"], "unsuitableJobs": ["需要广撒网的纯销售岗", "高频陌生人对接工作", "大型企业的应酬密集型岗位"], "pathCompare": {"good": "顺应天赋：把精力聚焦在少数高质量的关系和专业领域上，用深度和专业度取胜。你的能量来自于有意义的深度连接，而不是社交数量。选择那些重视质量而非数量的环境和团队，你会如鱼得水。", "bad": "逆天赋：逼自己去做广撒网式的社交拓展、强迫自己对每个人都保持热情，会让你快速耗尽能量并产生强烈的虚无感。在不适合的社交节奏中硬撑，只会让你对社交本身产生抵触。"}, "plan90": ["【第1-30天·选择期】①用一张A4纸列出过去一个月所有社交活动（聚会、饭局、聊天、电话等），给每项打分（1-10分），标注出得分低于4分的「能量黑洞活动」和得分高于8分的「充电型活动」；②制定「社交断舍离清单」：在接下来一个月内，对3项以上低价值社交活动委婉说不（如无意义的应酬饭局、纯打卡式聚会），用节省下来的时间做一件真正滋养自己的事；③筛选出5-8位「核心关系圈」成员——那些让你相处后感到能量上升而非下降的人，计划每周与其中至少2位进行有质量的交流（深度对话而非客套寒暄）；④记录每次社交后的「能量账本」：花了多少时间、感受如何、值得吗，连续记录30天，月底复盘调整社交策略。✅ 目标：社交质量提升，数量减少", "【第31-60天·深化期】①从「核心关系圈」中锁定3-5位关键人，每周与每位至少进行1次深度交流（30-60分钟），话题不限但要求双方都能真诚表达，建立「定期深度连接」的节奏；②对每位关键人准备一份「关系投资清单」：记录ta最近的困扰、需求和兴趣点，每月至少为对方提供1次实质性的帮助或支持（信息、资源、陪伴），让关系从单向走向双向滋养；③在有意义的场合（如工作讨论、朋友深度聚会）中每周至少主动表达1次自己的真实想法或感受，练习「不迎合、不表演」的社交状态；④对其他泛泛之交的场合，允许自己保持友善但不过度投入，每周给自己至少1次「社交节能日」——完全不参加任何非必要的社交活动。✅ 目标：有几个真正深入的社交关系", "【第61-90天·平衡期】①制作「个人社交能量档案」：基于前两个月的记录，将社交活动分为A类（深度充电型，如知己夜聊）、B类（中性维持型，如工作午餐）、C类（快速消耗型，如大型陌生人聚会），标注每类活动的「能量续航时长」；②制定每周「社交预算表」：将精力和时间像金钱一样分配——A类活动占50%、B类占35%、C类不超过15%，每周日用15分钟检查上周实际消耗与预算是否匹配；③在每周日历上固定预留至少2个「独处充电块」（每次不少于2小时），作为不可被社交占用的大本营时间，雷打不动地保护它；④设计一套「社交红绿灯」信号系统：绿色（精力充沛，可接受额外社交）、黄色（适中，按计划行事）、红色（能量告急，启动保护模式取消非必要社交），每天早晚各评估一次自己的状态。✅ 目标：社交和独处达到最佳平衡"], "closing": "深度比广度更难，也更有价值。做一个有选择的人，是对自己最大的尊重。", "posterText": "选择性社交层——少即是多", "posterSubtext": "几个知己，胜过万千点赞。我的社交信条是宁缺毋滥"}, "C": {"name": "🦎 社交变色龙", "subtitle": "千面一心，灵活是你最强大的社交超能力", "maturityScore": 82, "indices": [{"label": "适应灵活度", "value": 92}, {"label": "角色转换力", "value": 90}, {"label": "环境感知力", "value": 88}], "diagnosis": "你的社交人格处于「社交变色龙层」——你拥有一种令人羡慕的能力：根据环境和对象灵活调整自己的社交模式。你不拘泥于一种固定的社交风格，而是像一个经验丰富的导演，能在不同的社交舞台上自如切换角色。跟长辈在一起时你端庄稳重，跟朋友在一起时你幽默随性，跟客户在一起时你专业自信。这种灵活度让你几乎可以适应任何社交场合，跟不同背景、不同性格的人都能迅速找到共同语言。但要警惕的是，在频繁的切换中不要迷失了真实的自己。适度的「变色」帮助你更好地融入世界，但过度迎合可能会让你忘记自己本来的颜色。你的优势在于灵活和适应力——记得在变色之余，保留一个只属于自己的核心色彩，那是你区别于所有人的独特印记。", "radarData": [{"label": "社交能量", "value": 70}, {"label": "社交策略", "value": 90}, {"label": "共情能力", "value": 85}, {"label": "边界意识", "value": 60}, {"label": "社交适应力", "value": 95}], "suitableJobs": ["公关传媒与品牌管理", "跨界项目经理", "商务拓展与客户管理", "用户研究与市场洞察"], "unsuitableJobs": ["高度重复无需变通的单一岗位", "完全独立无需与人协作的工作", "死板规范不容灵活发挥的职位"], "pathCompare": {"good": "顺应天赋：把你的灵活适应能力用在需要跨部门沟通、对接不同人群的岗位上。你的变色龙天赋是沟通和协调的利器，让你成为团队中不可或缺的「万能接口」。", "bad": "逆天赋：长期在一个不允许灵活发挥、不需要跟人打交道的封闭环境中工作，会让你感到被束缚和压抑。过度迎合他人而不断变换自己，也可能导致自我认同的模糊。"}, "plan90": ["【第1-30天·觉察期】①建立「社交角色日志」：每天花10分钟记录当天出现的不同社交场合（如职场、家庭、朋友聚会、陌生人社交），写下在每个场合中自己呈现的「角色版本」，标注出舒适度（1-10分）；②识别3-5个高频社交场景中你佩戴的「面具」：比如「职场专业脸」「聚会开心果」「长辈面前乖孩子」，追问每个面具背后的驱动力——是为了被认可？为了安全？还是为了不让人失望？③找出至少1个让你完全卸下面具的人或场合（可能是某个老朋友、伴侣或独处时的自己），记录下在那个场景中你的真实特质是什么——ta眼中的你和你面具下的你有什么不同？④每周做1次「真我对照检查」：对比面具版自己与真实版自己在核心价值观上的偏差（如是否说了违心的话、是否迎合了不认同的观点），把偏差记录在册。✅ 目标：对自己的社交模式有清晰认知", "【第31-60天·整合期】①主动扩大「真我舒适区」：每周安排至少1次可以完全做自己的社交时间（每次不少于1小时），可以是一个人独处，也可以是和1-2个完全信任的人在一起不设防地交流；②制定「核心价值观清单」：写下你认为最重要的3-5个价值观（如真诚、善良、独立思考），在每次进入不同社交场合前默念一遍，让这3-5个词成为贯穿所有角色的「底色」，确保不在任何场合违背这些核心原则；③练习「一致表达法」：在需要迎合的场合中，试着用自己真实的想法来表达，但调整表达方式而非内容本身——每周至少在2次社交中实践这种「内核真实、外壳友善」的沟通；④在月底做一次「面具与真我的距离评估」：对比月初和月末，你的社交面具和真实自我之间的差距缩小了多少？哪些场景最容易让你保持真实？哪些场景仍然让你紧绷？形成下一步的行动清单。✅ 目标：社交面具和真实自我越来越接近", "【第61-90天·升级期】①主动承担至少1个跨部门或跨圈层的连接角色（如工作项目的协调人、兴趣社群的桥梁人），利用你对不同人群风格的适应优势，每月促成至少2次有意义的跨圈连接；②建立「社交价值输出清单」：发挥变色龙的灵活优势，每周为不同领域的人提供1次针对性的帮助——用对方喜欢的方式沟通，但提供的是你自己真正认可的价值，而非虚假迎合；③每月主导1次小型跨界活动（线上线下均可，如主题分享、圆桌讨论），邀请来自不同背景的5-8人参与，观察别人因你的连接而碰撞出的火花，记录从中获得的成就感；④设置「真我时刻」：每天早上和睡前各花5分钟确认「今天的我是谁」「今天哪一刻我最像真正的自己」，确保灵活适应不等于迷失自我，在变色 // ═══════════════════════════════════════
// 通用测试引擎
// ═══════════════════════════════════════
(function(){
const app = document.getElementById('app');
let answers = {};           // { questionId: optionKey }
let currentQuestion = 0;
let currentRoute = '';
let typewriterTimer = null;

// ── 路由 ──────────────────────────────
function navigate(route) {
  if (typewriterTimer) { clearInterval(typewriterTimer); typewriterTimer = null; }
  currentRoute = route;
  window.location.hash = route;
  render();
  window.scrollTo(0, 0);
}

function getRoute() {
  const hash = window.location.hash.replace('#', '') || '/';
  return hash;
}

// ── 渲染主入口 ────────────────────────
function render() {
  const route = getRoute();
  currentRoute = route;

  switch(route) {
    case '/': renderHome(); break;
    case '/quiz': renderQuiz(); break;
    case '/loading': renderLoading(); break;
    case '/result': renderResult(); break;
    default: navigate('/'); break;
  }
}

// ── 首页 ──────────────────────────────
function renderHome() {
  const h = CONFIG.home;
  const dims = CONFIG.dimensions || [];
  app.innerHTML = `
    <div class="page active">
      <div class="home-header">
        <h1>${h.title}</h1>
        <p class="sub">${h.subtitle}</p>
      </div>
      <div class="home-intro">${h.introHTML || h.intro}</div>
      ${dims.length ? `<div class="dim-grid">${dims.map(d =>
        `<div class="dim-card"><span class="icon">${d.icon||'📊'}</span>${d.name}</div>`
      ).join('')}</div>` : ''}
      <button class="btn btn-primary" onclick="APP.start()">${h.btnText||'开始测试'}</button>
      <p class="footer-note">${h.disclaimer||'本测试仅供娱乐参考，非科学评估。'}</p>
      <p class="footer-code">${CONFIG.scoring.questionCount || CONFIG.questions.length} Questions · ${(CONFIG.dimensions||[]).length||1} Dimensions · 1 Diagnosis</p>
    </div>`;
}

// ── 测试页 ────────────────────────────
function renderQuiz() {
  const questions = CONFIG.questions;
  const dims = CONFIG.dimensions || [];
  const total = questions.length;
  const q = questions[currentQuestion];
  const dim = dims.find(d => (d.questionIds||[]).includes(q.id));
  const dimName = dim ? dim.name : '';
  const progress = ((currentQuestion) / total * 100).toFixed(0);
  const moduleLabel = dimName ? `${dimName}` : '';

  app.innerHTML = `
    <div class="page active">
      <div class="quiz-header">
        <div class="quiz-meta">
          <span class="quiz-module">${moduleLabel}</span>
          <span class="quiz-progress">${currentQuestion + 1} / ${total}</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      </div>
      <div class="quiz-card">
        <h3>${q.text}</h3>
        ${q.options.map((opt, i) => `
          <button class="opt-btn" onclick="APP.answer('${opt.key}')" id="opt-${i}">
            <span class="opt-key">${opt.key}</span>${opt.text}
          </button>
        `).join('')}
      </div>
      <p class="quiz-hint">选择后自动进入下一题</p>
    </div>`;
}

// ── 作答 ──────────────────────────────
function answer(key) {
  const q = CONFIG.questions[currentQuestion];
  answers[q.id] = key;
  currentQuestion++;

  if (currentQuestion >= CONFIG.questions.length) {
    navigate('/loading');
  } else {
    renderQuiz();
    window.scrollTo(0, 0);
  }
}

// ── 加载页（逐字打印） ────────────────
function renderLoading() {
  const msgs = CONFIG.loadingMessages || ['正在分析中……', '分析完成。'];
  app.innerHTML = `
    <div class="page active">
      <div class="loading-wrap">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="typewriter"></div>
      </div>
    </div>`;

  const el = document.getElementById('typewriter');
  let msgIdx = 0;
  let charIdx = 0;
  let allDone = false;

  function tick() {
    if (allDone) return;
    if (msgIdx >= msgs.length) {
      el.classList.add('loading-done');
      el.textContent = msgs[msgs.length - 1];
      allDone = true;
      setTimeout(() => navigate('/result'), 800);
      return;
    }
    const msg = msgs[msgIdx];
    if (charIdx <= msg.length) {
      el.textContent = msg.slice(0, charIdx);
      charIdx++;
      typewriterTimer = setTimeout(tick, 60 + Math.random() * 40);
    } else {
      msgIdx++;
      charIdx = 0;
      typewriterTimer = setTimeout(tick, 400);
    }
  }
  tick();
}

// ── 评分 ──────────────────────────────
function calculateResult() {
  const scoring = CONFIG.scoring || {};
  const counts = {};
  for (const key of Object.keys(CONFIG.resultTypes)) {
    counts[key] = 0;
  }
  for (const ans of Object.values(answers)) {
    if (counts[ans] !== undefined) counts[ans]++;
  }
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  const primary = sorted[0][0];
  const secondary = sorted.length > 1 && (sorted[0][1] - sorted[1][1]) <= (scoring.mixedThreshold || 3) && sorted[1][1] > 0
    ? sorted[1][0] : null;

  return { primary, secondary, counts, hasSecondary: !!secondary };
}

// ── 雷达图 SVG ────────────────────────
function renderRadar(data, size = 260) {
  const cx = size / 2, cy = size / 2, r = size * 0.35;
  const n = data.length;
  if (n < 3) return '<p style="text-align:center;color:var(--c-muted)">数据不足</p>';

  const angleStep = (2 * Math.PI) / n;
  const levels = 5;
  let paths = '';

  // 背景网格
  for (let lv = 1; lv <= levels; lv++) {
    const rr = r * (lv / levels);
    let pts = [];
    for (let i = 0; i < n; i++) {
      const angle = angleStep * i - Math.PI / 2;
      pts.push(`${cx + rr * Math.cos(angle)},${cy + rr * Math.sin(angle)}`);
    }
    paths += `<polygon points="${pts.join(' ')}" fill="none" stroke="var(--c-border)" stroke-width="0.5"/>`;
  }

  // 轴线
  for (let i = 0; i < n; i++) {
    const angle = angleStep * i - Math.PI / 2;
    paths += `<line x1="${cx}" y1="${cy}" x2="${cx + r * Math.cos(angle)}" y2="${cy + r * Math.sin(angle)}" stroke="var(--c-border)" stroke-width="0.5"/>`;
  }

  // 数据多边形
  let dataPts = [];
  for (let i = 0; i < n; i++) {
    const angle = angleStep * i - Math.PI / 2;
    const val = Math.max(0, Math.min(100, data[i].value || 0)) / 100;
    const rr = r * val;
    dataPts.push(`${cx + rr * Math.cos(angle)},${cy + rr * Math.sin(angle)}`);
  }
  paths += `<polygon points="${dataPts.join(' ')}" fill="var(--c-primary)" fill-opacity="0.2" stroke="var(--c-primary)" stroke-width="2"/>`;

  // 数据点
  for (let i = 0; i < n; i++) {
    const angle = angleStep * i - Math.PI / 2;
    const val = Math.max(0, Math.min(100, data[i].value || 0)) / 100;
    const rr = r * val;
    paths += `<circle cx="${cx + rr * Math.cos(angle)}" cy="${cy + rr * Math.sin(angle)}" r="4" fill="var(--c-primary)"/>`;
  }

  // 标签
  let labels = '';
  for (let i = 0; i < n; i++) {
    const angle = angleStep * i - Math.PI / 2;
    const lr = r + 24;
    const lx = cx + lr * Math.cos(angle);
    const ly = cy + lr * Math.sin(angle);
    const anchor = lx < cx - 10 ? 'end' : lx > cx + 10 ? 'start' : 'middle';
    labels += `<text x="${lx}" y="${ly}" text-anchor="${anchor}" dominant-baseline="middle" font-size="11" fill="var(--c-text)" font-weight="600">${data[i].label}</text>`;
  }

  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg">${paths}${labels}</svg>`;
}

// ── 结果页 ────────────────────────────
function renderResult() {
  const result = calculateResult();
  const rt = CONFIG.resultTypes[result.primary];
  if (!rt) { navigate('/'); return; }

  const secondaryRt = result.hasSecondary ? CONFIG.resultTypes[result.secondary] : null;
  const typeName = secondaryRt ? `${rt.name} × ${secondaryRt.name}` : rt.name;
  const subtitle = secondaryRt
    ? `你同时具备${rt.name}和${secondaryRt.name}的特质，属于复合型人才`
    : rt.subtitle;

  // 混合型诊断
  let mixedNote = '';
  if (result.hasSecondary && CONFIG.mixedNotes) {
    const key = `${result.primary}+${result.secondary}`;
    const keyRev = `${result.secondary}+${result.primary}`;
    mixedNote = CONFIG.mixedNotes[key] || CONFIG.mixedNotes[keyRev] || '';
  }

  const indices = rt.indices || [];
  const radar = rt.radarData || [];
  const jobs = rt.suitableJobs || [];
  const noJobs = rt.unsuitableJobs || [];
  const plan = rt.plan90 || [];
  const pathC = rt.pathCompare || {};

  app.innerHTML = `
    <div class="page active">
      <div class="result-header">
        <div class="result-type">${typeName}</div>
        <p class="result-subtitle">${subtitle}</p>
        <div class="score-ring">${rt.maturityScore}</div>
        <p class="score-label">${CONFIG.scoring.scoreLabel || '职业路径决策成熟度'}</p>
      </div>

      ${indices.length ? `
      <div class="section">
        <h3>📊 关键指数</h3>
        <div class="indices-row">${indices.map(ix => `
          <div class="index-item"><div class="index-val">${ix.value}</div><div class="index-label">${ix.label}</div></div>
        `).join('')}</div>
      </div>` : ''}

      <div class="section">
        <h3>🔍 核心诊断</h3>
        <div class="diagnosis-text">${rt.diagnosis}${mixedNote ? '\n\n' + mixedNote : ''}</div>
      </div>

      ${radar.length >= 3 ? `
      <div class="section">
        <h3>📡 能力雷达图</h3>
        <div class="radar-wrap">${renderRadar(radar)}</div>
      </div>` : ''}

      ${jobs.length ? `
      <div class="section">
        <h3>🍚 适合的饭碗</h3>
        <ul class="job-list">${jobs.map(j => `<li>${j}</li>`).join('')}</ul>
      </div>` : ''}

      ${noJobs.length ? `
      <div class="section">
        <h3>⚠️ 不太适合的方向</h3>
        <ul class="no-list">${noJobs.map(j => `<li>${j}</li>`).join('')}</ul>
      </div>` : ''}

      ${(pathC.good || pathC.bad) ? `
      <div class="section">
        <h3>🔀 两条路径对比</h3>
        <div class="compare-grid">
          <div class="compare-card compare-good"><h4>✅ 顺应天赋</h4><p>${pathC.good||''}</p></div>
          <div class="compare-card compare-bad"><h4>⚠️ 逆天赋而行</h4><p>${pathC.bad||''}</p></div>
        </div>
      </div>` : ''}

      ${plan.length ? `
      <div class="section">
        <h3>📋 90天行动清单</h3>
        <ul class="plan-steps">${plan.map((p,i) => `
          <li><strong>第${i+1}步（第${i*30+1}-${(i+1)*30}天）</strong>：${p}</li>
        `).join('')}</ul>
      </div>` : ''}

      <div class="section">
        <p class="closing-text">${rt.closing||''}</p>
      </div>

      <div class="result-actions">
        <button class="btn btn-outline" onclick="APP.restart()">重新测试</button>
        <button class="btn btn-primary" onclick="APP.showPoster()">📤 分享结果</button>
      </div>
    </div>`;

  // 保存海报数据
  window._posterData = { typeName, posterText: rt.posterText||rt.name, posterSubtext: rt.posterSubtext||rt.subtitle, meta: CONFIG.meta };
}

// ── 分享海报 ──────────────────────────
function showPoster() {
  const pd = window._posterData || {};
  const overlay = document.createElement('div');
  overlay.className = 'poster-overlay show';
  overlay.id = 'poster-overlay';
  overlay.innerHTML = `
    <div class="poster-card" id="poster-card">
      <p style="font-size:.75rem;color:var(--c-muted);margin-bottom:8px">我的测试结果</p>
      <div class="ptype">${pd.posterText||''}</div>
      <p class="psub">${pd.posterSubtext||''}</p>
      <div style="width:60px;height:3px;background:var(--c-primary);margin:16px auto;border-radius:2px"></div>
      <p style="font-size:.75rem;color:var(--c-muted)">「${pd.meta?.title||''}」</p>
      <div class="pfooter">扫码测测你的 →</div>
    </div>
    <p class="poster-close" onclick="this.parentElement.remove()">关闭</p>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', function(e){ if(e.target===this) this.remove(); });
}

// ── 重新开始 ──────────────────────────
function restart() {
  answers = {};
  currentQuestion = 0;
  sessionStorage.removeItem('quiz_answers');
  navigate('/');
}

// ── 初始化 ────────────────────────────
function init() {
  // 尝试从 sessionStorage 恢复
  const saved = sessionStorage.getItem('quiz_answers');
  if (saved) {
    try { answers = JSON.parse(saved); } catch(e) {}
  }

  window.addEventListener('hashchange', render);
  render();
}

// ── 暴露 API ──────────────────────────
window.APP = {
  start: () => { answers = {}; currentQuestion = 0; navigate('/quiz'); },
  answer: (key) => {
    answer(key);
    // 保存到 sessionStorage
    sessionStorage.setItem('quiz_answers', JSON.stringify(answers));
  },
  restart,
  showPoster,
  navigate,
};

init();
})();
</script>
</body>
</html>
