<!DOCTYPE html>
<html lang="zh-CN">
<head>

<style>
:root{

  --c-primary:#d4784a;--c-primary-light:#fdf0e8;--c-border:#e8ddd2;
  --c-accent-a:#e8784a;--c-accent-b:#4a9eb0;--c-accent-c:#8b6caf;
  --c-accent-d:#5a8a6a;--c-accent-e:#c08050;--c-danger:#c44;
  --radius:12px;--shadow:0 2px 16px rgba(60,30,10,.06);
  --font:system-ui,-apple-system,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--c-bg);color:var(--c-text);line-height:1.6;
  -webkit-font-smoothing:antialiased;min-height:100vh;display:flex;justify-content:center}
#app{width:100%;max-width:480px;min-height:100vh;position:relative;overflow:hidden}
.page{display:none;padding:24px 20px 40px;min-height:100vh}
.page.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* 首页 */
.home-header{text-align:center;padding-top:40px}
.home-header h1{font-size:1.75rem;font-weight:800;color:var(--c-primary);line-height:1.3;margin-bottom:8px}
.home-header .sub{font-size:.9rem;color:var(--c-muted);margin-bottom:32px;line-height:1.5}
.home-intro{background:var(--c-card);border-radius:var(--radius);padding:20px;margin-bottom:20px;
  box-shadow:var(--shadow);font-size:.875rem;color:var(--c-muted);line-height:1.8}
.home-intro p{margin-bottom:8px}
.home-intro .highlight{color:var(--c-primary);font-weight:600}
.dim-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px}
.dim-card{background:var(--c-card);border:1px solid var(--c-border);border-radius:var(--radius);
  padding:14px 12px;text-align:center;font-size:.8rem;font-weight:600;color:var(--c-text)}
.dim-card .icon{font-size:1.3rem;display:block;margin-bottom:4px}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:var(--radius);
  font-size:1rem;font-weight:700;cursor:pointer;text-align:center;transition:all .15s}
.btn-primary{background:var(--c-primary);color:#fff}
.btn-primary:active{opacity:.85;transform:scale(.98)}
.btn-outline{background:var(--c-card);color:var(--c-primary);border:1.5px solid var(--c-border)}
.footer-note{text-align:center;font-size:.7rem;color:var(--c-muted);margin-top:16px}
.footer-code{text-align:center;font-size:.7rem;color:var(--c-muted);margin-top:8px;
  font-family:'SF Mono',Consolas,monospace}

/* 测试页 */
.quiz-header{padding:8px 0 16px}
.quiz-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.quiz-module{font-size:.75rem;color:var(--c-primary);font-weight:600;background:var(--c-primary-light);

.quiz-progress{font-size:.75rem;color:var(--c-muted)}
.progress-bar{height:3px;background:var(--c-border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--c-primary);transition:width .3s ease;border-radius:2px}
.quiz-card{background:var(--c-card);border-radius:var(--radius);padding:24px 20px;

.quiz-card h3{font-size:1rem;font-weight:700;margin-bottom:20px;line-height:1.5}
.opt-btn{display:block;width:100%;padding:14px 16px;margin-bottom:8px;background:var(--c-bg);
  border:1.5px solid var(--c-border);border-radius:var(--radius);text-align:left;
  font-size:.9rem;cursor:pointer;transition:all .12s;color:var(--c-text)}
.opt-btn:active,.opt-btn.selected{background:var(--c-primary-light);border-color:var(--c-primary);
  color:var(--c-primary);font-weight:600}
.opt-key{display:inline-block;width:24px;height:24px;line-height:24px;text-align:center;
  background:var(--c-border);border-radius:50%;font-size:.75rem;font-weight:700;margin-right:8px}
.quiz-hint{text-align:center;font-size:.7rem;color:var(--c-muted);padding:8px}

.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;

.loading-spinner{width:40px;height:40px;border:3px solid var(--c-border);

.loading-text{font-size:.95rem;color:var(--c-text);min-height:28px;line-height:1.6}
.loading-done{color:var(--c-primary);font-weight:600}

.result-header{text-align:center;padding-top:20px}
.result-type{font-size:2rem;font-weight:800;color:var(--c-primary);margin-bottom:4px}
.result-subtitle{font-size:.9rem;color:var(--c-muted);margin-bottom:20px}
.score-ring{display:inline-flex;align-items:center;justify-content:center;

.score-label{font-size:.75rem;color:var(--c-muted);margin-bottom:24px}

.section{background:var(--c-card);border-radius:var(--radius);padding:20px;
  box-shadow:var(--shadow);margin-bottom:14px}
.section h3{font-size:.85rem;font-weight:700;color:var(--c-primary);margin-bottom:12px;

.indices-row{display:flex;gap:10px;flex-wrap:wrap}
.index-item{flex:1;min-width:80px;text-align:center;padding:10px 6px;

.index-val{font-size:1.3rem;font-weight:800;color:var(--c-primary)}
.index-label{font-size:.7rem;color:var(--c-muted);margin-top:2px}

.diagnosis-text{font-size:.85rem;line-height:1.8;color:var(--c-text);white-space:pre-line}

.radar-wrap{display:flex;justify-content:center;padding:8px 0}
.radar-wrap svg{max-width:280px;width:100%}

.job-list,.no-list{list-style:none;padding:0}
.job-list li,.no-list li{padding:8px 12px;margin-bottom:4px;background:var(--c-bg);
  border-radius:6px;font-size:.82rem;display:flex;align-items:center;gap:8px}
.job-list li::before{content:'✅';font-size:.75rem}
.no-list li::before{content:'⚠️';font-size:.75rem}

.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.compare-card{padding:14px;border-radius:8px;font-size:.8rem;line-height:1.6}
.compare-good{background:#f0f7f0;border:1px solid #c8e0c8}
.compare-bad{background:#fef5f0;border:1px solid #f0d8c8}
.compare-card h4{font-size:.8rem;margin-bottom:6px}

.plan-steps{list-style:none;padding:0}
.plan-steps li{padding:10px 12px;margin-bottom:6px;background:var(--c-bg);
  border-radius:6px;font-size:.8rem;line-height:1.5;border-left:3px solid var(--c-primary)}

.closing-text{font-size:.85rem;color:var(--c-muted);font-style:italic;text-align:center;line-height:1.7}

.result-actions{display:flex;gap:10px;margin-top:20px}
.result-actions .btn{flex:1;font-size:.85rem;padding:12px}

.poster-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;
  justify-content:center;align-items:center;padding:20px}
.poster-overlay.show{display:flex}
.poster-card{background:#fff;border-radius:16px;padding:32px 24px;max-width:320px;width:100%;

.poster-card .pfooter{font-size:.7rem;color:var(--c-muted);margin-top:20px;padding-top:14px;
  border-top:1px solid var(--c-border)}
.poster-close{margin-top:16px;font-size:.8rem;color:var(--c-muted);cursor:pointer;text-align:center}
</style>

侣过生日，你更倾向于？", "options": [{"key": "A", "text": "精心准备一个他可能会喜欢但不会太夸张的礼物，在凌晨准时发一条走心的生日快乐"}, {"key": "B", "text": "大费周章！气球蛋糕惊喜party朋友圈小作文一条龙，爱就要让全世界看到"}, {"key": "C", "text": "手工制作的礼物+一封长长的信，把这段时间的感动和感谢都写进去，边写边哭"}, {"key": "D", "text": "带他去做一件没做过的事——跳伞、看展、road trip，礼物是什么不重要，一起体验才重要"}]}, {"id": 12, "text": "你觉得「仪式感」在一段关系里有多重要？", "options": [{"key": "A", "text": "有最好，没有也行。我更喜欢不经意的浪漫，而非被节日绑架的仪式"}, {"key": "B", "text": "超级重要！纪念日必须过，情话必须说，仪式感就是爱情里的「签到打卡」"}, {"key": "C", "text": "非常重要，但不是为了发朋友圈——我需要那些瞬间来感受「爱还在流动」"}, {"key": "D", "text": "不太重要，甚至有点抗拒。当所有人都要做同一件事的时候，我就想干点别的"}]}, {"id": 13, "text": "你觉得最能打动你的表白方式是？", "options": [{"key": "A", "text": "在一个普通的时刻，他认真地看着我说「和你在一起我很舒服」，不肉麻但很真"}, {"key": "B", "text": "热情直接：「我喜欢你！和我在一起吧！」那种藏不住的冲动最动人"}, {"key": "C", "text": "细节满满的深情告白，能说出我都没注意到的关于我自己的小事，让我觉得「原来他一直在认真看我」"}, {"key": "D", "text": "不是「我喜欢你」，而是「我们一起去冰岛追极光吧」——邀请我进入他的世界比表白更让我心动"}]}, {"id": 14, "text": "你更愿意用以下哪种方式安慰情绪低落的伴侣？", "options": [{"key": "A", "text": "安静地陪在ta身边，不一定要说话——我的在场就是最大的安慰，给ta空间自己消化"}, {"key": "B", "text": "立刻赶过去抱住ta，说很多温暖的话，「我在呢，没事的，有我一直陪着你」"}, {"key": "C", "text": "感同身受地陪ta一起难过——我不知道怎么让ta好起来，但我完全理解ta为什么这么痛"}, {"key": "D", "text": "带ta出去走走、吃点好吃的、换个环境——用新的体验冲淡坏情绪，比坐着难过有用"}]}, {"id": 15, "text": "当你对伴侣感到不满时，你更倾向于？", "options": [{"key": "A", "text": "先不说，自己消化一下。如果过几天还觉得在意，再挑一个合适的时机平静地说"}, {"key": "B", "text": "马上说！憋着不舒服，有什么问题摊开来聊，吵一架也比藏着掖着让人安心"}, {"key": "C", "text": "用情绪让对方感受到——可能突然变得冷淡或低落，等ta来问「你怎么了」再慢慢说"}, {"key": "D", "text": "用一种幽默或反讽的方式轻轻点出来，不直接冲突但让ta知道——聪明人一点就通"}]}, {"id": 16, "text": "你觉得下面哪种场景最浪漫？", "options": [{"key": "A", "text": "两个人各自在房间里做自己的事，偶尔抬头对视笑一下——不打扰但知道彼此在"}, {"key": "B", "text": "手牵手走在街上，ta忽然停下来认真地看着你说「我真的好喜欢你」，全世界都亮了"}, {"key": "C", "text": "深夜两个人躺在沙发上，分享彼此最深的恐惧和渴望，说完之后抱在一起沉默很久"}, {"key": "D", "text": "ta突然说「走吧，周末去一个没去过的地方」，然后两个人一起踏上毫无计划的旅程"}]}, {"id": 17, "text": "在感情中，你内心深处最渴望的是什么？", "options": [{"key": "A", "text": "被理解但不被打扰——希望有一个人能看懂我的独立和疏离背后的温柔，但不试图改造我"}, {"key": "B", "text": "被需要、被陪伴——我最怕的不是吵架，而是「不被回应」的感觉，那对我来说就是不被爱"}, {"key": "C", "text": "灵魂的深度连接——我需要一个能和我一起潜入情感深海的人，浅尝辄止的关系让我更孤独"}, {"key": "D", "text": "智识上的同频和自由的呼吸感——我要的「在一起」是两个人并肩看世界，而不是面对面互相捆绑"}]}, {"id": 18, "text": "如果伴侣因为工作太忙冷落了你一段时间，你的反应是？", "options": [{"key": "A", "text": "「正好，我也有自己的项目要忙。」理解且不会过度反应，忙完再说"}, {"key": "B", "text": "嘴上说「没事你忙」，但会隔三差五发消息提醒自己的存在，需要被安抚"}, {"key": "C", "text": "开始疯狂内耗——「他是不是不爱我了」「是不是有了别人」——但不会直接说，而是用情绪让对方感受到我的不满"}, {"key": "D", "text": "「OK那我也去忙了，甚至比你更忙。」然后消失一段时间，等他来找我"}]}, {"id": 19, "text": "你对「被搭讪」这件事的态度是？", "options": [{"key": "A", "text": "礼貌但疏离地回应，如果对方有趣可能会慢慢观察，但一开始会保持距离"}, {"key": "B", "text": "开心啊！不管有没有后续，被人喜欢总是一件值得高兴的事"}, {"key": "C", "text": "忐忑又期待。会很紧张但内心深处也渴望被看见，只是不知道该怎么回应"}, {"key": "D", "text": "如果聊天内容足够有趣我会积极回应，但如果只是「美女加个微信」就礼貌地溜了"}]}, {"id": 20, "text": "在感情中，你最接受不了的事情是？", "options": [{"key": "A", "text": "被控制。比如对方要求我随时报备行踪、限制我的社交圈，这比吵架更让我窒息"}, {"key": "B", "text": "被忽视。我发消息他看了不回、我分享的东西他没有回应——冷暴力是我的底线"}, {"key": "C", "text": "被欺骗。哪怕是一个很小的谎言，也会让我对整个关系的真实性产生怀疑"}, {"key": "D", "text": "被束缚。比如「结婚就要怎样」「女朋友就应该怎样」——不要用标签定义我"}]}, {"id": 21, "text": "你如何看待「恋爱脑」？", "options": [{"key": "A", "text": "有点羡慕但做不来。我可以深情，但不会让对方成为我生活的全部重心"}, {"key": "B", "text": "我可能就是。恋爱的时候满脑子都是他，朋友的劝告都听不进去，但我觉得这很真诚"}, {"key": "C", "text": "时而恋爱脑时而人间清醒，在深陷和清醒之间反复横跳，这本身就是一种痛苦"}, {"key": "D", "text": "完全理解不能。谈恋爱就谈恋爱，为什么要放弃自己的生活和理智？"}]}, {"id": 22, "text": "对你来说，「安全感」在感情中主要来源于？", "options": [{"key": "A", "text": "对方尊重我的边界——当ta不试图改变我或黏住我时，我感到最安全"}, {"key": "B", "text": "对方的回应——当我发消息ta秒回、我分享的事ta认真听，我就安心了"}, {"key": "C", "text": "对方情绪的稳定——当ta的态度不忽冷忽热，我可以预测ta的反应时，我才敢放松"}, {"key": "D", "text": "知道自己随时可以离开——当关系不会变成牢笼，我反而更愿意长久留下"}]}, {"id": 23, "text": "你觉得「被需要」和「被爱」是一回事吗？", "options": [{"key": "A", "text": "不是。我希望对方选择我是因为欣赏而非需要——「我需要你」有时候让我有压力"}, {"key": "B", "text": "差不多！「我需要你」就是我心中最动听的情话，被需要让我确认自己是被爱着的"}, {"key": "C", "text": "分不清楚。理智上知道不同，但情感上我被「需要」的时候感觉最安心，不被需要就慌了"}, {"key": "D", "text": "完全不是一回事。我需要的是一个人和我一起探索世界，而不是一个人需要我照顾或被照顾"}]}, {"id": 24, "text": "你会因为什么而对一段关系瞬间「下头」？", "options": [{"key": "A", "text": "对方开始查手机、限制社交、要求随时报备——控制欲是让我瞬间降温的冷水"}, {"key": "B", "text": "对方的忽冷忽热——今天热情明天消失，这种不确定感让我焦虑到无法继续"}, {"key": "C", "text": "发现对方在重要的事情上说了谎，哪怕很小——信任一旦有了裂痕就回不去了"}, {"key": "D", "text": "对方开始谈论「结婚」「买房」「以后怎样」——当关系变成项目管理，浪漫就蒸发了"}]}, {"id": 25, "text": "和伴侣发生争执时，你的本能反应是？", "options": [{"key": "A", "text": "先冷静一下再说。我会暂停争吵然后一个人待着，等情绪平复后再理性讨论"}, {"key": "B", "text": "马上沟通！我不想让矛盾过夜，有什么问题现在就说清楚，冷战比吵架更伤人"}, {"key": "C", "text": "情绪爆发——可能会说一些伤人的话，然后后悔，然后不知道该怎么收场，然后自己偷偷哭"}, {"key": "D", "text": "理性辩论——我会像打辩论一样逐条陈述我的观点。我不是在吵架，我是在论证。"}]}, {"id": 26, "text": "吵完架后你是「先低头」的那一方吗？", "options": [{"key": "A", "text": "不太会主动低头，但如果对方先迈出一步，我会顺势和解。我的骄傲比你想的要多一点"}, {"key": "B", "text": "通常是。我很怕冷战的气氛，哪怕不是我的错也愿意先说对不起来打破僵局"}, {"key": "C", "text": "看心情——有时候觉得「凭什么总是我先低头」，有时候又想「算了吧他开心就好」，非常不稳定"}, {"key": "D", "text": "不存在的，我甚至可能已经忘了我们在吵架。我擅长用幽默或其他话题自然地把事情翻篇"}]}, {"id": 27, "text": "过去的感情经历中，最常导致你们分手的原因是？", "options": [{"key": "A", "text": "对方觉得我「太独立」「不够黏人」「好像不怎么需要他」。我确实需要很多独处时间"}, {"key": "B", "text": "对方觉得我「太黏人」「没有安全感」「让他喘不过气」。我知道但我改不了"}, {"key": "C", "text": "情绪起伏太大，好的时候像天堂，吵的时候像地狱。两个人都累了"}, {"key": "D", "text": "感情还在，但「未来规划」对不上。当关系开始变得「沉重」，我就想逃"}]}, {"id": 28, "text": "如果伴侣喜欢冷战，你会？", "options": [{"key": "A", "text": "冷战就冷战，我可以比你更冷。我的自尊不允许我先破冰"}, {"key": "B", "text": "完全受不了，冷战对我来说是最残忍的惩罚，我会不停地试探、发消息直到他回应为止"}, {"key": "C", "text": "冷战期间我会脑补出一部悲情大戏，然后把剧情当真，用更冷的方式回击，但其实内心在流血"}, {"key": "D", "text": "如果超过48小时还没好，我就会直接说「要么我们好好聊，要么就到此为止」，不接受冷战消耗"}]}, {"id": 29, "text": "关于爱情，下面哪句话最接近你的人生感悟？", "options": [{"key": "A", "text": "「我爱你，但我仍然是自己的那座孤岛。」——好的爱情是两个完整的人相遇，不是半个人找另一半"}, {"key": "B", "text": "「爱是陪伴，是你在身边我就安心。」——我不需要惊天动地，我需要一个永远有回应的人"}, {"key": "C", "text": "「爱是一起在深海里憋气。」——太浅的喜欢让我无聊，我要的是能一起沉入情感深渊的人"}, {"key": "D", "text": "「爱不是彼此凝视，而是一起朝一个方向看。」——我们是旅伴，不是彼此的牢笼"}]}, {"id": 30, "text": "当你和伴侣因为一件小事进入拉锯战时，你最终会怎么做？", "options": [{"key": "A", "text": "如果对方不让步，我会先撤退但不代表我认输——让时间和距离来软化僵局"}, {"key": "B", "text": "通常是我先破冰——我不喜欢僵持的状态，说句「算了别吵了我们和好吧」比冷战舒服"}, {"key": "C", "text": "可能会情绪崩溃然后和好——吵架太累了，哭着哭着就抱在一起了，问题也就不重要了"}, {"key": "D", "text": "突然觉得「我们到底在吵什么？太无聊了」——然后岔开话题，用一个笑话自然翻篇"}]}, {"id": 31, "text": "你觉得「翻旧账」在一段关系里是？", "options": [{"key": "A", "text": "不太健康。每次吵架我都尽量只讨论当前这件事，过去翻篇了就不要再挖出来"}, {"key": "B", "text": "虽然不好但控制不住——受了委屈就想把以前的事都抖出来论证「你一直这样对我」"}, {"key": "C", "text": "这是我的本能——那些没有被好好处理过的旧伤，每次新冲突都会重新流血，不是我想翻是伤口没好"}, {"key": "D", "text": "我很少翻旧账，因为很多事我根本不记得了——过去了就是过去了，存档空间有限"}]}, {"id": 32, "text": "如果要在你的恋爱手册扉页上写一句话，你会选？", "options": [{"key": "A", "text": "「她不需要任何人，但她选择了一个人——这是最深的自由，也是最重的温柔。」"}, {"key": "B", "text": "「她毫无保留地爱过，这个世界感受到了她的温度，而那个被爱过的人永远不会忘记。」"}, {"key": "C", "text": "「她潜入过爱的深海，那里有最美的珍珠和最痛的暗礁——她从未后悔潜入。」"}, {"key": "D", "text": "「她从未停止飞翔，也从未忘记归途——爱不是笼子，是知道有盏灯为你亮着。」"}]}], "resultTypes": {"A": {"name": "🐱 猫系恋人", "subtitle": "独立优雅，需要空间，慢热但深情", "maturityScore": 82, "indices": [{"label": "独立性指数", "value": 95}, {"label": "慢热程度", "value": 88}, {"label": "忠诚深度", "value": 80}], "diagnosis": "你是典型的「猫系恋人」——就像一只优雅的猫，不会轻易对你摇尾巴，但一旦认定了你，便是一生的信赖。你的爱需要时间，不是所有人都能等到你「翻开肚皮」的那一刻。你非常珍视个人空间和自我边界，不喜欢被控制或被过度依赖。这可能会让一些安全感不足的伴侣感到困惑：「你为什么不像别人的男/女朋友那样黏人？」但那不是你的错——懂得欣赏你的人会发现，你的独立不是冷漠，而是一种成熟：你不需要对方来填补你的空缺，你只是邀请对方来参与你本就精彩的人生。", "radarData": [{"label": "安全感（依恋风格）", "value": 75}, {"label": "表达欲（表达方式）", "value": 30}, {"label": "情感深度（情感需求）", "value": 80}, {"label": "冲突冷静度", "value": 85}, {"label": "浪漫指数", "value": 40}], "suitableJobs": ["同样独立、有自己事业和社交圈的「成熟型伴侣」", "能欣赏慢热性格，愿意用时间换取信任的「耐心型伴侣」", "也需要个人空间，理解「在一起但各自独立」模式的「同频型伴侣」", "内心强大、不会因为你的独立而产生不安全感的「自信型伴侣」"], "unsuitableJobs": ["极度黏人、需要24小时情感回应的高需求型伴侣", "控制欲强、试图改变你独立性格的支配型伴侣", "缺乏安全感、会把你的慢热解读为「不爱我」的焦虑型伴侣"], "pathCompare": {"good": "顺应猫系天性：坚持自己的独立节奏，在关系里保持自我完整的同时学习适度表达——不需要变成狗系，但可以让对方知道「我不是不想你，我只是不习惯说出来」。", "bad": "强行改变自己：因为对方的压力逼自己变得黏人、热情、外向，结果不仅自己不快乐，对方也会感受到你的不真实。你不是高冷，你只是需要时间。"}, "plan90": ["【第1-30天·觉察期】①每天发送至少1条主动消息（如「今天看到这个想到你了」），记录每次主动表达后的心理感受，建立表达与正向反馈的关联；②每周至少2次在伴侣分享时用「我理解」或「我也是」开头回应，刻意练习情感共鸣的肌肉记忆；③梳理一张「我想说但没说出口的话」清单，每周从中挑选1条勇敢讲给对方听；④每晚睡前问自己：今天有哪个瞬间我让伴侣感受到了「被在意」？写在手机备忘录里，连续30天不间断。⑤ 列出你的「爱的语言」前3名（肯定的言语/精心的时刻/接受的礼物/服务的行动/身体的接触），了解自己如何感受爱。 ✅ 目标：在不改变独立本性的前提下，建立「主动表达」的微习惯，让伴侣感知到你的在意。", "【第31-60天·协商期】①安排一次无干扰的深度对话（至少1小时），坦诚说明「独处是我充电的方式不是疏远」，用「我陈述句」而非辩解语气让对方理解你的需求；②与伴侣共同制定一份书面的「空间协议」——明确每周哪些时段属于各自的独处时间，哪些时段是专属彼此的亲密时间，贴在冰箱或共享备忘录里；③每周检查一次协议执行情况，主动问对方「这周的安排你觉得舒服吗？有什么需要调整的吗？」；④在独处时间结束后主动做一件小而温暖的连接动作——比如发一句「我充完电了，想你了」，让独处和亲密自然过渡。⑤ 和伴侣做一个「独处需求」的沟通：明确告诉对方你什么时候需要空间，也了解对方什么时候需要陪伴。 ✅ 目标：建立双方都舒适的空间边界，消除因独立性格产生的误解，让独处与亲密和谐共存。", "【第61-90天·深化期】①独立策划并执行一次完整约会（从地点选择、活动安排到晚餐预定全部自己完成），主题可设为「带你看看我一个人的世界」——展示你喜欢的书店、咖啡馆或散步路线；②在约会过程中至少说出3句你平时不太会说的肯定语，如「和你在一起很舒服」「我喜欢看你笑」「谢谢你愿意走进我的世界」；③每周固定1个「连接仪式」——比如周六早上的共创早餐，或睡前10分钟的今日分享，让表达成为稳定节奏而非一次性突击；④写下一封不一定寄出的信，主题是「我选择你而不是一个人，这件事本身就很浪漫」，回顾90天里自己表达能力的成长轨迹。⑤ 练习「主动表达」的微习惯：每天至少对伴侣表达1次在意（哪怕只是发1条消息、夸1句话），让对方感受到你的温度。 ✅ 目标：用猫系独有的方式创造浪漫，证明慢热的人浪漫起来更有分量，形成可持续的情感表达节奏。"], "closing": "你不是高冷，你只是把温柔留给了少数值得的人——而这份稀缺，恰恰是你最迷人的地方。", "posterText": "猫系体质——我慢热，但我深情", "posterSubtext": "你的恋爱体质是什么？测一下！"}, "B": {"name": "🐶 犬系恋人", "subtitle": "忠诚热情，需要陪伴，爱就要让全世界知道", "maturityScore": 78, "indices": [{"label": "情感表达力", "value": 95}, {"label": "陪伴需求度", "value": 90}, {"label": "忠诚指数", "value": 92}], "diagnosis": "你就是那种让朋友感叹「你也太好了吧」的「犬系恋人」——真诚、热情、忠诚，你的爱就像一只摇着尾巴扑上来的金毛，温暖得让人无法抗拒。你喜欢用最直接的方式表达在乎：早安晚安、日常分享、朋友圈的公开表白、纪念日的精心准备。对你来说，爱就是要被看见、被回应、被认真对待。你不觉得「黏人」是缺点——「我爱你就想和你在一起，有什么问题？」你的坦诚和热烈是稀有品质，但有时候需要留意：不是所有人都能承受这种密度的爱，学会偶尔退后一步，给对方呼吸的空间。", "radarData": [{"label": "安全感（依恋风格）", "value": 45}, {"label": "表达欲（表达方式）", "value": 95}, {"label": "情感深度（情感需求）", "value": 85}, {"label": "冲突冷静度", "value": 35}, {"label": "浪漫指数", "value": 90}], "suitableJobs": ["同样热情、喜欢黏在一起的「双向奔赴型伴侣」", "内心温柔、能接住你所有热情并给予回应的「温暖型伴侣」", "性格稳定、能包容你的小情绪波动且不嫌烦的「韧性型伴侣」", "也喜欢被宠爱、享受仪式感和热恋日常的「同频型伴侣」"], "unsuitableJobs": ["极度需要个人空间、觉得你「太黏」的猫系型伴侣", "情感回避、对你的热情没有回应的回避型伴侣", "觉得你的爱「太沉重」而承受不住的自由至上的伴侣"], "pathCompare": {"good": "接纳犬系热情：保持你的热情和真诚——这是你最珍贵的品质。同时学会建立安全感的内在来源，而不是全部依赖对方的回应。适当给伴侣一些呼吸的空间，你的爱不靠拼命靠近来证明。", "bad": "把热情变消耗：因为害怕失去而加倍输出，用更多的消息和关心去填每一个安全感的窟窿，结果让对方感到窒息，自己也越来越累。"}, "plan90": ["【第1-30天·觉察期】①当发消息后对方超过30分钟未回复时，执行「不追发挑战」——零追发，转而做一件让自己愉悦的事（如听一首歌、泡杯茶、看一集短剧），完成后记录心情变化，每周统计追发次数从第1周每天3-5次逐步降到第4周每天不超过1次；②每天建立1个「自我安全感锚点」——写3件今天自己独立完成的事，或回顾1次不需要伴侣参与就感到充实的时刻；③制作一张「情绪安抚清单」：列出10件完全不需要伴侣参与却能让你开心的活动，每当焦虑袭来时从清单中选1件执行；④每周复盘一次：本周有几次因对方未及时回应而感到焦虑？那些焦虑最终是否被验证为不必要的？用数据说服你焦虑的大脑。⑤ 列出你的「爱的语言」前3名（肯定的言语/精心的时刻/接受的礼物/服务的行动/身体的接触），了解自己如何感受爱。 ✅ 目标：切断「对方不回应=我不被爱」的自动化思维链条，建立安全感的内在来源而非全部依赖外部反馈。", "【第31-60天·协商期】①与伴侣进行一次「舒适距离对话」：双方各自写下自己最舒服的联系频率（每天几次消息、每周几次通话/见面），交换讨论找到中间值并达成共识；②商定每天1段「有质量的独处时间」——哪怕只有30分钟，各自做喜欢的事（看书、健身、打游戏），约定期间不互相打扰，结束后互相分享刚才做了什么；③练习「延迟回应」技术：每天至少1次收到伴侣消息后先不秒回，而是完成手上的一件事再回复，体验「等待并不等于冷落」的心理感受；④每周安排1次「分别行动日」：各自去见各自的朋友或做各自的事情，回来后互相分享体验，发现「分开也可以很亲密」。⑤ 和伴侣做一个「独处需求」的沟通：明确告诉对方你什么时候需要空间，也了解对方什么时候需要陪伴。 ✅ 目标：建立健康的距离感认知，把「时刻黏在一起才安全」升级为「在一起有质量，分开也不焦虑」。", "【第61-90天·深化期】①选定并投入一项完全不依赖伴侣的兴趣——每周至少投入3小时，可以是陶艺课、舞蹈班、读书会或运动小组，确保这是完全属于你自己的领地并持续至少4周；②拓展或重建至少1个独立社交圈（加入1个兴趣社群或恢复与1-2位老友的定期聚会），每月至少1次不含伴侣的社交活动；③写一篇「独立宣言」日记——主题是「如果我没有伴侣，我是谁？我喜欢怎样的自己？」不是为了恐吓自己而是验证「我的完整性不依赖于这段关系」；④在伴侣对你的独立生活表示赞赏时，有意识地感受并记录那一刻：「你看，一个完整的你比一个黏着的你更有吸引力」。⑤ 练习「主动表达」的微习惯：每天至少对伴侣表达1次在意（哪怕只是发1条消息、夸1句话），让对方感受到你的温度。 ✅ 目标：从「我需要你所以我爱你」进化为「我完整所以我给你完整的爱」，让爱的密度升级为爱的质量。"], "closing": "你的热烈不是问题，你的真诚不是负担——你是爱情里那个「让爱变得简单」的人。好好珍惜这份天赋。", "posterText": "犬系体质——爱就要热烈地表达，藏不住的喜欢", "posterSubtext": "看看你是哪种恋爱体质？"}, "C": {"name": "💧 水象恋人", "subtitle": "情感深邃，共情力强，爱如潮水般汹涌而细腻", "maturityScore": 75, "indices": [{"label": "情感深度", "value": 95}, {"label": "共情能力", "value": 92}, {"label": "情绪稳定性", "value": 30}], "diagnosis": "你是情感世界里的「深海潜水者」——水象体质的你拥有惊人的共情能力和情感深度。你可以感受到别人忽略的情绪暗流，可以写出最动人的情书，也可以为一部电影哭上三天。你对爱的体验是全身心的投入，在最好的时候，你让伴侣感受到无与伦比的温柔和理解；在最坏的时候，情绪的波涛也会让关系变得动荡。你的爱人常常困惑：「为什么刚才还好好的，现在突然就哭了？」但这正是你——不满足于爱情的表层，你想要潜到最深的地方，去触摸最真实的温度和痛感。学会和你的情绪做朋友，而不是被它淹没，是你一生的课题。", "radarData": [{"label": "安全感（依恋风格）", "value": 30}, {"label": "表达欲（表达方式）", "value": 80}, {"label": "情感深度（情感需求）", "value": 95}, {"label": "冲突冷静度", "value": 25}, {"label": "浪漫指数", "value": 88}], "suitableJobs": ["能接住你所有情绪波动的「深海潜水员型伴侣」——不自讨苦吃，而是陪伴你游过那些暗流", "性格沉稳、像锚一样在你情绪风暴中保持稳定的「定海神针型伴侣」", "也有丰富情感世界、能和你一起在感情深海中共舞的「同类型伴侣」", "真诚善良、虽然不完全理解你的情绪但始终愿意耐心陪伴的「温柔型伴侣」"], "unsuitableJobs": ["情感淡漠、会把你「想太多」当作矫情的理性至上伴侣", "回避深度沟通、在你需要倾诉时选择逃避的回避型伴侣", "性格粗线条、无法感知你细微情绪变化的大条型伴侣"], "pathCompare": {"good": "接纳水的本性：允许自己在爱中深沉和敏感——这是天赋不是缺陷。同时建立情绪的「防波堤」：书写、运动、艺术、咨询——让情感有出口而不是全部倾倒在关系里。学会暂停，在情绪袭来时说「我现在需要一点时间整理自己」。", "bad": "让情绪掌控一切：「我不高兴你今天完蛋了」——每一次情绪起伏都变成关系危机，伴侣逐渐从「心疼你想陪你走出来」变成「我累了不知道怎么做才对」。"}, "plan90": ["【第1-30天·觉察期】①建立每日情绪日记：每次感受到强烈情绪（狂喜、愤怒、悲伤或焦虑）时，立即用手机或笔记本记录4要素——触发事件、身体感受（如心跳加速/手心出汗）、自动化想法、随后采取的行动，每周至少记录5次；②在周末花20分钟复盘本周情绪记录，用荧光笔标记反复出现的模式（如「每次对方回复冷淡时都出现'他是不是不爱我了'的念头」），找出你的2-3个核心情绪触发点；③练习「给情绪命名」——当情绪涌来时不说「我好难受」，而说「我现在感到的是焦虑」「被抛弃的恐惧」「不被理解的委屈」，越精确越好；④每天做1次「情绪天气预报」：早上对自己预报今天的情绪天气（如「今天有点阴，因为昨晚做了一个不安的梦」），不评判只观察。⑤ 建立「情绪安全词」机制：当你感觉情绪被对方影响时，用安全词暂停对话，等双方冷静后再继续。 ✅ 目标：从「被情绪淹没」到「能准确识别和命名情绪」，建立自我观察者的视角，为情绪管理打下地基。", "【第31-60天·练习期】①每次情绪潮水涌来时严格执行「暂停三步法」：第一步深呼吸3次（吸气4秒-屏息2秒-呼气6秒），第二步默念「我有权感受这一切，但我不必现在反应」，第三步给自己至少20分钟冷静期，期间可以散步、涂鸦或听纯音乐来缓冲；②制作一张「冲动行为替代清单」：列出情绪上头时你最想做的冲动行为（如发长消息质问、删聊天记录、深夜打电话），并为每个行为预设1-2个替代方案（如写草稿但不发送、把手机放在另一个房间、先哭10分钟再做决定）；③每周统计情绪冲动次数和成功暂停次数，目标是将「冲动-反应比例」从高位逐步降到50%以下；④在暂停期间尝试「情绪具身化」练习——把情绪想象成身体里的某种颜色或形状，观察它而非成为它。⑤ 练习1次「观察而不卷入」：当伴侣有情绪时，尝试只说「我听到了，我在」，而不必替对方解决问题。 ✅ 目标：在情绪刺激和行为反应之间插入一个「暂停空间」，夺回被情绪绑架的行动选择权，验证风暴可以自然消退。", "【第61-90天·深化期】①为自己写一份「情绪说明书」：至少列出5条「当我出现XXX情绪时，我最需要伴侣做的是XXX，最好不要做的是XXX」，用中性语言避免指责（如「当我沉默不语时，我最需要你在旁边安静地陪我，而不是反复追问'你到底怎么了'」）；②安排一次60分钟的「盟友对话」——选在双方情绪都平稳的时间，以「这是我的使用手册，不是对你的抱怨」作为开场白，分享你的情绪说明书并邀请伴侣也分享他的版本；③在对话后的一周内至少实践1次「按说明书求助」：当情绪来袭时明确告诉伴侣「我现在启动了情绪说明书第X条，我需要你帮我的方式是……」；④建立每月1次的「情绪关系复盘」习惯：双方各自分享「这个月你在关系中做得让我感到安全的一件事」和「下个月可以做得更好的一件事」，把情绪管理从个人修行升级为关系共建。⑤ 培养1个让你情绪稳定的个人仪式（冥想/运动/写日记），在关系之外建立独立的情感支撑。 ✅ 目标：将情绪敏感从「关系中的地雷」转化为「深度连接的通行证」，让伴侣从情绪防御对象变成理解同盟。"], "closing": "你的敏感不是脆弱，是你感知世界的天线——它让你痛苦，但也让你比任何人都更深刻地活着和爱着。", "posterText": "水象体质——爱到极致的深情，都藏在我的敏感里", "posterSubtext": "你知道自己的恋爱体质吗？"}, "D": {"name": "🌬️ 风象恋人", "subtitle": "自由如风，智性至上，爱是并肩看世界而不是互相捆绑", "maturityScore": 80, "indices": [{"label": "自由需求度", "value": 93}, {"label": "智性吸引力", "value": 90}, {"label": "承诺意愿", "value": 30}], "diagnosis": "你是爱情中的「风筝」——永远需要一根线把你和地面相连，但又永远需要天空。对你来说，最有吸引力的不是脸红心跳的浪漫，而是一个有趣的灵魂：深夜的长谈、观点的交锋、一起探索未知的世界——这些「精神上的共振」比任何甜言 (function(){

function navigate(route) {
  if (typewriterTimer) { clearInterval(typewriterTimer); typewriterTimer = null; }
  currentRoute = route;
  window.location.hash = route;
  render();
  window.scrollTo(0, 0);
}

function getRoute() {
  const hash = window.location.hash.replace('#', '') || '/';
  return hash;
}

// ── 渲染主入口 ────────────────────────
function render() {
  const route = getRoute();
  currentRoute = route;

  switch(route) {
    case '/': renderHome(); break;
    case '/quiz': renderQuiz(); break;
    case '/loading': renderLoading(); break;
    case '/result': renderResult(); break;
    default: navigate('/'); break;
  }
}

        `).join('')}
      </div>
      <p class="quiz-hint">选择后自动进入下一题</p>
    </div>`;

// ── 作答 ──────────────────────────────
function answer(key) {
  const q = CONFIG.questions[currentQuestion];
  answers[q.id] = key;
  currentQuestion++;

  if (currentQuestion >= CONFIG.questions.length) {
    navigate('/loading');
  } else {
    renderQuiz();
    window.scrollTo(0, 0);
  }

        <div class="loading-spinner"></div>
        <div class="loading-text" id="typewriter"></div>
      </div>
    </div>`;

  const el = document.getElementById('typewriter');
  let msgIdx = 0;
  let charIdx = 0;
  let allDone = false;

  function tick() {
    if (allDone) return;
    if (msgIdx >= msgs.length) {
      el.classList.add('loading-done');
      el.textContent = msgs[msgs.length - 1];
      allDone = true;
      setTimeout(() => navigate('/result'), 800);
      return;
    }
    const msg = msgs[msgIdx];
    if (charIdx <= msg.length) {
      el.textContent = msg.slice(0, charIdx);
      charIdx++;
      typewriterTimer = setTimeout(tick, 60 + Math.random() * 40);
    } else {
      msgIdx++;
      charIdx = 0;
      typewriterTimer = setTimeout(tick, 400);
    }
  }
  tick();
}

// ── 评分 ──────────────────────────────
function calculateResult() {
  const scoring = CONFIG.scoring || {};
  const counts = {};
  for (const key of Object.keys(CONFIG.resultTypes)) {
    counts[key] = 0;
  }
  for (const ans of Object.values(answers)) {
    if (counts[ans] !== undefined) counts[ans]++;
  }
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  const primary = sorted[0][0];
  const secondary = sorted.length > 1 && (sorted[0][1] - sorted[1][1]) <= (scoring.mixedThreshold || 3) && sorted[1][1] > 0
    ? sorted[1][0] : null;

  return { primary, secondary, counts, hasSecondary: !!secondary };
}

// ── 雷达图 SVG ────────────────────────
function renderRadar(data, size = 260) {
  const cx = size / 2, cy = size / 2, r = size * 0.35;
  const n = data.length;
  if (n < 3) return '<p style="text-align:center;color:var(--c-muted)">数据不足</p>';

  const angleStep = (2 * Math.PI) / n;
  const levels = 5;
  let paths = '';

  // 背景网格
  for (let lv = 1; lv <= levels; lv++) {
    const rr = r * (lv / levels);
    let pts = [];
    for (let i = 0; i < n; i++) {
      const angle = angleStep * i - Math.PI / 2;
      pts.push(`${cx + rr * Math.cos(angle)},${cy + rr * Math.sin(angle)}`);
    }
    paths += `<polygon points="${pts.join(' ')}" fill="none" stroke="var(--c-border)" stroke-width="0.5"/>`;
  }

  // 轴线
  for (let i = 0; i < n; i++) {
    const angle = angleStep * i - Math.PI / 2;
    paths += `<line x1="${cx}" y1="${cy}" x2="${cx + r * Math.cos(angle)}" y2="${cy + r * Math.sin(angle)}" stroke="var(--c-border)" stroke-width="0.5"/>`;
  }

  // 数据多边形
  let dataPts = [];
  for (let i = 0; i < n; i++) {
    const angle = angleStep * i - Math.PI / 2;
    const val = Math.max(0, Math.min(100, data[i].value || 0)) / 100;
    const rr = r * val;
    dataPts.push(`${cx + rr * Math.cos(angle)},${cy + rr * Math.sin(angle)}`);
  }
  paths += `<polygon points="${dataPts.join(' ')}" fill="var(--c-primary)" fill-opacity="0.2" stroke="var(--c-primary)" stroke-width="2"/>`;

  // 数据点
  for (let i = 0; i < n; i++) {
    const angle = angleStep * i - Math.PI / 2;
    const val = Math.max(0, Math.min(100, data[i].value || 0)) / 100;
    const rr = r * val;
    paths += `<circle cx="${cx + rr * Math.cos(angle)}" cy="${cy + rr * Math.sin(angle)}" r="4" fill="var(--c-primary)"/>`;
  }

  // 标签
  let labels = '';
  for (let i = 0; i < n; i++) {
    const angle = angleStep * i - Math.PI / 2;
    const lr = r + 24;
    const lx = cx + lr * Math.cos(angle);
    const ly = cy + lr * Math.sin(angle);
    const anchor = lx < cx - 10 ? 'end' : lx > cx + 10 ? 'start' : 'middle';
    labels += `<text x="${lx}" y="${ly}" text-anchor="${anchor}" dominant-baseline="middle" font-size="11" fill="var(--c-text)" font-weight="600">${data[i].label}</text>`;
  }

  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg">${paths}${labels}</svg>`;
}

// ── 结果页 ────────────────────────────
function renderResult() {
  const result = calculateResult();
  const rt = CONFIG.resultTypes[result.primary];
  if (!rt) { navigate('/'); return; }

  const secondaryRt = result.hasSecondary ? CONFIG.resultTypes[result.secondary] : null;
  const typeName = secondaryRt ? `${rt.name} × ${secondaryRt.name}` : rt.name;
  const subtitle = secondaryRt
    ? `你同时具备${rt.name}和${secondaryRt.name}的特质，属于复合型人才`
    : rt.subtitle;

  // 混合型诊断
  let mixedNote = '';
  if (result.hasSecondary && CONFIG.mixedNotes) {
    const key = `${result.primary}+${result.secondary}`;
    const keyRev = `${result.secondary}+${result.primary}`;
    mixedNote = CONFIG.mixedNotes[key] || CONFIG.mixedNotes[keyRev] || '';
  }

  const indices = rt.indices || [];
  const radar = rt.radarData || [];
  const jobs = rt.suitableJobs || [];
  const noJobs = rt.unsuitableJobs || [];
  const plan = rt.plan90 || [];
  const pathC = rt.pathCompare || {};

  app.innerHTML = `
    <div class="page active">
      <div class="result-header">
        <div class="result-type">${typeName}</div>
        <p class="result-subtitle">${subtitle}</p>
        <div class="score-ring">${rt.maturityScore}</div>
        <p class="score-label">${CONFIG.scoring.scoreLabel || '职业路径决策成熟度'}</p>
      </div>

      ${indices.length ? `
      <div class="section">
        <h3>📊 关键指数</h3>
        <div class="indices-row">${indices.map(ix => `
          <div class="index-item"><div class="index-val">${ix.value}</div><div class="index-label">${ix.label}</div></div>
        `).join('')}</div>
      </div>` : ''}

      <div class="section">
        <h3>🔍 核心诊断</h3>
        <div class="diagnosis-text">${rt.diagnosis}${mixedNote ? '\n\n' + mixedNote : ''}</div>
      </div>

      ${radar.length >= 3 ? `
      <div class="section">
        <h3>📡 能力雷达图</h3>
        <div class="radar-wrap">${renderRadar(radar)}</div>
      </div>` : ''}

      ${jobs.length ? `
      <div class="section">
        <h3>🍚 适合的饭碗</h3>
        <ul class="job-list">${jobs.map(j => `<li>${j}</li>`).join('')}</ul>
      </div>` : ''}

      ${noJobs.length ? `
      <div class="section">
        <h3>⚠️ 不太适合的方向</h3>
        <ul class="no-list">${noJobs.map(j => `<li>${j}</li>`).join('')}</ul>
      </div>` : ''}

      ${(pathC.good || pathC.bad) ? `
      <div class="section">
        <h3>🔀 两条路径对比</h3>
        <div class="compare-grid">
          <div class="compare-card compare-good"><h4>✅ 顺应天赋</h4><p>${pathC.good||''}</p></div>
          <div class="compare-card compare-bad"><h4>⚠️ 逆天赋而行</h4><p>${pathC.bad||''}</p></div>
        </div>
      </div>` : ''}

      ${plan.length ? `
      <div class="section">
        <h3>📋 90天行动清单</h3>
        <ul class="plan-steps">${plan.map((p,i) => `
          <li><strong>第${i+1}步（第${i*30+1}-${(i+1)*30}天）</strong>：${p}</li>
        `).join('')}</ul>
      </div>` : ''}

      <div class="section">
        <p class="closing-text">${rt.closing||''}</p>
      </div>

      <div class="result-actions">
        <button class="btn btn-outline" onclick="APP.restart()">重新测试</button>
        <button class="btn btn-primary" onclick="APP.showPoster()">📤 分享结果</button>
      </div>
    </div>`;

  // 保存海报数据
  window._posterData = { typeName, posterText: rt.posterText||rt.name, posterSubtext: rt.posterSubtext||rt.subtitle, meta: CONFIG.meta };
}

// ── 分享海报 ──────────────────────────
function showPoster() {
  const pd = window._posterData || {};
  const overlay = document.createElement('div');
  overlay.className = 'poster-overlay show';
  overlay.id = 'poster-overlay';
  overlay.innerHTML = `
    <div class="poster-card" id="poster-card">
      <p style="font-size:.75rem;color:var(--c-muted);margin-bottom:8px">我的测试结果</p>
      <div class="ptype">${pd.posterText||''}</div>
      <p class="psub">${pd.posterSubtext||''}</p>
      <div style="width:60px;height:3px;background:var(--c-primary);margin:16px auto;border-radius:2px"></div>
      <p style="font-size:.75rem;color:var(--c-muted)">「${pd.meta?.title||''}」</p>
      <div class="pfooter">扫码测测你的 →</div>
    </div>
    <p class="poster-close" onclick="this.parentElement.remove()">关闭</p>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', function(e){ if(e.target===this) this.remove(); });
}

// ── 重新开始 ──────────────────────────
function restart() {
  answers = {};
  currentQuestion = 0;
  sessionStorage.removeItem('quiz_answers');
  navigate('/');
}

// ── 初始化 ────────────────────────────
function init() {
  // 尝试从 sessionStorage 恢复
  const saved = sessionStorage.getItem('quiz_answers');
  if (saved) {
    try { answers = JSON.parse(saved); } catch(e) {}
  }

  window.addEventListener('hashchange', render);
  render();
}

// ── 暴露 API ──────────────────────────
window.APP = {
  start: () => { answers = {}; currentQuestion = 0; navigate('/quiz'); },
  answer: (key) => {
    answer(key);
    // 保存到 sessionStorage
    sessionStorage.setItem('quiz_answers', JSON.stringify(answers));
  },
  restart,
  showPoster,
  navigate,
};

init();
})();
</script>
