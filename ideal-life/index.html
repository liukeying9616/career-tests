<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>你骨子里想要什么样的生活？</title>
<meta name="description" content=""/>
<style>
:root{
  --c-bg:#fefaf6;--c-card:#fff;--c-text:#2c2420;--c-muted:#8c7a6b;
  --c-primary:#d4784a;--c-primary-light:#fdf0e8;--c-border:#e8ddd2;
  --c-accent-a:#e8784a;--c-accent-b:#4a9eb0;--c-accent-c:#8b6caf;
  --c-accent-d:#5a8a6a;--c-accent-e:#c08050;--c-danger:#c44;
  --radius:12px;--shadow:0 2px 16px rgba(60,30,10,.06);
  --font:system-ui,-apple-system,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--c-bg);color:var(--c-text);line-height:1.6;
  -webkit-font-smoothing:antialiased;min-height:100vh;display:flex;justify-content:center}
#app{width:100%;max-width:480px;min-height:100vh;position:relative;overflow:hidden}
.page{display:none;padding:24px 20px 40px;min-height:100vh}
.page.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* 首页 */
.home-header{text-align:center;padding-top:40px}
.home-header h1{font-size:1.75rem;font-weight:800;color:var(--c-primary);line-height:1.3;margin-bottom:8px}
.home-header .sub{font-size:.9rem;color:var(--c-muted);margin-bottom:32px;line-height:1.5}
.home-intro{background:var(--c-card);border-radius:var(--radius);padding:20px;margin-bottom:20px;
  box-shadow:var(--shadow);font-size:.875rem;color:var(--c-muted);line-height:1.8}
.home-intro p{margin-bottom:8px}
.home-intro .highlight{color:var(--c-primary);font-weight:600}
.dim-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px}
.dim-card{background:var(--c-card);border:1px solid var(--c-border);border-radius:var(--radius);
  padding:14px 12px;text-align:center;font-size:.8rem;font-weight:600;color:var(--c-text)}
.dim-card .icon{font-size:1.3rem;display:block;margin-bottom:4px}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:var(--radius);
  font-size:1rem;font-weight:700;cursor:pointer;text-align:center;transition:all .15s}
.btn-primary{background:var(--c-primary);color:#fff}
.btn-primary:active{opacity:.85;transform:scale(.98)}
.btn-outline{background:var(--c-card);color:var(--c-primary);border:1.5px solid var(--c-border)}
.footer-note{text-align:center;font-size:.7rem;color:var(--c-muted);margin-top:16px}
.footer-code{text-align:center;font-size:.7rem;color:var(--c-muted);margin-top:8px;
  font-family:'SF Mono',Consolas,monospace}

/* 测试页 */
.quiz-header{padding:8px 0 16px}
.quiz-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.quiz-module{font-size:.75rem;color:var(--c-primary);font-weight:600;background:var(--c-primary-light);
  padding:4px 10px;border-radius:20px}
.quiz-progress{font-size:.75rem;color:var(--c-muted)}
.progress-bar{height:3px;background:var(--c-border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--c-primary);transition:width .3s ease;border-radius:2px}
.quiz-card{background:var(--c-card);border-radius:var(--radius);padding:24px 20px;
  box-shadow:var(--shadow);margin-bottom:12px}
.quiz-card h3{font-size:1rem;font-weight:700;margin-bottom:20px;line-height:1.5}
.opt-btn{display:block;width:100%;padding:14px 16px;margin-bottom:8px;background:var(--c-bg);
  border:1.5px solid var(--c-border);border-radius:var(--radius);text-align:left;
  font-size:.9rem;cursor:pointer;transition:all .12s;color:var(--c-text)}
.opt-btn:active,.opt-btn.selected{background:var(--c-primary-light);border-color:var(--c-primary);
  color:var(--c-primary);font-weight:600}
.opt-key{display:inline-block;width:24px;height:24px;line-height:24px;text-align:center;
  background:var(--c-border);border-radius:50%;font-size:.75rem;font-weight:700;margin-right:8px}
.quiz-hint{text-align:center;font-size:.7rem;color:var(--c-muted);padding:8px}

/* 加载页 */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:70vh;text-align:center}
.loading-spinner{width:40px;height:40px;border:3px solid var(--c-border);
  border-top-color:var(--c-primary);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:24px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:.95rem;color:var(--c-text);min-height:28px;line-height:1.6}
.loading-done{color:var(--c-primary);font-weight:600}

/* 结果页 */
.result-header{text-align:center;padding-top:20px}
.result-type{font-size:2rem;font-weight:800;color:var(--c-primary);margin-bottom:4px}
.result-subtitle{font-size:.9rem;color:var(--c-muted);margin-bottom:20px}
.score-ring{display:inline-flex;align-items:center;justify-content:center;
  width:80px;height:80px;border-radius:50%;border:4px solid var(--c-primary);
  font-size:1.5rem;font-weight:800;color:var(--c-primary);margin-bottom:8px}
.score-label{font-size:.75rem;color:var(--c-muted);margin-bottom:24px}

.section{background:var(--c-card);border-radius:var(--radius);padding:20px;
  box-shadow:var(--shadow);margin-bottom:14px}
.section h3{font-size:.85rem;font-weight:700;color:var(--c-primary);margin-bottom:12px;
  padding-bottom:8px;border-bottom:1px solid var(--c-border)}
.indices-row{display:flex;gap:10px;flex-wrap:wrap}
.index-item{flex:1;min-width:80px;text-align:center;padding:10px 6px;
  background:var(--c-bg);border-radius:8px}
.index-val{font-size:1.3rem;font-weight:800;color:var(--c-primary)}
.index-label{font-size:.7rem;color:var(--c-muted);margin-top:2px}

.diagnosis-text{font-size:.85rem;line-height:1.8;color:var(--c-text);white-space:pre-line}

.radar-wrap{display:flex;justify-content:center;padding:8px 0}
.radar-wrap svg{max-width:280px;width:100%}

.job-list,.no-list{list-style:none;padding:0}
.job-list li,.no-list li{padding:8px 12px;margin-bottom:4px;background:var(--c-bg);
  border-radius:6px;font-size:.82rem;display:flex;align-items:center;gap:8px}
.job-list li::before{content:'✅';font-size:.75rem}
.no-list li::before{content:'⚠️';font-size:.75rem}

.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.compare-card{padding:14px;border-radius:8px;font-size:.8rem;line-height:1.6}
.compare-good{background:#f0f7f0;border:1px solid #c8e0c8}
.compare-bad{background:#fef5f0;border:1px solid #f0d8c8}
.compare-card h4{font-size:.8rem;margin-bottom:6px}

.plan-steps{list-style:none;padding:0}
.plan-steps li{padding:10px 12px;margin-bottom:6px;background:var(--c-bg);
  border-radius:6px;font-size:.8rem;line-height:1.5;border-left:3px solid var(--c-primary)}

.closing-text{font-size:.85rem;color:var(--c-muted);font-style:italic;text-align:center;line-height:1.7}

.result-actions{display:flex;gap:10px;margin-top:20px}
.result-actions .btn{flex:1;font-size:.85rem;padding:12px}

/* 海报弹窗 */
.poster-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;
  justify-content:center;align-items:center;padding:20px}
.poster-overlay.show{display:flex}
.poster-card{background:#fff;border-radius:16px;padding:32px 24px;max-width:320px;width:100%;
  text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.15)}
.poster-card .ptype{font-size:1.8rem;font-weight:800;color:var(--c-primary);margin-bottom:4px}
.poster-card .psub{font-size:.85rem;color:var(--c-muted);margin-bottom:16px}
.poster-card .pfooter{font-size:.7rem;color:var(--c-muted);margin-top:20px;padding-top:14px;
  border-top:1px solid var(--c-border)}
.poster-close{margin-top:16px;font-size:.8rem;color:var(--c-muted);cursor:pointer;text-align:center}
</style>
</head>

const CONFIG = {"meta": {"title": "你骨子里想要什么样的生活？", "subtitle": "5种人生原型，揭示你内心深处真正向往的生活方式", "description": "你有没有感觉现在的生活不是自己真正想要的？每天忙忙碌碌，却说不清自己到底在追求什么？通过32道深度探索题，精准定位你骨子里最真实的5种人生原型——是隐居田园的宁静、都市精英的璀璨、探索冒险的自由、创造表达的激情，还是连接贡献的意义？找到答案，重新设计属于你的理想生活。", "keywords": "理想生活测试,人生原型,生活方式选择,人生方向,自我认知,内心渴望,小红书测试", "primaryColor": "#5b8c5a", "ogImage": ""}, "home": {"title": "你骨子里想要什么样的生活？", "subtitle": "5种人生原型，直击你内心深处最真实的渴望", "introHTML": "<p>你有没有这样的时刻：看着窗外的天空发呆，心里隐约觉得——<strong>现在的生活，好像不是我真正想要的</strong>。但问你到底想要什么，又说不出一个确切的答案。</p><p>我们每个人骨子里都有一个<strong>人生原型</strong>——它决定了什么能让你真正快乐、什么让你感到空虚、什么值得你为之奋斗一生。有人向往田园的宁静与简单，有人渴望都市的璀璨与竞争，有人无法在一处停留，有人需要用创作来表达灵魂，还有人在帮助他人的过程中找到生命的意义。</p><p>32道直击灵魂的测试题，帮你剥离外界的期待和社会的标准，找到你骨子里最真实的人生渴望。没有对错，只有最适合你的活法。</p>", "btnText": "开始测试", "disclaimer": "本测试仅供娱乐参考，人生的选择是复杂而多元的，请结合自身实际情况做出判断。"}, "dimensions": [{"name": "生活方式", "icon": "🏡", "questionIds": [1, 2, 3, 4, 5, 6, 7, 8]}, {"name": "关系需求", "icon": "💞", "questionIds": [9, 10, 11, 12, 13, 14, 15, 16]}, {"name": "成就定义", "icon": "🏆", "questionIds": [17, 18, 19, 20, 21, 22, 23, 24]}, {"name": "自由度", "icon": "🕊️", "questionIds": [25, 26, 27, 28, 29, 30, 31, 32]}], "questions": [{"id": 1, "text": "如果没有任何限制，你理想中的一天是怎么度过的？", "options": [{"key": "A", "text": "在乡间小屋醒来，泡杯茶，看书、种花、散步，安静而充实"}, {"key": "B", "text": "在市中心高层公寓醒来，健身、高效工作、参加有质量的社交"}, {"key": "C", "text": "在一个全新的城市醒来，探索街头巷尾，不知道今天会遇见什么"}, {"key": "D", "text": "在堆满材料和工具的工作室醒来，沉浸在创作中，忘了时间的流逝"}]}, {"id": 2, "text": "五年之后，你最想住在什么样的地方？", "options": [{"key": "A", "text": "远离城市喧嚣的小镇或乡村，有山有水有院子，安静从容"}, {"key": "B", "text": "一线城市核心地段，楼下就是精品咖啡和高端商场，生活高效而精致"}, {"key": "C", "text": "不确定住在哪里！可能在几个国家和城市之间流动，四海为家"}, {"key": "D", "text": "一个充满艺术气息的街区，周边有画廊、独立书店和各种有意思的工作室"}]}, {"id": 3, "text": "一个完全属于自己的周末早晨，你最享受做什么？", "options": [{"key": "A", "text": "在阳光里发发呆，做一顿简单的早餐，不赶时间、不看手机地慢慢过"}, {"key": "B", "text": "去当下最火的brunch店打卡，顺便跟朋友聊聊最近的新机会和新想法"}, {"key": "C", "text": "背上背包去一个从没去过的地方，哪怕只是城市另一端的一个早市"}, {"key": "D", "text": "泡在工作室里，把脑子里那个酝酿了一周的灵感和想法变成现实"}]}, {"id": 4, "text": "以下哪种环境让你感觉最自在、最能做真实的自己？", "options": [{"key": "A", "text": "安静的大自然中，只有风声、鸟鸣和自己的呼吸声"}, {"key": "B", "text": "繁华的城市中心，高楼林立、霓虹交错，感到活力和无限可能"}, {"key": "C", "text": "旅途中的任何一个未知之地，未知本身对我来说就是最好的风景"}, {"key": "D", "text": "一个堆满材料和工具的创作空间，看起来杂乱但充满了无限可能性"}]}, {"id": 5, "text": "关于物质和消费，你的态度最接近下面哪一种？", "options": [{"key": "A", "text": "够用就好，少即是多。不被物质绑架的自由才是真正的高级"}, {"key": "B", "text": "品质至上，好的东西值得投资。物质是品位和努力的外在体现"}, {"key": "C", "text": "把钱花在体验上——旅行、美食、学习。东西够用就行，故事越多越好"}, {"key": "D", "text": "愿意为审美和创意买单。好看、独特、有设计感的物品让我发自内心地快乐"}]}, {"id": 6, "text": "如果让你选择一个固定的生活节奏，你最倾向于哪一种？", "options": [{"key": "A", "text": "慢节奏，有固定的吃饭、散步、阅读时间，不需要闹钟和日程表来提醒自己怎么过一天"}, {"key": "B", "text": "高效紧凑的节奏，每天有明确的目标和任务清单，完成后的成就感是最好的多巴胺"}, {"key": "C", "text": "没有固定节奏，根据当下的心情和机会随时调整，惊喜和变化比规律更有吸引力"}, {"key": "D", "text": "创作主导的节奏，灵感来了几天不睡疯狂输出，灵感走了就彻底放空、蓄力、等待下一波"}]}, {"id": 7, "text": "你更愿意把闲暇时间投资在哪一种「个人空间」的打造上？", "options": [{"key": "A", "text": "打造一个小庭院或阳台花园，亲手种菜养花，在泥土和植物中找到踏实的快乐"}, {"key": "B", "text": "打造一个高效智能的居家办公空间，有最好的设备和工具，随时可以高效输出和运筹帷幄"}, {"key": "C", "text": "不需要固定的个人空间——今天可能在咖啡馆、明天在共享办公、后天在海边，哪里都是我的基地"}, {"key": "D", "text": "打造一个专属的创作工作室，墙上贴满灵感、桌上堆满材料，一进去就自动进入创作的心流状态"}]}, {"id": 8, "text": "你觉得日常生活中的「仪式感」对你有多重要？", "options": [{"key": "A", "text": "很重要但也很简单——晨起泡一杯茶、傍晚散一次步，小而确定的仪式就是生活最温柔的锚点"}, {"key": "B", "text": "仪式感是品质生活的标配——精致的早餐、得体的穿搭、有格调的晚餐，每一个细节都值得讲究"}, {"key": "C", "text": "仪式感不在于固定的形式而在于特别的体验——在异国街头吃一顿即兴的日落晚餐，比任何固定仪式都更让我心动"}, {"key": "D", "text": "我的仪式感跟创作绑定——翻开一本新的速写本、拧开一管新的颜料，这些时刻对我来说充满神圣感"}]}, {"id": 9, "text": "你心中最理想的亲密关系，最接近下面哪一种描述？", "options": [{"key": "A", "text": "两个人安静地在一起，不需要太多言语，彼此陪伴本身就是最好的爱情"}, {"key": "B", "text": "势均力敌的搭档，互相成就、并肩作战、一起站在更高的地方看世界"}, {"key": "C", "text": "一个愿意陪我一起看世界的人，自由而深刻，不拘泥于传统的形式"}, {"key": "D", "text": "能真正理解我内心世界的人，欣赏并支持我的创作，给我灵感和独立的空间"}]}, {"id": 10, "text": "关于友情，你内心最真实的需求是什么？", "options": [{"key": "A", "text": "三两个真正的知己，不需要频繁联系和热闹的聚会，但彼此心中始终都有对方"}, {"key": "B", "text": "一群优质的朋友，可以交流思想、互换资源、互相激励，共同向上"}, {"key": "C", "text": "世界各地都有几个朋友，每次久别重逢都有说不完的故事和新鲜感"}, {"key": "D", "text": "懂我创作和表达的同类，跟他们在一起可以自由地分享灵感、碰撞火花"}]}, {"id": 11, "text": "你对「家」的想象和期待，更接近哪一种？", "options": [{"key": "A", "text": "一个小而温暖的家，简简单单，一日三餐、四季平安，足矣"}, {"key": "B", "text": "高品质的家庭生活，好的教育、好的环境，给孩子最好的起点和平台"}, {"key": "C", "text": "不一定是传统固定的家庭形态——可能是旅居家庭，或者在多个地方都有自己的家"}, {"key": "D", "text": "一个充满创意和自由氛围的家，不按常规出牌，每个人都可以做自己"}]}, {"id": 12, "text": "在一个群体中，你最希望自己自然而然地扮演什么角色？", "options": [{"key": "A", "text": "安静而可靠的存在，不争不抢不出风头，但大家知道有你在就很安心"}, {"key": "B", "text": "核心人物之一，有话语权、有影响力，能够推动重要的事情发生"}, {"key": "C", "text": "带来新鲜视角和故事的人，分享一路上的见闻和意想不到的想法"}, {"key": "D", "text": "灵感提供者或氛围创造者，让群体因为你的存在而变得更有趣、更特别"}]}, {"id": 13, "text": "你如何看待人际关系中的「独处时间」？", "options": [{"key": "A", "text": "独处是必需品，没有足够的独处时间我会慢慢枯萎，再亲密的关系也需要留白"}, {"key": "B", "text": "适度的独处可以，但高质量的关系和有效社交也是我生活中不可或缺的能量来源"}, {"key": "C", "text": "独处和社交交替进行是理想状态，我需要自由的节奏，不能被任何一端长期束缚"}, {"key": "D", "text": "独处时往往是我最有创造力的时候，但创作完成后的分享和共鸣也同样重要"}]}, {"id": 14, "text": "当你感到孤独或低落的时候，你最渴望什么样的支持和安慰？", "options": [{"key": "A", "text": "不需要太多言语和热闹，只需要一个安静地陪在我身边的人，或者一只趴在腿上的猫"}, {"key": "B", "text": "一个能帮我理性分析问题、一起制定解决方案、推我一把让我重新站起来的人"}, {"key": "C", "text": "一个拉我走出低谷、带我去接触新鲜事物和体验的人——有时候换一个环境就是最好的疗愈"}, {"key": "D", "text": "一个能理解我内心世界的人，也许不需要语言，一起听一首歌、看一部电影、聊一聊创作就足够"}]}, {"id": 15, "text": "在感情或友谊中，你最不能接受和容忍的是什么？", "options": [{"key": "A", "text": "过度侵入我的个人空间和边界，把陪伴变成捆绑，把关心变成控制"}, {"key": "B", "text": "安于现状、不思进取，两个人在一起不是互相成就而是互相拖累和消耗"}, {"key": "C", "text": "被期待按照固定的剧本和节奏来发展关系，失去了自由探索和变化的空间"}, {"key": "D", "text": "不被理解和欣赏——你把我最珍视的创作和表达视为「不务正业」或「没用的东西」"}]}, {"id": 16, "text": "如果用一个比喻来描述你心中最理想的人际关系网络，会是？", "options": [{"key": "A", "text": "一棵安静的大树——根系深厚、枝叶不多，但每一片叶子都彼此熟悉、彼此支撑"}, {"key": "B", "text": "一张高质量的价值网络——每个节点都是某个领域的优质资源，彼此赋能、互相增值"}, {"key": "C", "text": "一张不断扩展的世界地图——每个地方都有几个有趣的朋友，随时可以出发去探访"}, {"key": "D", "text": "一个自由开放的创意集市——人们带着各自的作品和灵感来交流碰撞，然后各自回去继续创作"}]}, {"id": 17, "text": "对你个人而言，「成功」最准确和最诚实的定义是什么？", "options": [{"key": "A", "text": "内心的平静和满足，不被外界的评价和标准所左右，过自己真正想过的生活"}, {"key": "B", "text": "在事业上取得公认的成就，有行业地位、有财富自由、有社会影响力"}, {"key": "C", "text": "经历过足够丰富的人生，去过了想去的地方，心里没有「早知道就…」的遗憾"}, {"key": "D", "text": "创造出能经得起时间考验的作品，用创作来表达我对这个世界的独特理解"}]}, {"id": 18, "text": "十年后的某一天回头望，做了什么事会让你觉得「这辈子值了」？", "options": [{"key": "A", "text": "我按照自己的意愿过完了这十年，没有活在别人的期待和社会的标准里"}, {"key": "B", "text": "我建立或参与了一番了不起的事业，站在了行业的顶端，成为了一个标杆"}, {"key": "C", "text": "我去过了所有曾经想去的地方，体验了各种不一样的人生可能性"}, {"key": "D", "text": "我留下了能被一些人记住的作品，哪怕数量不多，但每一件都足够真诚"}]}, {"id": 19, "text": "面对一个非常有挑战性的大目标时，你的心态更接近哪种？", "options": [{"key": "A", "text": "我会认真想清楚这到底是不是我真正想要的，如果不是，不勉强自己也是一种智慧"}, {"key": "B", "text": "挑战越大我越兴奋，这是我证明自己、突破天花板的最佳时机"}, {"key": "C", "text": "只要是之前没试过的，我都愿意去挑战——过程本身比结果更重要"}, {"key": "D", "text": "如果这个挑战能激发我全新的创作灵感，我愿意投入全部的热情和精力"}]}, {"id": 20, "text": "你对「竞争」这件事的真实看法是什么？", "options": [{"key": "A", "text": "不太喜欢竞争这件事，每个人都有自己的节奏和花期，盲目比较没有意义"}, {"key": "B", "text": "竞争是最好的成长加速器，在跟强者的较量中才能看到自己真正的上限"}, {"key": "C", "text": "竞争只是人生的游戏之一，赢了当然开心，但输了也不会影响我看世界的心情"}, {"key": "D", "text": "我不太喜欢跟别人竞争，但我享受不断超越和迭代昨天的自己"}]}, {"id": 21, "text": "如果有人当面对你说「你这样好像不太上进啊」，你的内心反应是？", "options": [{"key": "A", "text": "默默在心里想「你又不知道我真正想要的是什么」，然后继续过我自己的日子"}, {"key": "B", "text": "会认真反思，如果对方说得有道理，我会加倍努力用成绩来证明自己"}, {"key": "C", "text": "笑一笑不说话。每个人定义的上进本来就不一样，我的人生不需要别人来打分"}, {"key": "D", "text": "不太在意。对我来说，创作本身就已经是一种最大的「上进」，只是别人看不懂"}]}, {"id": 22, "text": "如果有一天你离开这个世界，你希望别人怎么评价你的一生？", "options": [{"key": "A", "text": "「他活得特别通透，不为外物所累，真正做到了按照自己的心意过完这一生」"}, {"key": "B", "text": "「他站到了很高的地方，做了了不起的事，影响了一个行业甚至一个时代」"}, {"key": "C", "text": "「他去过了很多地方，经历了很多人一生都无法想象的精彩，活得特别尽兴」"}, {"key": "D", "text": "「他留下了一些特别的作品，通过这些作品，我们看到了一个独特而深刻的世界」"}]}, {"id": 23, "text": "你对「天赋」和「努力」之间的关系，有着什么样的直觉和判断？", "options": [{"key": "A", "text": "天赋固然存在，但更重要的是找到适合自己的节奏——不是每个人都必须在高速公路上奔跑"}, {"key": "B", "text": "天赋是起点，努力是加速度。在天赋基础上持续不断地努力，才能站到别人无法企及的位置"}, {"key": "C", "text": "天赋不应该被狭窄地定义——好奇心、适应力和勇气本身也是一种天赋，而且是更重要的那种"}, {"key": "D", "text": "天赋是创作的底色，但真正的创作需要日复一日的打磨和坚持，没有捷径可走"}]}, {"id": 24, "text": "当你看到同龄人获得了远超自己的成就或财富时，你的内心反应最接近？", "options": [{"key": "A", "text": "为他开心，但不会因此焦虑。每个人的时钟不一样，我的节奏我自己掌握"}, {"key": "B", "text": "会激发我的斗志和紧迫感——如果他能做到，我也有能力和决心做得更好"}, {"key": "C", "text": "好奇他的故事和路径，但不会拿来跟自己比较——每个人的人生剧本完全不同"}, {"key": "D", "text": "如果他的成就来自他独特的创造力，我会由衷欣赏并从中学到东西"}]}, {"id": 25, "text": "关于工作和生活之间的边界，你内心最理想的状态是？", "options": [{"key": "A", "text": "清晰的边界，工作就是工作、生活就是生活，互不侵犯、各自安好"}, {"key": "B", "text": "工作就是生活中很重要的组成部分，我享受被有意义的工作填满的充实和成就感"}, {"key": "C", "text": "没有固定的边界——今天可能在巴厘岛写方案，明天在清迈开线上会议，后天在东京学料理"}, {"key": "D", "text": "工作就是创作、创作就是生活，不需要刻意区分，融合在一起就是最好的状态"}]}, {"id": 26, "text": "如果突然获得一笔足够你十年不工作的钱，你最想做什么？", "options": [{"key": "A", "text": "立刻搬到一个喜欢的地方，过简简单单的日子，做自己喜欢的、小小的、美好的事"}, {"key": "B", "text": "把它作为更大事业的启动资金，十年之后我要站在一个比现在高得多的地方"}, {"key": "C", "text": "立刻买张机票出发，开启环球旅行，把钱投资在体验和故事上"}, {"key": "D", "text": "搭建一个属于自己的工作室，不用考虑任何商业回报，纯粹地创作整整十年"}]}, {"id": 27, "text": "你对「计划」和「人生规划」的真实态度是？", "options": [{"key": "A", "text": "不太喜欢做长远的大计划，活在当下、顺着生活的流动自然前行比较舒服"}, {"key": "B", "text": "必须有清晰的五年规划和每年的目标，没有路线图和里程碑你怎么到达目的地？"}, {"key": "C", "text": "计划赶不上变化，有个大方向就可以了，中途随时可以调整和改道"}, {"key": "D", "text": "创作不太需要严密的计划，灵感来了就全力以赴地做，灵感走了就等下一波"}]}, {"id": 28, "text": "以下哪一种自由，在你目前的人生阶段中感觉最稀缺、最珍贵？", "options": [{"key": "A", "text": "时间的自由——不用朝九晚五，可以完全按照自己的节奏来安排每一天"}, {"key": "B", "text": "选择的自由——有能力对不想要的东西果断说不，对想要的东西有底气去争取"}, {"key": "C", "text": "行动的自由——想去哪里就去哪里，不被任何一个地方或身份长期束缚"}, {"key": "D", "text": "表达的自由——能够不受限制地创作和表达自己，不被商业或他人的眼光所绑架"}]}, {"id": 29, "text": "闭上眼睛，你脑海中浮现出的最美好、最让你心动的画面是什么？", "options": [{"key": "A", "text": "夕阳下，一个人或和爱的人安静地坐在院子里，看着天色慢慢变化，内心一片宁静"}, {"key": "B", "text": "站在高楼顶层的落地窗前，俯瞰整座璀璨的城市，感觉一切都在掌控之中"}, {"key": "C", "text": "背着行囊站在一个从未到过的山顶或异国街头，深吸一口气，感受扑面而来的无限可能"}, {"key": "D", "text": "完成一件作品的那一刻，静静地看着它，心里涌起巨大的、无法被任何东西替代的满足感"}]}, {"id": 30, "text": "如果人生是一张可以自由绘制的画布，你第一笔会画什么？", "options": [{"key": "A", "text": "一片安静的绿色——森林、田野、或者一个小院子，这是所有故事的起点和归宿"}, {"key": "B", "text": "一条向上的弧线——从地面到天际，每一步都在攀升，每一笔都指向更高的地方"}, {"key": "C", "text": "一条没有尽头的蜿蜒小路——画布上最重要的不是终点在哪，而是沿途不断变化的风景"}, {"key": "D", "text": "一个正在创作中的形象——也许是一个人物、也许是一个符号，总之是只有我自己能画出来的东西"}]}, {"id": 31, "text": "你对「不确定性」的真实态度是什么？", "options": [{"key": "A", "text": "不太喜欢太大的不确定性，生活需要一定的稳定和可预期性才能让我安心和踏实"}, {"key": "B", "text": "可以接受适度的不确定性，但需要有清晰的应对策略和Plan B来对冲不可控的风险"}, {"key": "C", "text": "不确定性就是生活的调味料！最让人兴奋的就是不知道明天会遇见什么人、什么事"}, {"key": "D", "text": "创作本身就是跟不确定性共舞——你不知道下一个灵感什么时候来，但你相信它一定会来"}]}, {"id": 32, "text": "你内心深处，最怕自己过上一种什么样的生活？", "options": [{"key": "A", "text": "被物质和欲望绑架、被无关紧要的人和事填满、失去了跟自己独处和对话的能力"}, {"key": "B", "text": "平庸、碌碌无为、在底层日复一日地重复、一生都没有真正站到高处看过风景"}, {"key": "C", "text": "一眼就能望到头——在同一个城市、同一家公司、同一间办公室、做着同一件事，年复一年"}, {"key": "D", "text": "再也无法创作和表达——灵魂里丰富的一切找不到任何一个出口，慢慢被生活磨平了棱角"}]}], "resultTypes": {"A": {"name": "🌿 田园隐居派", "subtitle": "少即是多，慢即是快。你想要的不是退隐，而是回归", "maturityScore": 85, "indices": [{"label": "内心平静度", "value": 92}, {"label": "简约生活倾向", "value": 90}, {"label": "独立自足力", "value": 85}], "diagnosis": "你骨子里渴望的是「田园隐居型」生活——远离喧嚣，回归简单与本真。你不需要很大的房子，但需要一扇能看到绿色的窗；你不需要很多的钱，但需要不被物质绑架的自由。你内心深处对自然、宁静和慢节奏有着强烈的向往，城市里无休止的嘈杂和竞争让你感到疲惫和消耗。你想要的不是躺平或逃避，而是按照自己的时钟来生活：春天种花、夏天乘凉、秋天收获、冬天烤火。你享受小而确定的美好——一本好书、一杯热茶、一顿自己做的饭。这是一种非常深刻的生活选择：你不是不奋斗，只是你对「奋斗」的定义和别人不一样。在消费主义盛行、人人都在内卷的时代里，你想要的是做减法——减去不必要的欲望和负担，保留最本真、最能滋养灵魂的快乐与宁静。", "radarData": [{"label": "生活方式（内敛）", "value": 95}, {"label": "关系需求（独立）", "value": 80}, {"label": "成就定义（内在）", "value": 90}, {"label": "自由度（稳定）", "value": 85}, {"label": "生活幸福感", "value": 90}], "suitableJobs": ["独立创作者与自由职业者", "自然教育或生态农业从业者", "小而美的生活方式品牌主理人", "远程工作的深度思考型岗位"], "unsuitableJobs": ["高压快节奏的金融/互联网大厂", "需要高频社交和应酬的岗位", "以消费主义为导向的行业"], "pathCompare": {"good": "顺应天赋：选择一个让你能够控制节奏、亲近自然、独立工作的生活方式。你的能量来自于安静和独处，在低刺激、高自主的环境中，你的幸福感和创造力会达到巅峰。不需要跟别人比速度，你的赛道是深度和质感。", "bad": "逆天赋：长期待在高压、高刺激、快节奏的环境中，会让你持续消耗、逐渐枯萎。强迫自己去追求世俗定义的「成功」和「上进」，只会让你离真正的幸福越来越远。那不是你不行，是赛道选错了。"}, "plan90": ["【断舍离实验】①第1周衣橱清理：处理≥20件一年未穿的衣物，保留率不超过70% ②第2周数字排毒：取关30个公众号，卸载10个半年未使用的APP ③第3周社交减负：婉拒3次无效约饭，退出5个长期沉默的群聊 ④第4周消费复盘：连续7天只购买食品和必需品，标记出最常冲动消费的3个品类✅轻装上阵才能走得更远", "【微田园实践】①阳台种植启动：购入3盆易养护植物（推荐薄荷/多肉/绿萝），设每周浇水2次提醒 ②每日5分钟照料：早起第一件事浇水观察，手机拍照记录生长变化≥20天 ③自然角落扩展：添加一件自然元素装饰（石头/原木/干花），打造家中微型自然角 ④周末自然时间：每周末户外散步≥30分钟×4次，用手机记录3种见到的植物或鸟类✅体验安静生长的美好节奏", "【低欲望生活实验】①必需品清单：列出30天生活必需消费品清单，设定非必需月支出上限≤500元 ②体验预算转移：将原购物预算40%重新分配给体验消费（课程/旅行/手工体验） ③无购物日挑战：每周设定2天「零消费日」，当天只使用已有物品不购入新物 ④月末复盘：统计月支出下降比例，写下3条「不买也很快乐」的真实体会✅真正的富足是不需要很多也能幸福圆满"], "closing": "真正的富足，不是你拥有了多少，而是你不需要多少也能感到幸福和圆满。", "posterText": "田园隐居型——少即是多，慢即是快", "posterSubtext": "我不是在逃避世界，我是在选择一种更诚实的生活方式"}, "B": {"name": "🏙️ 都市精英", "subtitle": "志在巅峰，不负韶华。你属于城市的天际线", "maturityScore": 83, "indices": [{"label": "成就驱动力", "value": 93}, {"label": "品质追求度", "value": 90}, {"label": "竞争意识", "value": 88}], "diagnosis": "你骨子里渴望的是「都市精英型」生活——在城市的中心，站在高处俯瞰世界。你享受竞争带来的刺激和成长，享受不断突破自我上限的那种快感。你想要的不是平庸的安稳，而是一个值得你全力以赴的战场。高楼林立、霓虹交错，对你来说那不是压力和拥挤，而是澎湃的活力和无限的可能性。你对生活品质有很高的要求，对事业成就有强烈的渴望，对社会地位有明确的追求——这些不需要遮掩，这正是驱动你不断向前的燃料。你希望在最好的城市里、做最有价值的事情、跟最优秀的人共事。唯一需要注意的是，在这条高速前进的路上，别忘了偶尔停下来看看窗外的风景，问问自己：这真的是我想要的，还是只是别人眼中的「好」。精英之路可以走得很快，但只有带着自我觉察前行，才能走得又快又稳。", "radarData": [{"label": "生活方式（外放）", "value": 95}, {"label": "关系需求（依赖）", "value": 75}, {"label": "成就定义（外在）", "value": 95}, {"label": "自由度（稳定）", "value": 65}, {"label": "生活幸福感", "value": 80}], "suitableJobs": ["企业管理与高管岗位", "投资银行与金融精英", "创业公司创始人/CEO", "高端咨询与战略顾问"], "unsuitableJobs": ["节奏过慢的传统行业", "缺乏成长空间的螺丝钉岗位", "不认可竞争和绩效导向的组织文化"], "pathCompare": {"good": "顺应天赋：把你的雄心和执行力投入到一个足够大的舞台——选择快速增长的行业、优秀的团队、有挑战性的目标。你的动力来自外部的认可和内部的成就感，在竞争中你会越战越勇。拥抱你的野心，它不是你该隐藏的东西，而是你的引擎。", "bad": "逆天赋：长期待在一个天花板很低、缺乏竞争和成长空间的环境中，你会感到窒息和焦虑。或者，一味追逐外部的成功指标而忽略内心真正的需求，也可能在到达山顶后发现风景并不如想象中那么美。"}, "plan90": ["【目标校准】①内省日记：连续7天每晚写200字，区分「自己真正想要的」和「别人期待你成为的」②优先级排序：列出年度10个目标，用四象限法重新排序，删掉≥3个外部投射型目标 ③试金石提问：对每个保留的目标问「如果没有观众，我还想做吗？」，淘汰回答「否」的目标 ④精简聚焦：最终保留≤3个核心目标作为未来90天的北极星指标✅保留真正属于你的，放下不属于你的", "【能量审计】①时间日志：连续7天以30分钟为单位记录全部时间去向，不遗漏不美化 ②三色标注：将每项活动标注为高价值高满足/高价值低满足/低价值低满足三类 ③砍掉低效：删除所有「低价值低满足」活动，每天释放≥1小时有效时间 ④优化重心：将「高价值高满足」活动占比提升至≥60%，据此制定每日优先级清单✅高效不是做更多，而是做更对的事", "【视野跃升】①大咖连接：主动联系3位你欣赏的行业前辈或领域高手，每人做一次≥30分钟的深度交流 ②峰会参与：报名并参加1场行业顶级峰会或跨领域精品课程，提交≥5个会后行动灵感 ③技能跃迁：选择一项对职业跃升最关键的硬技能，投入≥20小时系统学习和刻         </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      </div>
      <div class="quiz-card">
        <h3>${q.text}</h3>
        ${q.options.map((opt, i) => `
          <button class="opt-btn" onclick="APP.answer('${opt.key}')" id="opt-${i}">
            <span class="opt-key">${opt.key}</span>${opt.text}
          </button>
        `).join('')}
      </div>
      <p class="quiz-hint">选择后自动进入下一题</p>
    </div>`;
}

// ── 作答 ──────────────────────────────
function answer(key) {
  const q = CONFIG.questions[currentQuestion];
  answers[q.id] = key;
  currentQuestion++;

  if (currentQuestion >= CONFIG.questions.length) {
    navigate('/loading');
  } else {
    renderQuiz();
    window.scrollTo(0, 0);
  }
}

// ── 加载页（逐字打印） ────────────────
function renderLoading() {
  const msgs = CONFIG.loadingMessages || ['正在分析中……', '分析完成。'];
  app.innerHTML = `
    <div class="page active">
      <div class="loading-wrap">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="typewriter"></div>
      </div>
    </div>`;

  const el = document.getElementById('typewriter');
  let msgIdx = 0;
  let charIdx = 0;
  let allDone = false;

  function tick() {
    if (allDone) return;
    if (msgIdx >= msgs.length) {
      el.classList.add('loading-done');
      el.textContent = msgs[msgs.length - 1];
      allDone = true;
      setTimeout(() => navigate('/result'), 800);
      return;
    }
    const msg = msgs[msgIdx];
    if (charIdx <= msg.length) {
      el.textContent = msg.slice(0, charIdx);
      charIdx++;
      typewriterTimer = setTimeout(tick, 60 + Math.random() * 40);
    } else {
      msgIdx++;
      charIdx = 0;
      typewriterTimer = setTimeout(tick, 400);
    }
  }
  tick();
}

// ── 评分 ──────────────────────────────
function calculateResult() {
  const scoring = CONFIG.scoring || {};
  const counts = {};
  for (const key of Object.keys(CONFIG.resultTypes)) {
    counts[key] = 0;
  }
  for (const ans of Object.values(answers)) {
    if (counts[ans] !== undefined) counts[ans]++;
  }
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  const primary = sorted[0][0];
  const secondary = sorted.length > 1 && (sorted[0][1] - sorted[1][1]) <= (scoring.mixedThreshold || 3) && sorted[1][1] > 0
    ? sorted[1][0] : null;

  return { primary, secondary, counts, hasSecondary: !!secondary };
}

// ── 雷达图 SVG ────────────────────────
function renderRadar(data, size = 260) {
  const cx = size / 2, cy = size / 2, r = size * 0.35;
  const n = data.length;
  if (n < 3) return '<p style="text-align:center;color:var(--c-muted)">数据不足</p>';

  const angleStep = (2 * Math.PI) / n;
  const levels = 5;
  let paths = '';

  // 背景网格
  for (let lv = 1; lv <= levels; lv++) {
    const rr = r * (lv / levels);
    let pts = [];
    for (let i = 0; i < n; i++) {
      const angle = angleStep * i - Math.PI / 2;
      pts.push(`${cx + rr * Math.cos(angle)},${cy + rr * Math.sin(angle)}`);
    }
    paths += `<polygon points="${pts.join(' ')}" fill="none" stroke="var(--c-border)" stroke-width="0.5"/>`;
  }

  // 轴线
  for (let i = 0; i < n; i++) {
    const angle = angleStep * i - Math.PI / 2;
    paths += `<line x1="${cx}" y1="${cy}" x2="${cx + r * Math.cos(angle)}" y2="${cy + r * Math.sin(angle)}" stroke="var(--c-border)" stroke-width="0.5"/>`;
  }

  // 数据多边形
  let dataPts = [];
  for (let i = 0; i < n; i++) {
    const angle = angleStep * i - Math.PI / 2;
    const val = Math.max(0, Math.min(100, data[i].value || 0)) / 100;
    const rr = r * val;
    dataPts.push(`${cx + rr * Math.cos(angle)},${cy + rr * Math.sin(angle)}`);
  }
  paths += `<polygon points="${dataPts.join(' ')}" fill="var(--c-primary)" fill-opacity="0.2" stroke="var(--c-primary)" stroke-width="2"/>`;

  // 数据点
  for (let i = 0; i < n; i++) {
    const angle = angleStep * i - Math.PI / 2;
    const val = Math.max(0, Math.min(100, data[i].value || 0)) / 100;
    const rr = r * val;
    paths += `<circle cx="${cx + rr * Math.cos(angle)}" cy="${cy + rr * Math.sin(angle)}" r="4" fill="var(--c-primary)"/>`;
  }

  // 标签
  let labels = '';
  for (let i = 0; i < n; i++) {
    const angle = angleStep * i - Math.PI / 2;
    const lr = r + 24;
    const lx = cx + lr * Math.cos(angle);
    const ly = cy + lr * Math.sin(angle);
    const anchor = lx < cx - 10 ? 'end' : lx > cx + 10 ? 'start' : 'middle';
    labels += `<text x="${lx}" y="${ly}" text-anchor="${anchor}" dominant-baseline="middle" font-size="11" fill="var(--c-text)" font-weight="600">${data[i].label}</text>`;
  }

  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg">${paths}${labels}</svg>`;
}

// ── 结果页 ────────────────────────────
function renderResult() {
  const result = calculateResult();
  const rt = CONFIG.resultTypes[result.primary];
  if (!rt) { navigate('/'); return; }

  const secondaryRt = result.hasSecondary ? CONFIG.resultTypes[result.secondary] : null;
  const typeName = secondaryRt ? `${rt.name} × ${secondaryRt.name}` : rt.name;
  const subtitle = secondaryRt
    ? `你同时具备${rt.name}和${secondaryRt.name}的特质，属于复合型人才`
    : rt.subtitle;

  // 混合型诊断
  let mixedNote = '';
  if (result.hasSecondary && CONFIG.mixedNotes) {
    const key = `${result.primary}+${result.secondary}`;
    const keyRev = `${result.secondary}+${result.primary}`;
    mixedNote = CONFIG.mixedNotes[key] || CONFIG.mixedNotes[keyRev] || '';
  }

  const indices = rt.indices || [];
  const radar = rt.radarData || [];
  const jobs = rt.suitableJobs || [];
  const noJobs = rt.unsuitableJobs || [];
  const plan = rt.plan90 || [];
  const pathC = rt.pathCompare || {};

  app.innerHTML = `
    <div class="page active">
      <div class="result-header">
        <div class="result-type">${typeName}</div>
        <p class="result-subtitle">${subtitle}</p>
        <div class="score-ring">${rt.maturityScore}</div>
        <p class="score-label">${CONFIG.scoring.scoreLabel || '职业路径决策成熟度'}</p>
      </div>

      ${indices.length ? `
      <div class="section">
        <h3>📊 关键指数</h3>
        <div class="indices-row">${indices.map(ix => `
          <div class="index-item"><div class="index-val">${ix.value}</div><div class="index-label">${ix.label}</div></div>
        `).join('')}</div>
      </div>` : ''}

      <div class="section">
        <h3>🔍 核心诊断</h3>
        <div class="diagnosis-text">${rt.diagnosis}${mixedNote ? '\n\n' + mixedNote : ''}</div>
      </div>

      ${radar.length >= 3 ? `
      <div class="section">
        <h3>📡 能力雷达图</h3>
        <div class="radar-wrap">${renderRadar(radar)}</div>
      </div>` : ''}

      ${jobs.length ? `
      <div class="section">
        <h3>🍚 适合的饭碗</h3>
        <ul class="job-list">${jobs.map(j => `<li>${j}</li>`).join('')}</ul>
      </div>` : ''}

      ${noJobs.length ? `
      <div class="section">
        <h3>⚠️ 不太适合的方向</h3>
        <ul class="no-list">${noJobs.map(j => `<li>${j}</li>`).join('')}</ul>
      </div>` : ''}

      ${(pathC.good || pathC.bad) ? `
      <div class="section">
        <h3>🔀 两条路径对比</h3>
        <div class="compare-grid">
          <div class="compare-card compare-good"><h4>✅ 顺应天赋</h4><p>${pathC.good||''}</p></div>
          <div class="compare-card compare-bad"><h4>⚠️ 逆天赋而行</h4><p>${pathC.bad||''}</p></div>
        </div>
      </div>` : ''}

      ${plan.length ? `
      <div class="section">
        <h3>📋 90天行动清单</h3>
        <ul class="plan-steps">${plan.map((p,i) => `
          <li><strong>第${i+1}步（第${i*30+1}-${(i+1)*30}天）</strong>：${p}</li>
        `).join('')}</ul>
      </div>` : ''}

      <div class="section">
        <p class="closing-text">${rt.closing||''}</p>
      </div>

      <div class="result-actions">
        <button class="btn btn-outline" onclick="APP.restart()">重新测试</button>
        <button class="btn btn-primary" onclick="APP.showPoster()">📤 分享结果</button>
      </div>
    </div>`;

  // 保存海报数据
  window._posterData = { typeName, posterText: rt.posterText||rt.name, posterSubtext: rt.posterSubtext||rt.subtitle, meta: CONFIG.meta };
}

// ── 分享海报 ──────────────────────────
function showPoster() {
  const pd = window._posterData || {};
  const overlay = document.createElement('div');
  overlay.className = 'poster-overlay show';
  overlay.id = 'poster-overlay';
  overlay.innerHTML = `
    <div class="poster-card" id="poster-card">
      <p style="font-size:.75rem;color:var(--c-muted);margin-bottom:8px">我的测试结果</p>
      <div class="ptype">${pd.posterText||''}</div>
      <p class="psub">${pd.posterSubtext||''}</p>
      <div style="width:60px;height:3px;background:var(--c-primary);margin:16px auto;border-radius:2px"></div>
      <p style="font-size:.75rem;color:var(--c-muted)">「${pd.meta?.title||''}」</p>
      <div class="pfooter">扫码测测你的 →</div>
    </div>
    <p class="poster-close" onclick="this.parentElement.remove()">关闭</p>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', function(e){ if(e.target===this) this.remove(); });
}

// ── 重新开始 ──────────────────────────
function restart() {
  answers = {};
  currentQuestion = 0;
  sessionStorage.removeItem('quiz_answers');
  navigate('/');
}

// ── 初始化 ────────────────────────────
function init() {
  // 尝试从 sessionStorage 恢复
  const saved = sessionStorage.getItem('quiz_answers');
  if (saved) {
    try { answers = JSON.parse(saved); } catch(e) {}
  }

  window.addEventListener('hashchange', render);
  render();
}

// ── 暴露 API ──────────────────────────
window.APP = {
  start: () => { answers = {}; currentQuestion = 0; navigate('/quiz'); },
  answer: (key) => {
    answer(key);
    // 保存到 sessionStorage
    sessionStorage.setItem('quiz_answers', JSON.stringify(answers));
  },
  restart,
  showPoster,
  navigate,
};

init();
})();
</script>
</body>
</html>
